<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Firebase - LexiDecis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .debug-log {
            background: #1e1e1e;
            color: #ffffff;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .uid-highlight {
            background-color: #ffeb3b;
            color: #000;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h4>🔍 Debug Firebase - Criação de Usuário</h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info">
                            <strong>Objetivo:</strong> Identificar exatamente onde está o problema do logout e do UUID automático
                        </div>
                        
                        <form id="debugForm">
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="testEmail" class="form-label">Email de Teste</label>
                                    <input type="email" id="testEmail" class="form-control" value="teste@debug.com" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="testPassword" class="form-label">Senha de Teste</label>
                                    <input type="password" id="testPassword" class="form-control" value="123456" required>
                                </div>
                            </div>
                            <div class="mt-3">
                                <button type="button" id="btnDebugStep1" class="btn btn-primary">1. Verificar Estado Inicial</button>
                                <button type="button" id="btnDebugStep2" class="btn btn-warning">2. Criar no Firebase</button>
                                <button type="button" id="btnDebugStep3" class="btn btn-success">3. Verificar Estado Final</button>
                                <button type="button" id="btnDebugFull" class="btn btn-danger">🚀 Teste Completo</button>
                            </div>
                        </form>
                        
                        <hr>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <h6>Estado Atual do Auth:</h6>
                                <div id="authState" class="border p-2 mb-3" style="background: #f8f9fa; font-family: monospace; font-size: 11px;"></div>
                            </div>
                            <div class="col-md-6">
                                <h6>Último UID Capturado:</h6>
                                <div id="lastUid" class="border p-2 mb-3" style="background: #f8f9fa; font-family: monospace; font-size: 11px;">Nenhum UID capturado ainda</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h6>Log de Debug</h6>
                        <small>Trace completo do processo</small>
                    </div>
                    <div class="card-body p-2">
                        <div id="debugLog" class="debug-log"></div>
                        <button id="clearLog" class="btn btn-sm btn-secondary mt-2 w-100">Limpar Log</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        let lastCapturedUid = null;
        
        function addLog(type, message, data = null) {
            const timestamp = new Date().toLocaleTimeString();
            const logDiv = document.getElementById('debugLog');
            
            let logEntry = `[${timestamp}] ${type.toUpperCase()}: ${message}\n`;
            
            if (data) {
                logEntry += `  DATA: ${JSON.stringify(data, null, 2)}\n`;
            }
            
            logDiv.textContent += logEntry + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function updateAuthState() {
            const authStateDiv = document.getElementById('authState');
            
            import('./assets/js/auth.js').then(AuthModule => {
                const AuthService = AuthModule.default;
                
                if (AuthService.user) {
                    authStateDiv.innerHTML = `
                        <strong>✅ LOGADO</strong><br>
                        Email: ${AuthService.user.email}<br>
                        UID: <span class="uid-highlight">${AuthService.user.uid}</span><br>
                        Verificado: ${AuthService.user.emailVerified}
                    `;
                } else {
                    authStateDiv.innerHTML = `
                        <strong>❌ NÃO LOGADO</strong><br>
                        AuthService.user: null
                    `;
                }
            }).catch(error => {
                authStateDiv.innerHTML = `
                    <strong>⚠️ ERRO</strong><br>
                    ${error.message}
                `;
            });
        }
        
        function updateLastUid(uid) {
            lastCapturedUid = uid;
            const lastUidDiv = document.getElementById('lastUid');
            lastUidDiv.innerHTML = `
                <strong>🔥 UID CAPTURADO:</strong><br>
                <span class="uid-highlight">${uid}</span><br>
                <small>Tipo: ${typeof uid}</small><br>
                <small>Tamanho: ${uid ? uid.length : 0} caracteres</small>
            `;
        }
        
        // Atualiza estado inicial
        updateAuthState();
        addLog('info', 'Página de debug carregada');
        
        // Verifica mudanças no auth em tempo real
        setInterval(updateAuthState, 2000);
        
        // Botão 1: Verificar Estado Inicial
        document.getElementById('btnDebugStep1').addEventListener('click', async () => {
            addLog('info', '=== STEP 1: VERIFICAR ESTADO INICIAL ===');
            
            try {
                const AuthModule = await import('./assets/js/auth.js');
                const AuthService = AuthModule.default;
                
                addLog('info', 'Auth state antes da criação', {
                    user_exists: !!AuthService.user,
                    user_email: AuthService.user?.email,
                    user_uid: AuthService.user?.uid
                });
                
                updateAuthState();
                
            } catch (error) {
                addLog('error', 'Erro ao verificar estado inicial', error);
            }
        });
        
        // Botão 2: Criar no Firebase
        document.getElementById('btnDebugStep2').addEventListener('click', async () => {
            addLog('info', '=== STEP 2: CRIAR NO FIREBASE ===');
            
            try {
                const email = document.getElementById('testEmail').value;
                const password = document.getElementById('testPassword').value;
                
                addLog('info', 'Iniciando criação no Firebase', { email, password: '***' });
                
                const AuthModule = await import('./assets/js/auth.js');
                const AuthService = AuthModule.default;
                
                addLog('info', 'Estado ANTES da criação Firebase', {
                    admin_email: AuthService.user?.email,
                    admin_uid: AuthService.user?.uid
                });
                
                const FirebaseUtilsModule = await import('./assets/js/firebase-utils.js');
                const { createFirebaseUser } = FirebaseUtilsModule;
                
                addLog('info', 'Chamando createFirebaseUser...');
                const firebaseResult = await createFirebaseUser(email, password);
                
                addLog('success', 'Firebase user criado!', firebaseResult);
                updateLastUid(firebaseResult.uid);
                
                // Verifica estado após criação
                addLog('info', 'Estado APÓS criação Firebase', {
                    admin_exists: !!AuthService.user,
                    admin_email: AuthService.user?.email,
                    admin_uid: AuthService.user?.uid,
                    firebase_uid_captured: firebaseResult.uid
                });
                
                // Verifica se é um UID real do Firebase (formato esperado)
                const isValidFirebaseUid = /^[a-zA-Z0-9]{28}$/.test(firebaseResult.uid);
                addLog('info', 'Validação do UID Firebase', {
                    uid: firebaseResult.uid,
                    is_valid_format: isValidFirebaseUid,
                    length: firebaseResult.uid.length,
                    pattern_test: /^[a-zA-Z0-9]{28}$/.test(firebaseResult.uid)
                });
                
            } catch (error) {
                addLog('error', 'Erro ao criar no Firebase', error);
            }
        });
        
        // Botão 3: Verificar Estado Final
        document.getElementById('btnDebugStep3').addEventListener('click', async () => {
            addLog('info', '=== STEP 3: VERIFICAR ESTADO FINAL ===');
            
            try {
                const AuthModule = await import('./assets/js/auth.js');
                const AuthService = AuthModule.default;
                
                addLog('info', 'Estado final do Auth', {
                    user_exists: !!AuthService.user,
                    user_email: AuthService.user?.email,
                    user_uid: AuthService.user?.uid,
                    last_captured_uid: lastCapturedUid
                });
                
                updateAuthState();
                
                // Verifica se houve logout
                if (!AuthService.user) {
                    addLog('error', '❌ PROBLEMA IDENTIFICADO: Admin foi deslogado!');
                } else {
                    addLog('success', '✅ Admin permanece logado');
                }
                
                // Verifica se o UID capturado é válido
                if (lastCapturedUid) {
                    const isValidFirebaseUid = /^[a-zA-Z0-9]{28}$/.test(lastCapturedUid);
                    if (isValidFirebaseUid) {
                        addLog('success', '✅ UID capturado é válido do Firebase');
                    } else {
                        addLog('error', '❌ UID capturado NÃO é um UID válido do Firebase');
                    }
                } else {
                    addLog('error', '❌ Nenhum UID foi capturado');
                }
                
            } catch (error) {
                addLog('error', 'Erro ao verificar estado final', error);
            }
        });
        
        // Botão de Teste Completo
        document.getElementById('btnDebugFull').addEventListener('click', async () => {
            addLog('info', '🚀 === TESTE COMPLETO INICIADO ===');
            
            // Limpa logs anteriores
            document.getElementById('debugLog').textContent = '';
            
            try {
                await new Promise(resolve => setTimeout(resolve, 1000));
                document.getElementById('btnDebugStep1').click();
                
                await new Promise(resolve => setTimeout(resolve, 2000));
                document.getElementById('btnDebugStep2').click();
                
                await new Promise(resolve => setTimeout(resolve, 3000));
                document.getElementById('btnDebugStep3').click();
                
            } catch (error) {
                addLog('error', 'Erro no teste completo', error);
            }
        });
        
        // Limpar log
        document.getElementById('clearLog').addEventListener('click', () => {
            document.getElementById('debugLog').textContent = '';
            addLog('info', 'Log limpo');
        });
        
        // Monitora mudanças no auth
        import('./assets/js/firebase.js').then(FirebaseModule => {
            const { auth } = FirebaseModule;
            
            auth.onAuthStateChanged((user) => {
                if (user) {
                    addLog('auth', `Auth state changed: Usuário logado - ${user.email}`);
                } else {
                    addLog('auth', 'Auth state changed: Usuário deslogado');
                }
                updateAuthState();
            });
        });
        
    </script>
</body>
</html>
