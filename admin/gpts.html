<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>GPTs - Admin LexiDecis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin-layout.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">
</head>
<body>
  <div class="admin-content">
    <div id="content"></div>
  </div>

  <!-- Modais -->
  <div class="modal" id="createGptModal" tabindex="-1" aria-labelledby="createGptModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="createGptModalLabel">Novo GPT</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <form id="createGptForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="gpt_name" class="form-label">Nome do GPT</label>
                <input type="text" class="form-control" id="gpt_name" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="gpt_category" class="form-label">Categoria</label>
                <input type="text" class="form-control" id="gpt_category" required>
              </div>
              <div class="col-md-12 mb-3">
                <label for="gpt_description" class="form-label">Descrição</label>
                <textarea class="form-control" id="gpt_description" rows="3" required></textarea>
              </div>
            </div>
          </form>
          <div id="createGptError" class="text-danger d-none"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="submitCreateGpt" class="btn btn-primary">Criar GPT</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="editGptModal" tabindex="-1" aria-labelledby="editGptModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-warning text-dark">
          <h5 class="modal-title" id="editGptModalLabel">Editar GPT</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <form id="editGptForm">
            <input type="hidden" id="edit_gpt_id">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="edit_gpt_name" class="form-label">Nome do GPT</label>
                <input type="text" class="form-control" id="edit_gpt_name" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="edit_gpt_category" class="form-label">Categoria</label>
                <input type="text" class="form-control" id="edit_gpt_category" required>
              </div>
              <div class="col-md-12 mb-3">
                <label for="edit_gpt_description" class="form-label">Descrição</label>
                <textarea class="form-control" id="edit_gpt_description" rows="3" required></textarea>
              </div>
            </div>
          </form>
          <div id="editGptError" class="text-danger d-none"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="submitEditGpt" class="btn btn-warning">Salvar Alterações</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="gptConfigModal" tabindex="-1" aria-labelledby="gptConfigModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-secondary text-white">
          <h5 class="modal-title" id="gptConfigModalLabel">Configurações do GPT</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <pre id="gptConfigContent" style="white-space: pre-wrap;"></pre>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="assets/js/layout.js" defer></script>
  <script type="module" src="assets/js/auth-guard.js"></script>
  <script type="module" src="assets/js/gpts.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.print.min.js"></script>
  <script type="module">
    import AuthService from "./assets/js/auth.js";
    import * as API from "./assets/js/api.js";
    import * as DOM from "./assets/js/dom.js";
    import { initGPTs } from "./assets/js/gpts.js";

    document.addEventListener('DOMContentLoaded', () => {
      AuthService.onAuthChange((user) => {
        initGPTs(AuthService, API, DOM);
      });
    });
  </script>
</body>
</html>
