<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
    Arquivo: users.html
    Descrição: Página principal de administração de usuários para a aplicação Lexidecis.
  -->
  <meta charset="UTF-8">
  <title>Administração de Usuários - Lexidecis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DataTables CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  
  <style>
    /* Espaçamento para não sobrepor o botão fixo de tema */
    #content {
      margin-top: 70px;
    }
    .page-title { margin-top: 20px; }
    .text-title-gray { color: #6c757d; }
    
    /* Modo Escuro */
    body.dark-mode {
      background-color: #121212;
      color: #e0e0e0;
    }
    body.dark-mode .card { background-color: #1e1e1e; border-color: #333; }
    body.dark-mode .modal-content { background-color: #1e1e1e; color: #e0e0e0; }
    body.dark-mode .table { color: #e0e0e0; }
    body.dark-mode .breadcrumb-item a { color: #adb5bd; }
    body.dark-mode .btn-outline-secondary { color: #e0e0e0; border-color: #e0e0e0; }
    body.dark-mode table.dataTable { background-color: #1e1e1e; color: #e0e0e0; }
    
    .btn-group > .btn { flex: 1 1 auto; }
    
    /* Removendo outline/box-shadow dos botões de fechar no modal (opcional) */
    .modal .btn-close:focus,
    .modal .btn-close:focus-visible {
      outline: none !important;
      box-shadow: none !important;
    }
  </style>
</head>
<body>
  <!-- Container principal onde a aplicação será renderizada -->
  <div id="content"></div>
  
  <!-- Botão fixo para alternar o tema -->
  <div style="position: fixed; top: 10px; right: 10px; z-index: 1050;">
    <button id="themeToggle" class="btn btn-outline-secondary">Modo Escuro</button>
  </div>
  
  <!-- Modal para criar novo usuário -->
  <div class="modal" id="createUserModal" tabindex="-1" aria-labelledby="createUserModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="createUserModalLabel">Novo Usuário</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <form id="createUserForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="id" class="form-label">ID</label>
                <input type="text" class="form-control" id="id" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" required>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="is_admin" class="form-label">É Admin?</label>
                <select class="form-select" id="is_admin">
                  <option value="false" selected>Não</option>
                  <option value="true">Sim</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="create_company_id" class="form-label">Company</label>
                <select class="form-select" id="create_company_id" required>
                  <option value="">Carregando companies...</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label for="create_unit_id" class="form-label">Unit</label>
                <select class="form-select" id="create_unit_id" required>
                  <option value="">Carregando units...</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="remote_jid" class="form-label">Remote JID</label>
                <input type="text" class="form-control" id="remote_jid">
              </div>
              <div class="col-md-6 mb-3">
                <label for="whatsapp" class="form-label">Whatsapp?</label>
                <select class="form-select" id="whatsapp">
                  <option value="false" selected>Não</option>
                  <option value="true">Sim</option>
                </select>
              </div>
            </div>
          </form>
          <div id="createUserError" class="text-danger d-none"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="submitCreateUser" class="btn btn-primary">Criar Usuário</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Modal para editar usuário -->
  <div class="modal" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-warning text-dark">
          <h5 class="modal-title" id="editUserModalLabel">Editar Usuário</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <!--
            input hidden para enviar o ID real ao backend,
            e um campo read-only para exibir o ID ao usuário
          -->
          <form id="editUserForm">
            <input type="hidden" id="edit_user_id">
            
            <div class="row">
              <!-- Campo para exibir o ID -->
              <div class="col-md-6 mb-3">
                <label for="edit_id" class="form-label">ID</label>
                <input type="text" class="form-control" id="edit_id">
              </div>
              <div class="col-md-6 mb-3">
                <label for="edit_username" class="form-label">Username</label>
                <input type="text" class="form-control" id="edit_username" required>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="edit_email" class="form-label">Email</label>
                <input type="email" class="form-control" id="edit_email" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="edit_is_admin" class="form-label">É Admin?</label>
                <select class="form-select" id="edit_is_admin">
                  <option value="false">Não</option>
                  <option value="true">Sim</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="edit_company_id" class="form-label">Company</label>
                <select class="form-select" id="edit_company_id" required>
                  <option value="">Selecione uma company</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label for="edit_unit_id" class="form-label">Unit</label>
                <select class="form-select" id="edit_unit_id" required>
                  <option value="">Selecione uma unit</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="edit_remote_jid" class="form-label">Remote JID</label>
                <input type="text" class="form-control" id="edit_remote_jid">
              </div>
              <div class="col-md-6 mb-3">
                <label for="edit_whatsapp" class="form-label">Whatsapp?</label>
                <select class="form-select" id="edit_whatsapp">
                  <option value="false">Não</option>
                  <option value="true">Sim</option>
                </select>
              </div>
            </div>
          </form>
          <div id="editUserError" class="text-danger d-none"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="submitEditUser" class="btn btn-warning">Salvar Alterações</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Bibliotecas -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.print.min.js"></script>
  
  <!-- Inicialização da aplicação via módulos -->
  <script type="module">
    import AuthService from "./auth.js";
    import * as API from "./api.js";
    import * as DOM from "./dom.js";
    import { initMain } from "./main.js";
    
    // Inicializa a aplicação
    initMain(AuthService, API, DOM);
  </script>
</body>
</html>
