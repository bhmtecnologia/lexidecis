<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários - LexiDecis</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin-layout.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css">
  <!-- Select2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
  <style>
    /* Customização Select2 para o tema admin */
    .select2-container--default .select2-selection--single {
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
      height: 38px;
      padding: 6px 12px;
    }
    
    .select2-container--default .select2-selection--single .select2-selection__rendered {
      color: #495057;
      line-height: 26px;
    }
    
    .select2-container--default .select2-selection--single .select2-selection__arrow {
      height: 36px;
      right: 10px;
    }
    
    .select2-container--default .select2-selection--single:focus,
    .select2-container--default.select2-container--focus .select2-selection--single {
      border-color: #80bdff;
      box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
    }
    
    .select2-dropdown {
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
    }
    
    .select2-container--default .select2-results__option--highlighted[aria-selected] {
      background-color: #0d6efd;
      color: white;
    }
    
    .select2-container--default .select2-search--dropdown .select2-search__field {
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
    }
    
    .select2-container {
      width: 100% !important;
    }
    
    /* Fix para Select2 aparecer na frente do modal */
    .select2-container--open {
      z-index: 9999 !important;
    }
    
    .select2-dropdown {
      z-index: 9999 !important;
    }
    
    /* Garantir que o backdrop do Select2 não interfira */
    .select2-container--default.select2-container--open .select2-selection--single {
      border-bottom-color: transparent;
    }
  </style>
  <script type="module" src="assets/js/auth-guard.js"></script>
</head>
<body>
  <!-- Topbar -->
  <div class="admin-topbar">
    <button class="sidebar-toggle" id="sidebarToggle">
      <i class="bi bi-list"></i>
    </button>
    <div class="admin-topbar-logo">
      <i class="bi bi-shield-check-fill"></i>
      LexiDecis
    </div>
    <div class="admin-topbar-title">
      Usuários
    </div>
    <div class="admin-topbar-spacer"></div>
    <div class="admin-topbar-user">
      <div class="user-info">
        <div class="user-avatar">
          <i class="bi bi-person-circle"></i>
        </div>
        <div class="user-details">
          <div class="user-name" id="currentUserName">Carregando...</div>
          <div class="user-role">Administrador</div>
        </div>
      </div>
      <button id="logoutBtn" class="logout-btn" title="Fazer logout">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- Sidebar backdrop for mobile -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Sidebar -->
  <div class="admin-sidebar" id="sidebar">
    <nav class="admin-sidebar-nav">
      <ul>
        <li><a href="index.html" class="admin-sidebar-link">
          <i class="bi bi-house-fill"></i>
          <span>Dashboard</span>
        </a></li>
        <li><a href="users.html" class="admin-sidebar-link active">
          <i class="bi bi-people-fill"></i>
          <span>Usuários</span>
        </a></li>
        <li><a href="units.html" class="admin-sidebar-link">
          <i class="bi bi-building-fill"></i>
          <span>Unidades</span>
        </a></li>
        <li><a href="gpts.html" class="admin-sidebar-link">
          <i class="bi bi-cpu-fill"></i>
          <span>GPTs</span>
        </a></li>
      </ul>
    </nav>
    <div class="admin-sidebar-footer">
      <div class="sidebar-footer-content">
        <i class="bi bi-shield-check-fill"></i>
        <div>LexiDecis Admin</div>
        <div class="sidebar-version">v2.0</div>
      </div>
    </div>
  </div>

  <div class="admin-content">
    <div class="container-fluid">
      <div class="page-title d-flex justify-content-between align-items-center">
        <div>
          <h2>Usuários</h2>
          <p class="mb-0 text-title-gray">Gerenciar usuários do sistema</p>
        </div>
        <div>
          <button id="createUserBtn" class="btn btn-secondary">
            <i class="bi bi-person-plus"></i> Novo Usuário
          </button>
        </div>
      </div>
      <ol class="breadcrumb mt-2">
        <li class="breadcrumb-item"><a href="index.html"><i class="bi bi-house-fill"></i> Dashboard</a></li>
        <li class="breadcrumb-item active">Usuários</li>
      </ol>
      
      <div id="content">
        <!-- Conteúdo será injetado via JS -->
      </div>
    </div>
  </div>

  <!-- Modais -->
  <div class="modal fade" id="createUserModal" tabindex="-1" aria-labelledby="createUserModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="createUserModalLabel">Novo Usuário</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <!-- Formulário de criação de usuário será injetado via JS -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="submitCreateUser" class="btn btn-secondary">Criar Usuário</button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editUserModalLabel">Editar Usuário</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <!-- Formulário de edição de usuário será injetado via JS -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="submitEditUser" class="btn btn-warning">Salvar Alterações</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.print.min.js"></script>
  <!-- Select2 JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  
  <script type="module">
    import AuthService from "./assets/js/auth.js";
    import * as API from "./assets/js/api.js";
    import * as DOM from "./assets/js/dom.js";
    import { initMain } from "./assets/js/main.js";

    // Função para atualizar informações do usuário
    function updateUserInfo(user) {
      const userNameElement = document.getElementById('currentUserName');
      if (userNameElement) {
        const displayName = user.displayName || user.email?.split('@')[0] || 'Usuário';
        userNameElement.textContent = displayName;
      }
    }

    // Função para fazer logout
    async function handleLogout() {
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.disabled = true;
        logoutBtn.innerHTML = '<i class="bi bi-arrow-repeat"></i>';
        
        try {
          const result = await AuthService.logout();
          if (result.success) {
            window.location.href = "login.html";
          } else {
            throw new Error(result.error || 'Erro ao fazer logout');
          }
        } catch (error) {
          console.error('Erro ao fazer logout:', error);
          alert('Erro ao fazer logout. Tente novamente.');
          
          logoutBtn.disabled = false;
          logoutBtn.innerHTML = '<i class="bi bi-box-arrow-right"></i>';
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      AuthService.onAuthChange(async (user) => {
        if (user) {
          // Atualizar informações do usuário no topbar
          updateUserInfo(user);
          
          // Inicializar funcionalidade específica da página de usuários
          initMain(AuthService, API, DOM);

          // Configurar botão de logout
          const logoutBtn = document.getElementById('logoutBtn');
          if (logoutBtn) {
            logoutBtn.addEventListener('click', handleLogout);
          }

          // Inicializar sidebar usando o SidebarManager
          const { initSidebar } = await import('./assets/js/sidebar.js');
          const sidebarManager = initSidebar();
        } else {
          // Redirecionar para login se não autenticado
          window.location.href = "login.html?redirect=" + encodeURIComponent(window.location.href);
        }
      });
    });
  </script>
</body>
</html>
