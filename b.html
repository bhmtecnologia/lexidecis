<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Botões Modernos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* Estilos gerais */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            background-color: #f4f6f8;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            color: #333;
            width: 100%;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        button {
            cursor: pointer;
        }

        /* 1. Glass Button */
        .glass-button {
            width: 150px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1), inset 0 1px rgba(255, 255, 255, 0.5);
            color: #fff;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .glass-button:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.4);
        }

        /* 2. Neon Button */
        .neon-button {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: #3B81F6;
            border: none;
            border-radius: 10px;
            box-shadow: 0 0 5px #3B81F6, 0 0 20px #3B81F6, 0 0 40px #3B81F6;
            transition: all 0.3s ease;
        }

        .neon-button:hover {
            box-shadow: 0 0 10px #89D1F6, 0 0 30px #89D1F6, 0 0 60px #89D1F6;
            background: #89D1F6;
        }

        /* 3. Ripple Button */
        .ripple-button {
            position: relative;
            overflow: hidden;
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: #3B81F6;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .ripple-button:hover {
            background-color: #0056b3;
        }

        .ripple-button::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 20%, transparent 20%);
            background-position: center;
            background-repeat: no-repeat;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform 0.5s, opacity 1s;
        }

        .ripple-button:active::after {
            transform: scale(0, 0);
            opacity: 0.3;
            transition: 0s;
        }

        /* 4. Animated Icon Button */
        .icon-button {
            width: 60px;
            height: 60px;
            background-color: #007bff;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            transition: background-color 0.3s ease;
        }

        .icon-button:hover {
            background-color: #0056b3;
        }

        /* 5. Button with Gradient */
        .gradient-button {
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background: linear-gradient(45deg, #3B81F6, #89D1F6);
            border: none;
            border-radius: 10px;
            transition: background 0.3s ease;
        }

        .gradient-button:hover {
            background: linear-gradient(45deg, #89D1F6, #3B81F6);
        }

        /* 6. Three-dimensional Button */
        .three-d-button {
            width: 150px;
            height: 50px;
            background: linear-gradient(145deg, #f0f0f3, #e0e0e3);
            border-radius: 10px;
            box-shadow: 6px 6px 12px #bebebe, -6px -6px 12px #ffffff;
            color: #666;
            font-size: 16px;
            transition: all 0.2s ease-in-out;
        }

        .three-d-button:active {
            box-shadow: inset 6px 6px 12px #bebebe, inset -6px -6px 12px #ffffff;
            transform: translateY(2px);
        }

        /* 7. Morph Button */
        .morph-button {
            width: 60px;
            height: 60px;
            background-color: #3B81F6;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .morph-button.active {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            background-color: #0056b3;
        }

        /* 8. Toggle Switch */
        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: #ccc;
            border-radius: 30px;
            cursor: pointer;
        }

        .toggle-switch:before {
            content: "";
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .toggle-switch.active {
            background: #3B81F6;
        }

        .toggle-switch.active:before {
            transform: translateX(30px);
        }

        /* 9. Floating Action Button */
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #3B81F6;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .fab:hover {
            transform: translateY(-2px);
        }

        /* 10. Button with Tooltip */
        .tooltip-button {
            position: relative;
            padding: 10px 20px;
            background: #3B81F6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .tooltip-button:hover::after {
            content: "Clique para iniciar";
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <h1>10 Botões Modernos</h1>

    <div class="button-container">
        <button class="glass-button">Glass Button</button>
        <button class="neon-button">Neon Button</button>
        <button class="ripple-button">Ripple Button</button>
        <button class="icon-button"><i class="bi bi-heart"></i></button>
        <button class="gradient-button">Gradient Button</button>
        <button class="three-d-button">3D Button</button>
        <button id="morphButton" class="morph-button">Morph</button>
        <div id="toggleSwitch" class="toggle-switch"></div>
        <button class="fab"><i class="bi bi-plus"></i></button>
        <button class="tooltip-button">Tooltip</button>
    </div>

    <script>
        // Morph Button
        document.getElementById('morphButton').addEventListener('click', function () {
            this.classList.toggle('active');
        });

        // Toggle Switch
        document.getElementById('toggleSwitch').addEventListener('click', function () {
            this.classList.toggle('active');
        });
    </script>
</body>
</html>
