<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LexiDecis v2 - Chat</title>
  
  <!-- Favicon -->
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <!-- Select2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
  
  <!-- Simplebar CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simplebar@6.2.3/dist/simplebar.min.css">
  
  <!-- Tippy.js CSS -->
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css">
  
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="./src/styles/base/variables.css">
  <link rel="stylesheet" href="./src/styles/layouts/chat.layout.css">
  <link rel="stylesheet" href="./src/styles/components/sidebar.css">
  <link rel="stylesheet" href="./assets/css/color-chat.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen" class="hidden">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>
  </div>

  <!-- Main Wrapper -->
  <div id="wrapper">
    <!-- Sidebar -->
    <nav id="chat-sidebar">
      <header class="sidebar-header">
        <h5 class="mb-0">LexiDecis</h5>
        <div>
          <button id="toggle-sidebar" class="btn btn-sm btn-outline-secondary" title="Alternar sidebar">
            <i class="bi bi-chevron-left"></i>
          </button>
        </div>
      </header>
      
      <main class="flex-grow-1">
        <!-- Search -->
        <div class="px-3 py-2">
          <select id="chat-search" class="form-select">
            <option value="">Pesquisar chats...</option>
          </select>
        </div>
        
        <!-- New Chat Button -->
        <div class="px-3 py-2">
          <button id="new-chat" class="btn btn-primary w-100">
            <i class="bi bi-plus-circle me-2"></i>
            Nova Conversa
          </button>
        </div>
        
        <!-- Chat List -->
        <div class="px-3 py-2">
          <h6 class="text-muted mb-2">Chats Recentes</h6>
          <ul id="chat-list" class="list-unstyled">
            <li class="px-3 py-2 text-muted">Carregando chats...</li>
          </ul>
        </div>
        
        <!-- GPT Explorer -->
        <div class="px-3 py-2">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="text-muted mb-0">Assistentes</h6>
            <button id="explore-gpt-item" class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#gptModal">
              <i class="bi bi-grid-3x3-gap"></i>
            </button>
          </div>
          <ul id="ai-providers-list" class="list-unstyled">
            <li class="px-3 py-2 text-muted">Carregando assistentes...</li>
          </ul>
        </div>
      </main>
      
      <!-- User Menu -->
      <div class="sidebar-bottom">
        <button id="userMenuBtn" class="w-100 border-0 bg-transparent text-start">
          <i class="bi bi-person-circle me-2"></i>
          <span id="user-name">Usuário</span>
          <i class="bi bi-chevron-up ms-auto"></i>
        </button>
        <ul id="userMenu" class="hidden">
          <li>
            <button id="logout-btn" class="dropdown-item text-danger">
              <i class="bi bi-box-arrow-right me-2"></i>
              Sair
            </button>
          </li>
        </ul>
      </div>
    </nav>
    
    <!-- Mini Sidebar -->
    <div id="sidebar-mini" class="hidden">
      <button id="mini-toggle" title="Mostrar sidebar">
        <i class="bi bi-chevron-right"></i>
      </button>
      <button id="mini-new" title="Nova conversa">
        <i class="bi bi-plus-circle"></i>
      </button>
      <button id="mini-user" title="Menu do usuário">
        <i class="bi bi-person-circle"></i>
      </button>
    </div>
    
    <!-- Chat Area -->
    <section id="chat-area">
      <flowise-fullchatbot></flowise-fullchatbot>
    </section>
  </div>
  
  <!-- GPT Explorer Modal -->
  <div class="modal fade" id="gptModal" tabindex="-1" aria-labelledby="gptModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="gptModalLabel">Explorar Assistentes</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body" id="gptModalBody">
          <div class="row" id="gpt-grid">
            <div class="col-12 text-center">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Carregando...</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Scripts -->
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  
  <!-- Select2 JS -->
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  
  <!-- Simplebar JS -->
  <script src="https://cdn.jsdelivr.net/npm/simplebar@6.2.3/dist/simplebar.min.js"></script>
  
  <!-- Tippy.js -->
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  
  <!-- Status Indicator -->
  <script src="./assets/js/status-indicator.js"></script>
  
  <!-- Flowise Web Widget -->
  <script src="./assets/js/web.js"></script>
  
  <!-- Main Application -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
