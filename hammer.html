<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Swipe com Hammer.js</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        /* Estilos básicos para o exemplo */
        body {
            overflow-x: hidden;
        }
        #sidebarMenu {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background: #343a40;
            color: #fff;
            transition: left 0.3s ease;
        }
        #sidebarMenu.active {
            left: 0;
        }
        .content {
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }
        .content.active {
            margin-left: 250px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebarMenu">
        <h2 class="p-3">Sidebar</h2>
        <p class="p-3">Conteúdo da sidebar...</p>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="content">
        <button class="btn btn-primary m-3" id="toggleSidebar">Toggle Sidebar</button>
        <h1 class="m-3">Conteúdo Principal</h1>
        <p class="m-3">Deslize para a direita para abrir a sidebar e para a esquerda para fechá-la.</p>
    </div>

    <!-- Hammer.js -->
    <script src="https://hammerjs.github.io/dist/hammer.min.js"></script>
    <script>
        const sidebar = document.getElementById('sidebarMenu');
        const content = document.querySelector('.content');
        const toggleButton = document.getElementById('toggleSidebar');

        toggleButton.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            content.classList.toggle('active');
        });

        // Inicializa o Hammer.js
        const hammer = new Hammer(document.body);

        hammer.on('swipeleft', function() {
            // Swipe para a esquerda - fechar sidebar
            sidebar.classList.remove('active');
            content.classList.remove('active');
        });

        hammer.on('swiperight', function() {
            // Swipe para a direita - abrir sidebar
            sidebar.classList.add('active');
            content.classList.add('active');
        });
    </script>
</body>
</html>
