<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="lexiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ed760;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#17b456;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#lexiGradient)" stroke="#ffffff" stroke-width="8"/>

  <!-- LexiDecis letters -->
  <text x="256" y="200" font-family="Arial, sans-serif" font-size="80" font-weight="bold" text-anchor="middle" fill="#ffffff">L</text>
  <text x="256" y="280" font-family="Arial, sans-serif" font-size="60" font-weight="600" text-anchor="middle" fill="#ffffff">Decis</text>

  <!-- Small accent elements -->
  <circle cx="180" cy="180" r="8" fill="#ffffff" opacity="0.8"/>
  <circle cx="332" cy="180" r="8" fill="#ffffff" opacity="0.8"/>
  <circle cx="180" cy="332" r="8" fill="#ffffff" opacity="0.8"/>
  <circle cx="332" cy="332" r="8" fill="#ffffff" opacity="0.8"/>
</svg>
