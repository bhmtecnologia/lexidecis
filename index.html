<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LexiDecis - Inteligência Artificial Corporativa</title>

    <!-- Link para o CSS do Bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Link para Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Link para o arquivo CSS externo -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Cabeçalho - Navbar -->
    <header id="main-header" class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">BHM Tecnologia</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Alternar navegação">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <!-- Formulário de Busca Rápida -->
                <form class="d-flex me-auto" role="search">
                    <input class="form-control me-2" type="search" placeholder="Pesquisar chats..." aria-label="Pesquisar">
                    <button class="btn btn-outline-light" type="submit"><i class="bi bi-search"></i></button>
                </form>
                <!-- Botões do Menu -->
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <button id="new-chat-button" class="btn btn-light me-2" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Iniciar uma nova conversa">
                            <i class="bi bi-chat-dots"></i> Novo Chat
                        </button>
                    </li>
                    <li class="nav-item">
                        <button id="select-gpt-button" class="btn btn-light me-2" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Selecionar o modelo GPT para esta conversa">
                            <i class="bi bi-robot"></i> Escolher GPT
                        </button>
                    </li>
                    <li class="nav-item">
                        <button id="hide-header-button" class="btn btn-light me-2" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Ocultar o cabeçalho para mais espaço de trabalho">
                            <i class="bi bi-chevron-up"></i> Ocultar Cabeçalho
                        </button>
                    </li>
                    <!-- Dropdown de Configurações -->
                    <li class="nav-item dropdown">
                        <button class="btn btn-light dropdown-toggle" id="settingsDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-gear"></i> Configurações
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="settingsDropdown">
                            <li><a class="dropdown-item" href="#">Perfil</a></li>
                            <li><a class="dropdown-item" href="#">Preferências</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#">Sair</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <!-- Botão para mostrar o cabeçalho quando oculto -->
    <button id="show-header-button" class="btn btn-primary fixed-top mt-3 ms-3 d-none" data-bs-toggle="tooltip" data-bs-placement="right" title="Mostrar Cabeçalho">
        <i class="bi bi-chevron-down"></i>
    </button>

    <!-- Modal para Seleção de GPT -->
    <div class="modal fade" id="gpt-modal" tabindex="-1" aria-labelledby="gpt-modal-title" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="gpt-modal-title">Escolha um GPT</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <ul class="list-group" id="gpt-list">
                        <!-- Lista de GPTs será populada aqui -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <main class="flex-grow-1 container-fluid mt-5 pt-3">
        <div class="row g-4">
            <!-- Lista de chats dentro de um contêiner com altura flexível -->
            <div id="chat-list-container" class="col-md-3 col-lg-2 bg-white rounded shadow p-3">
                <!-- Campo de pesquisa com ícone de lupa e botão "X" -->
                <div class="input-group mb-3">
                    <span class="input-group-text" id="search-icon"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" id="search-input" placeholder="Pesquisar chats..." aria-label="Pesquisar chats" aria-describedby="search-icon">
                    <button class="btn btn-outline-secondary" type="button" id="clear-search-button">&times;</button>
                </div>
                <ul id="chat-list" class="list-group overflow-auto" style="max-height: 70vh;">
                    <!-- A lista de chats será populada dinamicamente -->
                    <!-- Inicialmente vazio, será preenchida pelo JavaScript -->
                </ul>
            </div>

            <!-- Contêiner do chatbot -->
            <div id="chatbot-container" class="col-md-9 col-lg-10 bg-white rounded shadow p-3">
                <!-- Componente do chatbot -->
                <flowise-fullchatbot></flowise-fullchatbot>
            </div>
        </div>
    </main>

    <!-- Container para mensagens de erro -->
    <div id="error-container" class="alert alert-danger position-fixed bottom-0 end-0 m-3 d-none" role="alert">
        <!-- Mensagem de erro será exibida aqui -->
    </div>

    <!-- Link para o JavaScript do Bootstrap via CDN (necessário para os componentes JS do Bootstrap) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Link para o arquivo JavaScript externo -->
    <script type="module" src="renderer.js"></script>

    <!-- Inicialização dos Tooltips -->
    <script>
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
          return new bootstrap.Tooltip(tooltipTriggerEl)
        })
    </script>
</body>
</html>
