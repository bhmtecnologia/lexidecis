<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiDecis - Inteligência Artificial Corporativa</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- CSS externo -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebarMenu" class="sidebar d-flex flex-column p-3">
        <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <img src="https://www.bhm.tec.br/images/152x152/10788698/favicon.png" alt="Logo" width="30" height="30" class="me-2">
            <span class="fs-4">BHM Tecnologia</span>
        </a>
        <hr>
        <!-- Campo de pesquisa -->
        <div class="input-group mb-3">
            <span class="input-group-text" id="search-icon"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="search-input" placeholder="Pesquisar chats..." aria-label="Pesquisar chats" aria-describedby="search-icon">
            <button class="btn btn-outline-secondary" type="button" id="clear-search-button">&times;</button>
        </div>
        <!-- Lista de chats com rolagem automática -->
        <ul id="chat-list" class="list-group chat-list overflow-auto custom-chat-list-height">
            <!-- A lista de chats será populada dinamicamente -->
        </ul>
        <hr>
        <!-- Botões e campos na sidebar -->
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <button id="new-chat-button" class="nav-link text-white btn btn-link" data-bs-toggle="tooltip" data-bs-placement="right" title="Iniciar uma nova conversa">
                    <i class="bi bi-chat-dots"></i> Novo Chat
                </button>
            </li>
            <li>
                <button id="select-gpt-button" class="nav-link text-white btn btn-link" data-bs-toggle="tooltip" data-bs-placement="right" title="Selecionar o modelo GPT para esta conversa">
                    <i class="bi bi-robot"></i> Escolher GPT
                </button>
            </li>
            <li>
                <a href="#" class="nav-link text-white" data-bs-toggle="collapse" data-bs-target="#submenu" aria-expanded="false">
                    <i class="bi bi-gear"></i> Configurações
                </a>
                <ul class="collapse list-unstyled" id="submenu">
                    <li><a href="#" class="nav-link text-white ms-3">Perfil</a></li>
                    <li><a href="#" class="nav-link text-white ms-3">Preferências</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a href="#" class="nav-link text-white ms-3">Sair</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="content">
        <!-- Botão para toggler Sidebar em dispositivos móveis -->
        <button class="btn btn-primary mb-3 d-md-none" type="button" id="sidebarToggle">
            <i class="bi bi-list"></i>
        </button>
        <!-- Componente do chatbot -->
        <div id="chatbot-container">
        <!--    <flowise-fullchatbot></flowise-fullchatbot> -->
        </div>
    </div>

    <!-- Modal para Seleção de GPT -->
    <div class="modal fade" id="gpt-modal" tabindex="-1" aria-labelledby="gpt-modal-title" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Escolha um GPT</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <ul class="list-group" id="gpt-list">
                        <!-- Lista de GPTs será populada aqui -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

<!-- Modal de Renomear Chat -->
<div class="modal fade" id="rename-chat-modal" tabindex="-1" aria-labelledby="renameChatModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="rename-chat-form">
                <div class="modal-header">
                    <h5 class="modal-title" id="renameChatModalLabel">Renomear Chat</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="new-chat-name" class="form-label">Novo Nome do Chat</label>
                        <input type="text" class="form-control" id="new-chat-name" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

    <!-- Container para mensagens de erro -->
    <div id="error-container" class="alert alert-danger position-fixed bottom-0 end-0 m-3 d-none" role="alert">
        <!-- Mensagem de erro será exibida aqui -->
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Seu JavaScript externo -->
    <script type="module" src="renderer.js"></script>
</body>
</html>
