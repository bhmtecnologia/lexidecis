<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1ed760">
    <meta name="application-name" content="LexiDecis">
    <meta name="description" content="Transformando a Inteligência Competitiva com IA avançada para decisões jurídicas e empresariais">
    <meta name="keywords" content="IA, inteligência artificial, jurídica, empresarial, decisões, LexiDecis">
    <meta name="author" content="LexiDecis">

    <title>LexiDecis - Inteligência Competitiva</title>

    <!-- Favicon e ícones -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <!-- Apple Touch Icons para iOS -->
    <link rel="apple-touch-icon" sizes="57x57" href="/images/icons/icon-72x72.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/images/icons/icon-72x72.png">
    <link rel="apple-touch-icon" sizes="114x114" href="/images/icons/icon-144x144.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/images/icons/icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/images/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/icons/icon-512x512-1.png">
    <!-- Ícones padrão -->
    <link rel="icon" type="image/png" sizes="72x72" href="/images/icons/icon-72x72.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/images/icons/icon-96x96.png">
    <link rel="icon" type="image/png" sizes="128x128" href="/images/icons/icon-128x128.png">
    <link rel="icon" type="image/png" sizes="144x144" href="/images/icons/icon-144x144.png">
    <link rel="icon" type="image/png" sizes="152x152" href="/images/icons/icon-152x152.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/images/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="256x256" href="/images/gpts/image_lexi-ico.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/images/icons/icon-512x512-1.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

        <!-- GSAP para Animações -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>

    <!-- Three.js para Animações 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>

    <!-- Estilos Internos -->
    <style>
        /* Variáveis de Cores */
        :root {
            --primary-color: #1ed760;
            --secondary-color: #ffffff;
            --bg-color: #000000;
            --text-color: #ffffff;
            --button-bg: #1ed760;
            --button-hover: #17b456;
        }

        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Corpo da Página */
        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* Canvas para Animações 3D */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Container Central */
        .intro-container {
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        /* Logotipo ou Título */
        .logo {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            opacity: 0;
        }

        /* Slogan ou Mensagem */
        .slogan {
            font-size: 1.5rem;
            margin-bottom: 40px;
            opacity: 0;
        }

        /* Botão de Acesso */
        .btn-start {
            background-color: var(--button-bg);
            color: var(--secondary-color);
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            opacity: 0;
            transform: scale(0.8);
        }

        .btn-start:hover {
            background-color: var(--button-hover);
            transform: scale(1.05);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
            }

            .slogan {
                font-size: 1.2rem;
            }

            .btn-start {
                padding: 12px 25px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 2rem;
            }

            .slogan {
                font-size: 1rem;
            }

            .btn-start {
                padding: 10px 20px;
                font-size: 0.8rem;
            }
        }

    </style>
</head>
<body>
    <!-- Canvas para Animações 3D -->
    <canvas id="bg-canvas"></canvas>

    <!-- Container Central -->
    <div class="intro-container">
        <div class="logo">LexiDecis</div>
        <div class="slogan">Transformando a Inteligência Competitiva</div>
        <button class="btn-start" id="start-button">Entrar</button>
    </div>

    <!-- Animações e navegação -->
    <script>
        class LexiDecisIntro {
            constructor() {
                this.init();
            }

            init() {
                this.setupAnimations();
                this.setupEventListeners();
            }

            // Configuração das animações
            setupAnimations() {
                // Configuração do Three.js
                this.setupThreeJS();

                // Animações de entrada com GSAP
                window.addEventListener('load', () => {
                    gsap.to(".logo", { duration: 1, opacity: 1, y: 0, ease: "power2.out" });
                    gsap.to(".slogan", { duration: 1, opacity: 1, y: 0, delay: 0.5, ease: "power2.out" });
                    gsap.to(".btn-start", { duration: 1, opacity: 1, scale: 1, delay: 1, ease: "power2.out" });
                });
            }

            // Configuração do Three.js
            setupThreeJS() {
                const canvas = document.getElementById('bg-canvas');
                if (!canvas) return;

                const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;

                // Geometria e Material
                const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
                const material = new THREE.MeshStandardMaterial({
                    color: 0x1ed760,
                    metalness: 0.5,
                    roughness: 0.1
                });
                const torusKnot = new THREE.Mesh(geometry, material);
                scene.add(torusKnot);

                // Iluminação
                const pointLight = new THREE.PointLight(0xffffff, 1);
                pointLight.position.set(5, 5, 5);
                scene.add(pointLight);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
                scene.add(ambientLight);

                // Animação
                const animate = () => {
                    requestAnimationFrame(animate);
                    torusKnot.rotation.x += 0.005;
                    torusKnot.rotation.y += 0.005;
                    renderer.render(scene, camera);
                };
                animate();

                // Responsividade
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            // Configuração dos event listeners
            setupEventListeners() {
                // Botão de entrada
                document.getElementById('start-button')?.addEventListener('click', () => {
                    this.navigateToLogin();
                });
            }

            // Navegação para login
            navigateToLogin() {
                gsap.to(".intro-container", {
                    duration: 1,
                    opacity: 0,
                    scale: 0.8,
                    ease: "power2.in",
                    onComplete: () => {
                        window.location.href = "pages/login.html";
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new LexiDecisIntro();
        });
    </script>
</body>
</html>
