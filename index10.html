<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiDecis - Login Matrix</title>
    <!-- Fonte Monoespaçada para Estilo Terminal -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <!-- Estilos Internos -->
    <style>
        /* Variáveis de Cores */
        :root {
            --primary-color: #00FF00; /* Verde Neon */
            --secondary-color: #00CC00; /* Verde Mais Escuro */
            --background-color: #000000; /* Preto */
            --card-bg: rgba(0, 0, 0, 0.85); /* Preto Semi-Transparente */
            --text-color: #00FF00; /* Verde Neon */
            --placeholder-color: #33FF33; /* Verde Claro */
            --button-bg: #00FF00;
            --button-hover-bg: #00CC00;
            --border-color: rgba(0, 255, 0, 0.2);
            --glow-color: rgba(0, 255, 0, 0.6);
        }

        /* Reset de Margens e Padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Corpo da Página */
        body {
            background: var(--background-color);
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            perspective: 1000px;
        }

        /* Canvas para Efeito Matrix */
        #matrixCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Container do Login */
        .login-container {
            position: relative;
            background: var(--card-bg);
            padding: 3rem 4rem;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            z-index: 1;
            max-width: 400px;
            width: 100%;
            transform: scale(0.95);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-container:hover {
            transform: scale(1);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
        }

        /* Título do Formulário */
        .login-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 700;
            font-family: 'Roboto Mono', monospace;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--glow-color);
            position: relative;
        }

        /* Linha Subjacente ao Título */
        .login-container h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--secondary-color);
            margin: 0.5rem auto 0;
            border-radius: 2px;
            box-shadow: 0 0 10px var(--secondary-color);
        }

        /* Estilo dos Campos de Input */
        .login-container .input-group {
            margin-bottom: 1.5rem;
        }

        .login-container .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-color);
        }

        .login-container .input-group input {
            width: 100%;
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: 'Roboto Mono', monospace;
        }

        .login-container .input-group input::placeholder {
            color: var(--placeholder-color);
        }

        .login-container .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
            background: rgba(0, 0, 0, 0.6);
        }

        /* Botão de Login */
        .login-container .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--button-bg);
            border: none;
            border-radius: 4px;
            color: #000000;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            font-family: 'Roboto Mono', monospace;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px var(--glow-color);
        }

        .login-container .btn-login::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.5s;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 0;
        }

        .login-container .btn-login:hover::after {
            transform: translate(-50%, -50%) scale(1);
        }

        .login-container .btn-login:hover {
            background: var(--button-hover-bg);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 198, 255, 0.4);
        }

        .login-container .btn-login:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* Links Auxiliares */
        .login-container .links {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }

        .login-container .links a {
            color: var(--secondary-color);
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
            font-family: 'Roboto Mono', monospace;
        }

        .login-container .links a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        /* Cursor Personalizado */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 15px;
            height: 15px;
            background: var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, background 0.3s ease;
            z-index: 2;
        }

        /* Efeitos Parallax no Container */
        .login-container {
            transform: rotateY(0deg);
            transition: transform 0.5s ease;
        }

        body:hover .login-container {
            transform: rotateY(10deg) translateX(calc(-50px + var(--x, 0))) translateY(calc(-10px + var(--y, 0)));
        }

        /* Responsividade */
        @media (max-width: 576px) {
            .login-container {
                padding: 2rem 2rem;
            }

            .login-container h2 {
                font-size: 1.75rem;
            }

            .login-container .btn-login {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <!-- Canvas para Efeito Matrix -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Container do Formulário de Login -->
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="tenant">Tenant</label>
                <input type="text" id="tenant" name="tenant" placeholder="Digite o Tenant" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email" required>
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
            <div class="links">
                <a href="#" onclick="resetPassword()">Esqueci minha senha</a>
                <a href="#" onclick="createAccount()">Criar conta</a>
            </div>
        </form>
    </div>

    <!-- Cursor Personalizado -->
    <div class="custom-cursor" id="customCursor"></div>

    <!-- Scripts -->
    <script>
        // Funções de Alerta para Links
        function resetPassword() {
            alert('Funcionalidade de redefinição de senha ainda não implementada.');
        }

        function createAccount() {
            alert('Funcionalidade de criação de conta ainda não implementada.');
        }

        // Canvas e Efeito Matrix
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        // Ajustar o tamanho do Canvas para cobrir toda a tela
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        // Caracteres para a chuva
        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}';
        const fontSize = 16;
        const columns = canvas.width / fontSize; // Número de colunas para a chuva de caracteres
        const drops = []; // Array para armazenar a posição das gotas

        // Inicializar as gotas
        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        // Função de desenho
        function draw() {
            // Fundo preto com opacidade para criar o efeito de desvanecimento
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00FF00'; // Cor verde neon
            ctx.font = fontSize + 'px Roboto Mono';

            // Desenhar cada caractere
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Reiniciar a posição da gota quando ela atingir o final
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                // Incrementar a posição da gota
                drops[i]++;
            }
        }

        // Executar a função de desenho a cada 35ms
        setInterval(draw, 35);

        // Ajustar o Canvas ao redimensionar a janela
        window.addEventListener('resize', () => {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        });

        // Cursor Personalizado
        const cursor = document.getElementById('customCursor');

        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        // Ocultar o cursor padrão
        document.body.style.cursor = 'none';

        // Formulário de Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const tenant = document.getElementById('tenant').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            // Validação básica
            if (!tenant || !email || !password) {
                alert('Por favor, preencha todos os campos.');
                return;
            }

            // Aqui você pode adicionar a lógica de autenticação, como enviar os dados para o servidor.

            // Exemplo de login bem-sucedido (substitua pela lógica real)
            // Para fins de demonstração, consideraremos qualquer entrada como válida
            alert(`Login bem-sucedido!\nTenant: ${tenant}\nEmail: ${email}`);
            window.location.href = 'chat.html'; // Redirecionar para chat.html
        });
    </script>
</body>
</html>
