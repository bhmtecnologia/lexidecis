<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiDecis - Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Estilos Internos -->
    <style>
        /* Variáveis de Cores */
        :root {
            --primary-gradient: linear-gradient(135deg, #ff416c, #ff4b2b);
            --secondary-gradient: linear-gradient(135deg, #1d976c, #93f9b9);
            --background-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #333333;
            --placeholder-color: #999999;
            --button-bg: #ff4b2b;
            --button-hover-bg: #ff416c;
            --link-color: #1d976c;
            --border-color: #e0e0e0;
        }

        /* Reset de Margens e Padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--background-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container Principal */
        .container-login {
            display: flex;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            height: 600px;
        }

        /* Lado Esquerdo - Ilustração */
        .left-section {
            flex: 1;
            background: var(--primary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Ilustração SVG ou Imagem */
        .left-section::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            top: -25%;
            left: -25%;
            animation: float 6s ease-in-out infinite;
        }

        .left-section img {
            width: 80%;
            max-width: 300px;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(360deg);
            }
        }

        /* Lado Direito - Formulário de Login */
        .right-section {
            flex: 1;
            padding: 3rem 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--secondary-gradient);
            position: relative;
            overflow: hidden;
        }

        /* Efeito de Partículas ou Elementos Decorativos */
        .right-section::before {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            top: -50px;
            right: -50px;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            margin-bottom: 1.5rem;
            font-size: 2rem;
            text-align: center;
        }

        .form-label {
            color: var(--text-color);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-control {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            color: var(--text-color);
            background: #ffffff;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control::placeholder {
            color: var(--placeholder-color);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--button-bg);
            box-shadow: 0 0 10px rgba(255, 75, 43, 0.5);
        }

        .btn-primary {
            background: var(--button-bg);
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-size: 1rem;
            color: #ffffff;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s;
            margin-top: 1rem;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: var(--button-hover-bg);
            transform: translateY(-3px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .link {
            color: var(--link-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .link:hover {
            color: var(--button-bg);
            text-decoration: underline;
        }

        /* Microinterações - Efeitos de Hover nos Inputs */
        .form-control:hover {
            border-color: var(--button-bg);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .container-login {
                flex-direction: column;
                height: auto;
            }

            .left-section, .right-section {
                width: 100%;
                height: auto;
            }

            .left-section {
                padding: 2rem 0;
            }

            .right-section {
                padding: 2rem;
            }

            h2 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container-login">
        <!-- Lado Esquerdo - Ilustração -->
        <div class="left-section">
            <img src="https://i.imgur.com/6Iej2c3.png" alt="Ilustração Login"> <!-- Substitua pela sua própria imagem ou SVG -->
        </div>

        <!-- Lado Direito - Formulário de Login -->
        <div class="right-section">
            <h2>Bem-vindo de Volta!</h2>
            <div class="mb-3">
                <label for="tenant" class="form-label">Tenant</label>
                <input type="text" id="tenant" class="form-control" placeholder="Digite o Tenant" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Digite seu email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required>
            </div>
            <button class="btn btn-primary w-100" onclick="login()">Entrar</button>
            <div class="mt-3 text-center">
                <a href="#" class="link" onclick="resetPassword()">Esqueci minha senha</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Firebase e Scripts Personalizados -->
    <script type="module" src="login.js" defer></script>
</body>
</html>
