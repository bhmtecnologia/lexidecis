<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiDecis - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <!-- Estilos Internos -->
    <style>
        /* Variáveis de Cores */
        :root {
            --bg-color: #0d0d0d;
            --card-bg: rgba(0, 0, 0, 0.6); /* Aumentar a opacidade para melhor visibilidade */
            --primary-color: #00f5d4;
            --input-bg: rgba(255, 255, 255, 0.1); /* Ajustar para melhor contraste */
            --text-color: #ffffff;
            --placeholder-color: #a0a0a0;
            --button-hover: #00e0b9;
            --link-color: #00f5d4;
            --border-color: rgba(255, 255, 255, 0.2);
            --neon-glow: #00f5d4;
        }

        /* Reset de Margens e Padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d0d;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* Efeitos de Partículas no Fundo */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0; /* Fundo */
            top: 0;
            left: 0;
        }

        /* Elemento de Luz Dinâmica */
        .dynamic-light {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,245,212,0.2) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pulse 4s infinite;
            z-index: 1; /* Abaixo do login */
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.2;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.4;
            }
        }

        /* Container do Login com Glassmorphism e Neon Glow */
        #login-container {
            position: relative;
            background: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            z-index: 5; /* Mais alto para ficar acima dos elementos decorativos */
            max-width: 450px;
            width: 100%;
            opacity: 0;
            transform: translateY(-50px);
            animation: slideIn 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards, float 6s ease-in-out infinite;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 2rem;
            text-align: center;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            position: relative;
            letter-spacing: 1px;
        }

        h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--primary-color);
            margin: 0.75rem auto 0;
            border-radius: 2px;
            box-shadow: 0 0 10px var(--neon-glow);
        }

        .form-label {
            color: var(--text-color);
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
            transition: color 0.3s;
        }

        .form-control {
            background: var(--input-bg);
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1.2rem;
            color: var(--text-color);
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            position: relative;
            z-index: 1;
        }

        .form-control::placeholder {
            color: var(--placeholder-color);
        }

        .form-control:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
            cursor: pointer;
            margin-top: 1.5rem;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.5s;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 0;
        }

        .btn-primary:hover::after {
            transform: translate(-50%, -50%) scale(1);
        }

        .btn-primary:hover {
            background-color: var(--button-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 245, 212, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: none;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 600;
        }

        a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        /* Efeitos Parallax no Container */
        body:hover #login-container {
            transform: translateY(calc(-50px + var(--y, 0))) translateX(calc(-50px + var(--x, 0)));
        }

        /* Responsividade */
        @media (max-width: 576px) {
            #login-container {
                padding: 2rem;
            }

            h2 {
                font-size: 1.8rem;
            }

            .btn-primary {
                font-size: 0.95rem;
            }
        }

        /* Elementos SVG Animados */
        .decorative-svg {
            position: absolute;
            top: 10%;
            right: 10%;
            width: 100px;
            height: 100px;
            fill: var(--primary-color);
            opacity: 0.2; /* Reduzir opacidade para menos distração */
            animation: rotate 20s linear infinite;
            z-index: 2; /* Abaixo do login */
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Cursor Personalizado */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, background 0.3s ease;
            z-index: 6; /* Acima de tudo */
        }

        /* Ocultar Scroll */
        body {
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- Partículas de Fundo -->
    <div id="particles-js"></div>

    <!-- Luz Dinâmica -->
    <div class="dynamic-light"></div>

    <!-- Elementos SVG Decorativos -->
    <svg class="decorative-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <polygon points="50,0 100,50 50,100 0,50" />
    </svg>

    <!-- Tela de Login -->
    <div id="login-container" class="card">
        <h2>Login</h2>
        <div class="mb-4">
            <label for="tenant" class="form-label">Tenant</label>
            <input type="text" id="tenant" class="form-control" placeholder="Digite o Tenant" required>
        </div>
        <div class="mb-4">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Digite seu email" required>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Senha</label>
            <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required>
        </div>
        <button class="btn btn-primary w-100" onclick="login()">Entrar</button>
        <div class="mt-4 text-center">
            <a href="#" onclick="resetPassword()">Esqueci minha senha</a>
        </div>
    </div>

    <!-- Cursor Personalizado -->
    <div class="custom-cursor" id="custom-cursor"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Particles.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <!-- Firebase e Scripts Personalizados -->
    <script type="module" src="login.js" defer></script>
    <!-- Script para Configurar Partículas -->
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 60,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#00f5d4"
                },
                "shape": {
                    "type": "circle",
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    }
                },
                "opacity": {
                    "value": 0.4,
                    "random": true,
                    "anim": {
                        "enable": true,
                        "speed": 0.5,
                        "opacity_min": 0.1,
                        "sync": false
                    }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": {
                        "enable": false
                    }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#00f5d4",
                    "opacity": 0.2,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 1,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "repulse"
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    },
                    "resize": true
                },
                "modes": {
                    "repulse": {
                        "distance": 100,
                        "duration": 0.4
                    },
                    "push": {
                        "particles_nb": 4
                    }
                }
            },
            "retina_detect": true
        });
    </script>
    <!-- Script para Cursor Personalizado e Efeitos Parallax -->
    <script>
        // Cursor Personalizado
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        // Efeitos Parallax no Container
        document.addEventListener('mousemove', (e) => {
            const { innerWidth, innerHeight } = window;
            const x = (e.clientX - innerWidth / 2) / 100; // Ajustado para menor intensidade
            const y = (e.clientY - innerHeight / 2) / 100;
            document.documentElement.style.setProperty('--x', `${x}px`);
            document.documentElement.style.setProperty('--y', `${y}px`);
        });
    </script>
</body>
</html>
