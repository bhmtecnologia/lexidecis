<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiDecis - Login Futurista</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS (Opcional, usado para facilitar a estilização) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Estilos Internos -->
    <style>
        /* Variáveis de Cores */
        :root {
            --primary-color: #00c6ff; /* Ciano Neon */
            --secondary-color: #0072ff; /* Azul Neon */
            --background-color: #0f0f0f; /* Preto Escuro */
            --card-bg: rgba(255, 255, 255, 0.1); /* Transparente */
            --text-color: #ffffff; /* Branco */
            --placeholder-color: #a0a0a0; /* Cinza Claro */
            --button-bg: var(--primary-color);
            --button-hover-bg: var(--secondary-color);
            --border-color: rgba(255, 255, 255, 0.2);
        }

        /* Reset de Margens e Padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--background-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
            perspective: 1000px;
        }

        /* Efeitos de Partículas no Fundo */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            top: 0;
            left: 0;
        }

        /* Luz Dinâmica com Efeito de Raio */
        .dynamic-light {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,198,255,0.3) 0%, rgba(0,198,255,0) 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pulse 6s infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.6;
            }
        }

        /* Container do Login com Efeitos 3D */
        #login-container {
            position: relative;
            background: var(--card-bg);
            padding: 2.5rem 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            z-index: 2;
            max-width: 400px;
            width: 100%;
            transform: rotateY(0deg);
            transition: transform 0.5s ease;
        }

        /* Animação de Hover para Rotação 3D */
        #login-container:hover {
            transform: rotateY(10deg);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 2rem;
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--secondary-color);
        }

        .form-label {
            color: var(--text-color);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            color: var(--text-color);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control::placeholder {
            color: var(--placeholder-color);
        }

        .form-control:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
        }

        .btn-primary {
            background: var(--button-bg);
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-size: 1rem;
            color: #ffffff;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.5s;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 0;
        }

        .btn-primary:hover::after {
            transform: translate(-50%, -50%) scale(1);
        }

        .btn-primary:hover {
            background: var(--button-hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 198, 255, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: none;
        }

        a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        a:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }

        /* Cursor Personalizado */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, background 0.3s ease;
            z-index: 3;
        }

        /* Efeitos Parallax no Container */
        body:hover #login-container {
            transform: rotateY(10deg) translateX(calc(-50px + var(--x, 0))) translateY(calc(-10px + var(--y, 0)));
        }

        /* Responsividade */
        @media (max-width: 576px) {
            #login-container {
                padding: 2rem 1.5rem;
            }

            h2 {
                font-size: 1.75rem;
            }

            .btn-primary {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de Fundo -->
    <div id="particles-js"></div>

    <!-- Luz Dinâmica -->
    <div class="dynamic-light"></div>

    <!-- Tela de Login Futurista -->
    <div id="login-container" class="card">
        <h2>LOGIN</h2>
        <div class="mb-3">
            <label for="tenant" class="form-label">Tenant</label>
            <input type="text" id="tenant" class="form-control" placeholder="Digite o Tenant" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Digite seu email" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Senha</label>
            <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required>
        </div>
        <button class="btn btn-primary" onclick="login()">Entrar</button>
        <div class="mt-3 text-center">
            <a href="#" onclick="resetPassword()">Esqueci minha senha</a>
        </div>
    </div>

    <!-- Cursor Personalizado -->
    <div class="custom-cursor" id="custom-cursor"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Particles.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <!-- Firebase e Scripts Personalizados -->
    <script type="module" src="login.js" defer></script>
    <!-- Script para Configurar Partículas -->
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 80,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#00c6ff"
                },
                "shape": {
                    "type": "circle",
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    }
                },
                "opacity": {
                    "value": 0.5,
                    "random": true,
                    "anim": {
                        "enable": true,
                        "speed": 0.5,
                        "opacity_min": 0.1,
                        "sync": false
                    }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": {
                        "enable": false
                    }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#00c6ff",
                    "opacity": 0.2,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 2,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "repulse"
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    },
                    "resize": true
                },
                "modes": {
                    "repulse": {
                        "distance": 100,
                        "duration": 0.4
                    },
                    "push": {
                        "particles_nb": 4
                    }
                }
            },
            "retina_detect": true
        });
    </script>
    <!-- Script para Cursor Personalizado e Efeitos Parallax -->
    <script>
        // Cursor Personalizado
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        // Efeitos Parallax no Container
        document.addEventListener('mousemove', (e) => {
            const { innerWidth, innerHeight } = window;
            const x = (e.clientX - innerWidth / 2) / 100;
            const y = (e.clientY - innerHeight / 2) / 100;
            document.documentElement.style.setProperty('--x', `${x}px`);
            document.documentElement.style.setProperty('--y', `${y}px`);
        });
    </script>
</body>
</html>
