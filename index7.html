<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiDecis - Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <!-- Estilos Internos -->
    <style>
        /* Variáveis de Cores */
        :root {
            --primary-color: #4A90E2; /* Azul Suave */
            --secondary-color: #50E3C2; /* Verde Água */
            --background-color: #1C1C1C; /* Preto Fosco */
            --card-bg: rgba(28, 28, 28, 0.85); /* Preto Semi-Transparente */
            --text-color: #FFFFFF; /* Branco */
            --placeholder-color: #B0B0B0; /* Cinza Claro */
            --button-bg: var(--primary-color);
            --button-hover-bg: var(--secondary-color);
            --border-color: rgba(255, 255, 255, 0.2);
            --glow-color: rgba(74, 144, 226, 0.6);
        }

        /* Reset de Margens e Padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--background-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* Efeitos de Fundo com Partículas */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            top: 0;
            left: 0;
        }

        /* Container do Login */
        #login-container {
            position: relative;
            background: var(--card-bg);
            padding: 3rem 4rem;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            z-index: 1;
            max-width: 400px;
            width: 100%;
            transform: scale(0.95);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        #login-container:hover {
            transform: scale(1);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 2rem;
            position: relative;
            text-shadow: 0 0 10px var(--glow-color);
        }

        /* Linha Subjacente ao Título */
        h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--secondary-color);
            margin: 0.5rem auto 0;
            border-radius: 2px;
            box-shadow: 0 0 10px var(--secondary-color);
        }

        .form-label {
            color: var(--text-color);
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            color: var(--text-color);
            transition: border-color 0.3s, box-shadow 0.3s;
            width: 100%;
        }

        .form-control::placeholder {
            color: var(--placeholder-color);
        }

        .form-control:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
        }

        .btn-primary {
            background: var(--button-bg);
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-size: 1rem;
            color: #FFFFFF;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            cursor: pointer;
            margin-top: 1.5rem;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.5s;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 0;
        }

        .btn-primary:hover::after {
            transform: translate(-50%, -50%) scale(1);
        }

        .btn-primary:hover {
            background: var(--button-hover-bg);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 198, 255, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .link {
            color: var(--secondary-color);
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        .link:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        /* Cursor Personalizado */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 15px;
            height: 15px;
            background: var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, background 0.3s ease;
            z-index: 2;
        }

        /* Animações de Movimento do Formulário */
        body {
            perspective: 1000px;
        }

        /* Responsividade */
        @media (max-width: 576px) {
            #login-container {
                padding: 2rem 2rem;
            }

            h2 {
                font-size: 1.75rem;
            }

            .btn-primary {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de Fundo -->
    <div id="particles-js"></div>

    <!-- Luz Dinâmica -->
    <div class="dynamic-light"></div>

    <!-- Tela de Login Ultra Inovadora -->
    <div id="login-container" class="card">
        <h2>Login</h2>
        <div class="mb-3">
            <label for="tenant" class="form-label">Tenant</label>
            <input type="text" id="tenant" class="form-control" placeholder="Digite o Tenant" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Digite seu email" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Senha</label>
            <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required>
        </div>
        <button class="btn btn-primary" onclick="login()">Entrar</button>
        <div class="mt-3 text-center">
            <a href="#" class="link" onclick="resetPassword()">Esqueci minha senha</a>
        </div>
    </div>

    <!-- Cursor Personalizado -->
    <div class="custom-cursor" id="custom-cursor"></div>

    <!-- Bootstrap JS (Opcional, para funcionalidades adicionais) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Particles.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <!-- Firebase e Scripts Personalizados -->
    <script type="module" src="login.js" defer></script>
    <!-- Script para Configurar Partículas -->
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 80,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#00c6ff"
                },
                "shape": {
                    "type": "circle",
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    }
                },
                "opacity": {
                    "value": 0.5,
                    "random": true,
                    "anim": {
                        "enable": true,
                        "speed": 0.5,
                        "opacity_min": 0.1,
                        "sync": false
                    }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": {
                        "enable": false
                    }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#00c6ff",
                    "opacity": 0.2,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 2,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "repulse"
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    },
                    "resize": true
                },
                "modes": {
                    "repulse": {
                        "distance": 100,
                        "duration": 0.4
                    },
                    "push": {
                        "particles_nb": 4
                    }
                }
            },
            "retina_detect": true
        });
    </script>
    <!-- Script para Cursor Personalizado e Efeitos Parallax -->
    <script>
        // Cursor Personalizado
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        // Efeitos Parallax no Container
        document.addEventListener('mousemove', (e) => {
            const { innerWidth, innerHeight } = window;
            const x = (e.clientX - innerWidth / 2) / 200;
            const y = (e.clientY - innerHeight / 2) / 200;
            document.documentElement.style.setProperty('--x', `${x}px`);
            document.documentElement.style.setProperty('--y', `${y}px`);
        });
    </script>
</body>
</html>
