<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiDecis - Login Matrix</title>
    <!-- Fonte Monoespaçada para Estilo Terminal -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Estilos básicos - variáveis de cores */
        :root {
            --primary-color: #00FF00;
            --secondary-color: #00CC00;
            --background-color: #000000;
            --card-bg: rgba(0, 0, 0, 0.85);
            --text-color: #00FF00;
            --placeholder-color: #33FF33;
            --button-bg: #00FF00;
            --button-hover-bg: #00CC00;
            --border-color: rgba(0, 255, 0, 0.2);
            --glow-color: rgba(0, 255, 0, 0.6);
        }

        body {
            background: var(--background-color);
            color: var(--text-color);
            font-family: 'Roboto Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #matrixCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .login-container {
            position: relative;
            background: var(--card-bg);
            padding: 2rem 3rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 1rem;
            font-weight: bold;
            font-size: 1.8rem;
            color: var(--primary-color);
            text-shadow: 0 0 8px var(--glow-color);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--text-color);
        }

        .input-group input {
            width: 100%;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            color: var(--text-color);
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px var(--primary-color);
        }

        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: var(--button-bg);
            border: none;
            border-radius: 5px;
            color: #000000;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: var(--button-hover-bg);
            box-shadow: 0 0 8px var(--button-hover-bg);
        }

        .links {
            text-align: center;
            margin-top: 1rem;
        }

        .links a {
            color: var(--secondary-color);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .links a:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div class="login-container">
        <h2>Login</h2>
        <!-- Removemos o atributo 'id' do formulário, já que não o utilizaremos -->
        <form>
            <div class="input-group">
                <label for="tenant">Tenant</label>
                <input type="text" id="tenant" name="tenant" placeholder="Digite o Tenant" value="bhm" readonly required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email" required>
            </div>
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <!-- Alteramos o botão para chamar a função 'login()' -->
            <button type="button" class="btn-login" onclick="login()">Entrar</button>
            <div class="links">
                <a href="#" onclick="resetPassword()">Esqueci minha senha</a>
            </div>
        </form>
    </div>

    <!-- Script do Efeito Matrix -->
    <script>
        // Efeito Matrix
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array.from({ length: columns }).fill(0);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00FF00';
            ctx.font = fontSize + 'px monospace';

            drops.forEach((y, x) => {
                const text = characters[Math.floor(Math.random() * characters.length)];
                ctx.fillText(text, x * fontSize, y * fontSize);

                if (y * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[x] = 0;
                }
                drops[x]++;
            });
        }

        setInterval(drawMatrix, 50);

        // Função para exibir alerta no link de esquecimento de senha
        function resetPassword() {
            alert('Funcionalidade de redefinição de senha ainda não implementada.');
        }
    </script>

    <!-- Inclusão do login.js e possíveis scripts do Firebase -->
    <!-- Certifique-se de que o login.js está corretamente referenciado e que os scripts do Firebase estão incluídos se necessários -->
    <!-- Firebase e Scripts Personalizados -->
    <script type="module" src="login.js" defer></script>
    <!-- Caso use o Firebase, inclua os scripts abaixo -->
    <!-- <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script> -->
</body>
</html>
