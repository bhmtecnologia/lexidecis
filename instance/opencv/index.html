<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OpenCV.js - Webcam Grayscale</title>
  <script type="text/javascript">
    var Module = {
      locateFile: function(path) {
        if (path.endsWith('.wasm')) {
          return 'https://docs.opencv.org/4.5.5/' + path;
        }
        return path;
      },
      onRuntimeInitialized: function() {
        console.log('OpenCV.js WASM initialized');
        onOpenCvReady();
      }
    };
  </script>
  <script src="https://docs.opencv.org/4.5.5/opencv.js" type="text/javascript"></script>
  <style>
    body { text-align: center; }
    video, canvas { border: 1px solid black; margin: 10px; }
  </style>
</head>
<body>
  <h3>Webcam original</h3>
  <video id="video" width="320" height="240" autoplay muted></video>
  <h3>OpenCV - Grayscale</h3>
  <canvas id="canvasOutput" width="320" height="240"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvasOutput = document.getElementById('canvasOutput');
    const ctx = canvasOutput.getContext('2d', { willReadFrequently: true });

    function showError(message) {
      // Clear canvas
      ctx.clearRect(0, 0, canvasOutput.width, canvasOutput.height);
      // Display error text
      ctx.font = "18px Arial";
      ctx.fillStyle = "red";
      ctx.textAlign = "center";
      ctx.fillText(message, canvasOutput.width / 2, canvasOutput.height / 2);
    }

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          video.srcObject = stream;
          video.play();
        })
        .catch(err => {
          console.error('getUserMedia error:', err);
          showError('Não foi possível acessar a câmera');
        });
    }

    function onOpenCvReady() {
      console.log('OpenCV.js ready');
      // Initialize camera and processing
      startCamera();
      video.addEventListener('playing', () => {
        console.log('Video playing, starting processing');
        const width = canvasOutput.width;
        const height = canvasOutput.height;
        const src = new cv.Mat(height, width, cv.CV_8UC4);
        const gray = new cv.Mat(height, width, cv.CV_8UC1);
        function process() {
          ctx.drawImage(video, 0, 0, width, height);
          const imgData = ctx.getImageData(0, 0, width, height);
          src.data.set(imgData.data);
          cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
          cv.imshow('canvasOutput', gray);
          requestAnimationFrame(process);
        }
        process();
      });
    }
  </script>
</body>
</html>
