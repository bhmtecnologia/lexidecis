<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OpenCV.js - Webcam Grayscale</title>
  <script type="text/javascript">
    var Module = {
      locateFile: function(path) {
        if (path.endsWith('.wasm')) {
          return 'https://docs.opencv.org/4.5.5/' + path;
        }
        return path;
      },
      onRuntimeInitialized: function() {
        console.log('OpenCV.js WASM initialized');
        onOpenCvReady();
      }
    };
  </script>
  <script src="https://docs.opencv.org/4.5.5/opencv.js" type="text/javascript"></script>
  <script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
  <style>
    body { text-align: center; }
    video, canvas { border: 1px solid black; margin: 10px; }
  </style>
</head>
<body>
  <h3>Webcam original</h3>
  <video id="video" width="320" height="240" autoplay muted></video>
  <h3>OpenCV - Grayscale</h3>
  <canvas id="canvasOutput" width="320" height="240"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvasOutput = document.getElementById('canvasOutput');
    const ctx = canvasOutput.getContext('2d', { willReadFrequently: true });

    function showError(message) {
      // Clear canvas
      ctx.clearRect(0, 0, canvasOutput.width, canvasOutput.height);
      // Display error text
      ctx.font = "18px Arial";
      ctx.fillStyle = "red";
      ctx.textAlign = "center";
      ctx.fillText(message, canvasOutput.width / 2, canvasOutput.height / 2);
    }

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          video.srcObject = stream;
          video.play();
        })
        .catch(err => {
          console.error('getUserMedia error:', err);
          showError('Não foi possível acessar a câmera');
        });
    }

    function onOpenCvReady() {
      console.log('OpenCV.js ready');
      // ZXing reader instance for QR/barcode decoding
      const codeReader = new ZXing.BrowserQRCodeReader();
      // Initialize camera and processing
      startCamera();
      video.addEventListener('playing', () => {
        console.log('Video playing, starting processing');
        const width = canvasOutput.width;
        const height = canvasOutput.height;
        // --- QR/barcode detection and decoding pipeline ---
        function process() {
          ctx.drawImage(video, 0, 0, width, height);
          const frame = new cv.Mat(height, width, cv.CV_8UC4);
          const grayFrame = new cv.Mat();
          let imageData = ctx.getImageData(0, 0, width, height);
          frame.data.set(imageData.data);
          cv.cvtColor(frame, grayFrame, cv.COLOR_RGBA2GRAY);

          // Detect contours for potential QR/barcodes
          let contours = new cv.MatVector();
          let hierarchy = new cv.Mat();
          cv.findContours(grayFrame, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

          for (let i = 0; i < contours.size(); i++) {
            let cnt = contours.get(i);
            let peri = cv.arcLength(cnt, true);
            let approx = new cv.Mat();
            cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
            if (approx.rows === 4) {
              // Order corners and apply perspective transform
              let srcCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [
                approx.data32S[0], approx.data32S[1],
                approx.data32S[2], approx.data32S[3],
                approx.data32S[4], approx.data32S[5],
                approx.data32S[6], approx.data32S[7]
              ]);
              let dstCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [0,0,width,0,width,height,0,height]);
              let M = cv.getPerspectiveTransform(srcCoords, dstCoords);
              let aligned = new cv.Mat();
              cv.warpPerspective(frame, aligned, M, new cv.Size(width, height));

              // Prepare a temporary canvas for ZXing
              const alignedImageData = new ImageData(new Uint8ClampedArray(aligned.data), width, height);
              const tmpCanvas = document.createElement('canvas');
              tmpCanvas.width = width;
              tmpCanvas.height = height;
              const tmpCtx = tmpCanvas.getContext('2d');
              tmpCtx.putImageData(alignedImageData, 0, 0);

              // Decode with ZXing via an Image element, fallback to jsQR
              const imageUrl = tmpCanvas.toDataURL();
              const img = new Image();
              img.onload = () => {
                codeReader.decodeFromImageElement(img)
                  .then(result => console.log('ZXing decoded:', result.getText()))
                  .catch(() => {
                    let jsResult = jsQR(alignedImageData.data, width, height);
                    if (jsResult) console.log('jsQR decoded:', jsResult.data);
                  });
              };
              img.src = imageUrl;

              // Clean up
              aligned.delete(); M.delete(); srcCoords.delete(); dstCoords.delete();
              approx.delete();
            }
            cnt.delete();
          }
          hierarchy.delete(); contours.delete();

          // Show grayscale frame
          cv.imshow('canvasOutput', grayFrame);

          frame.delete(); grayFrame.delete();
          requestAnimationFrame(process);
        }
        process();
      });
    }
  </script>
</body>
</html>
