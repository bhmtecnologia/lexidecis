<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de Documentos Corporativo</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
            flex-direction: column;
        }

        .game-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            max-width: 900px;
            width: 100%;
            box-sizing: border-box;
            margin: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .instructions {
            color: #555;
            font-size: 1.1em;
            margin-bottom: 25px;
        }

        .document-area {
            background-color: #ecf0f1;
            border: 2px dashed #bdc3c7;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            display: inline-block;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Estilo para os ícones de documento */
        #current-document-icon {
            font-size: 80px; /* Tamanho do ícone */
            color: #34495e;
            cursor: grab;
            transition: transform 0.1s ease-out, opacity 0.3s ease;
            margin-bottom: 10px;
            display: block; /* Garante que o ícone é visível */
        }

        #current-document-icon:active {
            cursor: grabbing;
        }

        #document-name {
            font-weight: bold;
            color: #34495e;
        }

        .drop-zones {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .drop-zone {
            background-color: #e0f2f7;
            border: 2px solid #a7d9e7;
            border-radius: 8px;
            padding: 15px;
            width: 180px;
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            box-sizing: border-box;
        }

        .drop-zone h3 {
            color: #2980b9;
            margin-top: 0;
            margin-bottom: 10px;
        }

        /* Estilo para os ícones de pasta */
        .drop-zone i {
            font-size: 60px; /* Tamanho do ícone da pasta */
            color: #2980b9;
            margin-bottom: 5px;
        }

        .drop-zone.hover {
            background-color: #c9e9f1;
            border-color: #6ed1e2;
        }

        .feedback-area {
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        #feedback-message {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        #feedback-message.correct {
            color: #27ae60;
        }

        #feedback-message.incorrect {
            color: #e74c3c;
        }

        #score-display {
            font-size: 1.1em;
            font-weight: bold;
            color: #34495e;
        }

        #next-button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s ease;
            margin-top: 20px;
        }

        #next-button:hover {
            background-color: #2980b9;
        }

        /* Estilos para a tela final */
        .game-over-screen {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            margin: 20px;
            display: none; /* Inicia oculto */
        }

        .game-over-screen h2 {
            color: #2c3e50;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .game-over-screen p {
            font-size: 1.3em;
            margin-bottom: 25px;
        }

        .game-over-screen button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.2s ease;
        }

        .game-over-screen button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    <div class="game-container" id="game-main-container">
        <h1>Classificador de Documentos</h1>
        <p class="instructions">Arraste cada documento para a pasta correta.</p>

        <div class="document-area">
            <i id="current-document-icon" class="fa-solid fa-file" draggable="true"></i>
            <p id="document-name">Documento Padrão</p>
        </div>

        <div class="drop-zones">
            <div class="drop-zone" id="zone-contratos" data-category="Contratos">
                <i class="fa-solid fa-folder-open"></i>
                <h3>Contratos</h3>
            </div>
            <div class="drop-zone" id="zone-financeiro" data-category="Financeiro">
                <i class="fa-solid fa-folder-open"></i>
                <h3>Financeiro</h3>
            </div>
            <div class="drop-zone" id="zone-rh" data-category="RH">
                <i class="fa-solid fa-folder-open"></i>
                <h3>Recursos Humanos</h3>
            </div>
            <div class="drop-zone" id="zone-geral" data-category="Geral">
                <i class="fa-solid fa-folder-open"></i>
                <h3>Geral</h3>
            </div>
            </div>

        <div class="feedback-area">
            <p id="feedback-message"></p>
            <p id="score-display">Pontuação: 0</p>
            <button id="next-button" style="display: none;">Próximo Documento</button>
        </div>
    </div>

    <div class="game-over-screen" id="game-over-screen">
        </div>

    <script>
        // Dados do jogo: documentos, seus ícones e categorias corretas
        const allDocuments = [
            { id: 'doc1', name: 'Contrato de Serviço', iconClass: 'fa-file-contract', category: 'Contratos' },
            { id: 'doc2', name: 'Relatório Financeiro', iconClass: 'fa-file-invoice-dollar', category: 'Financeiro' },
            { id: 'doc3', name: 'Aviso de Férias', iconClass: 'fa-user-tie', category: 'RH' },
            { id: 'doc4', name: 'Proposta Comercial', iconClass: 'fa-handshake', category: 'Contratos' },
            { id: 'doc5', name: 'Demonstrativo de Fluxo de Caixa', iconClass: 'fa-chart-line', category: 'Financeiro' },
            { id: 'doc6', name: 'Política de Benefícios', iconClass: 'fa-people-group', category: 'RH' },
            { id: 'doc7', name: 'Ata de Reunião', iconClass: 'fa-clipboard-list', category: 'Geral' }, // Agora tem a pasta 'Geral'
            { id: 'doc8', name: 'Orçamento de Projeto', iconClass: 'fa-piggy-bank', category: 'Financeiro' },
            { id: 'doc9', name: 'Guia de Boas-Vindas', iconClass: 'fa-hand-sparkles', category: 'RH' },
            { id: 'doc10', name: 'Memorando Interno', iconClass: 'fa-envelope-open-text', category: 'Geral' },
            // Sugestão: adicione mais documentos aqui para ter uma lista maior!
            // Exemplo para uma nova categoria 'Marketing' (se você adicionar a pasta Marketing no HTML):
            // { id: 'doc11', name: 'Plano de Campanha', iconClass: 'fa-bullhorn', category: 'Marketing' },
        ];

        let shuffledDocuments = [];
        let currentDocumentIndex = 0;
        let score = 0;
        let droppedCorrectly = false;

        let currentDocumentIcon, documentNameP, dropZones, feedbackMessage, scoreDisplay, nextButton, gameMainContainer, gameOverScreen;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function loadNextDocument() {
            if (currentDocumentIndex < shuffledDocuments.length) {
                const doc = shuffledDocuments[currentDocumentIndex];
                currentDocumentIcon.className = '';
                currentDocumentIcon.classList.add('fa-solid', doc.iconClass);

                documentNameP.textContent = doc.name;
                currentDocumentIcon.setAttribute('data-current-category', doc.category);
                currentDocumentIcon.style.display = 'block';
                currentDocumentIcon.style.opacity = 1;
                currentDocumentIcon.draggable = true;
                droppedCorrectly = false;
                feedbackMessage.textContent = '';
                feedbackMessage.className = '';
                nextButton.style.display = 'none';
            } else {
                endGame();
            }
        }

        function endGame() {
            gameMainContainer.style.display = 'none';
            gameOverScreen.style.display = 'block';

            gameOverScreen.innerHTML = `
                <h2>Jogo Concluído!</h2>
                <p>Você classificou ${score} documentos corretamente de ${shuffledDocuments.length}.</p>
                <button id="restart-button">Jogar Novamente</button>
            `;

            document.getElementById('restart-button').addEventListener('click', () => {
                location.reload();
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            currentDocumentIcon = document.getElementById('current-document-icon');
            documentNameP = document.getElementById('document-name');
            dropZones = document.querySelectorAll('.drop-zone');
            feedbackMessage = document.getElementById('feedback-message');
            scoreDisplay = document.getElementById('score-display');
            nextButton = document.getElementById('next-button');
            gameMainContainer = document.getElementById('game-main-container');
            gameOverScreen = document.getElementById('game-over-screen');

            shuffledDocuments = shuffleArray([...allDocuments]);

            currentDocumentIcon.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', e.target.id);
            });

            dropZones.forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    zone.classList.add('hover');
                });

                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('hover');
                });

                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('hover');

                    if (droppedCorrectly) return;

                    const draggableId = e.dataTransfer.getData('text/plain');
                    const droppedElement = document.getElementById(draggableId);
                    const correctCategory = droppedElement.getAttribute('data-current-category');
                    const droppedCategory = zone.getAttribute('data-category');

                    if (droppedCategory === correctCategory) {
                        feedbackMessage.textContent = 'Correto! 🎉';
                        feedbackMessage.className = 'correct';
                        score++;
                        scoreDisplay.textContent = `Pontuação: ${score}`;
                        droppedCorrectly = true;
                        currentDocumentIcon.style.opacity = 0.5;
                        currentDocumentIcon.draggable = false;
                        nextButton.style.display = 'block';
                    } else {
                        feedbackMessage.textContent = `Incorreto. Este documento pertence à pasta "${correctCategory}".`;
                        feedbackMessage.className = 'incorrect';
                    }
                });
            });

            nextButton.addEventListener('click', () => {
                currentDocumentIndex++;
                loadNextDocument();
            });

            loadNextDocument();
        });
    </script>
</body>
</html>
