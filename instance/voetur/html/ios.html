<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>Tela Estilo iOS</title>

  <!-- FontAwesome para os ícones de app -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    /* 1. Estilo geral do corpo: plano de fundo tipo iOS */
    body {
      margin: 0;
      padding: 0;
      /* Exemplo de plano de fundo: pode trocar pelo URL de um wallpaper real do iOS */
      background: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=60')
        no-repeat center center fixed;
      background-size: cover;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 2. Container que agrupa os ícones em grid */
    .home-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, auto);
      justify-items: center;
      align-items: center;
      padding-top: calc(env(safe-area-inset-top, 0px) + 60px);
      padding-left: 12px;
      padding-right: 12px;
      row-gap: 24px;
      column-gap: 20px;
      /* limit area so icons do not go behind the dock */
      padding-bottom: calc(84px + env(safe-area-inset-bottom, 0px) + 20px);
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 3. Cada “ícone de app” */
    .app-icon {
      width: 68px;
      height: 68px;
      border-radius: 17px; /* cantos arredondados, parecido com iOS */
      background-color: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 6px;
      position: relative;
    }
    .app-icon i {
      font-size: 32px;
      color: white;
    }
    .app-label {
      text-align: center;
      font-size: 12px;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 68px;
    }

    /* 4. Estilo do Dock inferior */
    .dock {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 84px; /* aproximado do iPhone */
      background-color: rgba(255, 255, 255, 0.20);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 0px); /* considera barra de gesto */
    }
    .dock-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 60%; /* largura do dock */
      max-width: 400px;
    }
    .dock-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      text-decoration: none;
    }
    .dock-icon i {
      font-size: 32px;
    }
    .dock-label {
      font-size: 10px;
      margin-top: 2px;
    }

    /* 5. Ajuste para texto ficar legível sobre o fundo */
    .app-label,
    .dock-label {
      text-shadow: 0 0 3px rgba(0, 0, 0, 0.8);
    }

    /* 6. Fake “barra de status” no topo (hora/bateria) */
    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 44px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: env(safe-area-inset-top, 0px);
      z-index: 10;
      pointer-events: none;
    }
    .navbar {
      position: relative;
      z-index: 20;
    }
    .status-bar span {
      color: white;
      font-size: 14px;
      font-weight: 500;
    }
    .app-item a {
      text-decoration: none;
      color: inherit;
    }
    #lancar-page {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 44px);
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
      z-index: 5;
    }
    #lancar-page .page-content {
      padding-top: calc(env(safe-area-inset-top, 0px) + 44px);
      margin: 0;
    }
    #home-page {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }
  </style>
  <!-- DataTables CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css" />
  <!-- jQuery (required by DataTables) -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
</head>
<body>
  <!-- 6. Barra de status simulada (apenas décor; não é funcional) -->
  <div class="status-bar">
    <span id="status-clock"></span>
  </div>

  <!-- 2. Grade de ícones -->
  <div id="home-page" data-name="home" class="page no-toolbar">
    <div class="home-grid">
    <!-- Exemplo de ícones “fixos” -->
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-envelope"></i>
      </div>
      <div class="app-label">Mail</div>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-camera"></i>
      </div>
      <div class="app-label">Câmera</div>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-map-location-dot"></i>
      </div>
      <div class="app-label">Mapas</div>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-clock"></i>
      </div>
      <div class="app-label">Relógio</div>
    </div>
    <div class="app-item">
      <a href="#" onclick="openLancar()">
        <div class="app-icon">
          <i class="fa-solid fa-notes-medical"></i>
        </div>
        <div class="app-label">Financeiro</div>
      </a>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-music"></i>
      </div>
      <div class="app-label">Música</div>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-photo-film"></i>
      </div>
      <div class="app-label">Fotos</div>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-cog"></i>
      </div>
      <div class="app-label">Ajustes</div>
    </div>
    <div class="app-item">
      <a href="https://voetur.bennercloud.com.br/CORPORATIVO/Pages/Prestacaodecontas.aspx?i=K_PRESTACAODECONTAS&amp;m=MAIN" target="_blank">
        <div class="app-icon">
          <i class="fa-solid fa-file-invoice"></i>
        </div>
        <div class="app-label">Prestação</div>
      </a>
    </div>
    <!-- Acrescente mais linhas/colunas conforme desejar -->
    </div>
  </div>

  <div id="lancar-page" class="page" style="display:none; background-color: #ffffff;">
    <div class="page-content">
      <div class="block-title" style="padding: 1rem; background-color: #f0f0f0; color: #000; font-size: 1.2rem;">
        Financeiro
      </div>
      <div class="block" id="buttonsBlock" style="padding: 1rem; display: flex; justify-content: space-around;">
        <button id="btnLancar" style="flex: 1; margin: 0 5px; padding: 10px; border: none; border-radius: 8px; background-color: #007AFF; color: #fff;">Lançar</button>
        <button id="btnFinanceiroPage" style="flex: 1; margin: 0 5px; padding: 10px; border: none; border-radius: 8px; background-color: #34C759; color: #fff;">Financeiro</button>
      </div>
      <div class="block" id="uploadBlock" style="padding: 1rem;">
        <h3 style="color: white; font-size: 1.2rem; margin-bottom: 1rem;">Enviar Anexo</h3>
        <form id="uploadForm">
          <div class="mb-3">
            <label for="arquivoInput" style="color: white;">Selecione o arquivo:</label>
            <input type="file" id="arquivoInput" style="width: 100%; margin-top: 0.5rem;" />
          </div>
          <button type="submit" id="uploadBtn" style="background-color: #fff; color: #000; padding: 0.5rem 1rem; border: none; border-radius: 8px;">Enviar</button>
        </form>
        <div id="uploadResult" style="margin-top: 1rem; color: white;"></div>
      </div>
      <div class="block" style="padding: 1rem;">
        <table id="finance-table" class="display" style="width:100%; display: none;">
          <thead>
            <tr>
              <th>ID</th>
              <th>Descrição</th>
              <th>Valor</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>1</td><td>Exemplo A</td><td>100,00</td></tr>
            <tr><td>2</td><td>Exemplo B</td><td>200,00</td></tr>
            <tr><td>3</td><td>Exemplo C</td><td>300,00</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <script>
      document.getElementById('uploadForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const fileInput = document.getElementById('arquivoInput');
        const resultEl = document.getElementById('uploadResult');
        if (fileInput.files.length === 0) {
          resultEl.textContent = 'Nenhum arquivo selecionado.';
        } else {
          const fileName = fileInput.files[0].name;
          resultEl.textContent = 'Arquivo "' + fileName + '" pronto para upload.';
        }
      });

      // Handle Financeiro table display
      document.getElementById('btnFinanceiroPage')?.addEventListener('click', function() {
        // Hide other content (upload form block)
        const uploadBlock = document.getElementById('uploadBlock');
        if (uploadBlock) uploadBlock.style.display = 'none';
        // Show the table container
        const table = document.getElementById('finance-table');
        table.style.display = 'table';
        // Initialize DataTable if not already initialized
        if (!$.fn.DataTable.isDataTable('#finance-table')) {
          $('#finance-table').DataTable();
        }
      });
    </script>

  <!-- Android Navigation Footer -->
  <div id="android-nav" style="position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background-color: #000; display: flex; justify-content: space-around; align-items: center; z-index: 30;">
    <a href="#" onclick="goHome()" style="color: #fff; font-size: 24px;"><i class="fa-solid fa-arrow-left"></i></a>
    <a href="#" onclick="goHome()" style="color: #fff; font-size: 24px;"><i class="fa-solid fa-home"></i></a>
    <a href="#" onclick="openLancar()" style="color: #fff; font-size: 24px;"><i class="fa-solid fa-table-cells"></i></a>
  </div>
  <style>
    /* Ensure Android nav only shows on lancar-page */
    #android-nav {
      display: none;
    }
    #lancar-page #android-nav {
      display: flex;
    }
    /* Add bottom padding to page-content so content isn’t hidden by nav */
    #lancar-page .page-content {
      padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px));
    }
  </style>
  </div>

  <!-- 4. Dock inferior -->
  <div class="dock">
    <div class="dock-inner">
      <a href="#" class="dock-icon">
        <i class="fa-solid fa-phone"></i>
        <div class="dock-label">Telefone</div>
      </a>
      <a href="#" class="dock-icon">
        <i class="fa-solid fa-comment"></i>
        <div class="dock-label">Mensagens</div>
      </a>
      <a href="#" class="dock-icon">
        <i class="fa-solid fa-safari"></i>
        <div class="dock-label">Safari</div>
      </a>
      <a href="#" class="dock-icon">
        <i class="fa-solid fa-music"></i>
        <div class="dock-label">Música</div>
      </a>
    </div>
  </div>
</body>
<script>
  function updateClock() {
    const now = new Date();
    // Weekday and month names in Portuguese
    const weekdays = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
    const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
    const dayName = weekdays[now.getDay()];
    const day = now.getDate();
    const monthName = months[now.getMonth()];
    // Time formatting
    let hours = now.getHours();
    let minutes = now.getMinutes();
    if (hours < 10) hours = '0' + hours;
    if (minutes < 10) minutes = '0' + minutes;
    // Combine date and time
    document.getElementById('status-clock').textContent =
      `${dayName}, ${day} ${monthName} ${hours}:${minutes}`;
  }
  // Initialize clock immediately
  updateClock();
  // Update every minute
  setInterval(updateClock, 60000);

  function openLancar() {
    document.getElementById('home-page').style.display = 'none';
    document.getElementById('lancar-page').style.display = 'block';
    document.querySelector('.dock').style.display = 'none';
    // Hide upload form block
    const uploadBlock = document.getElementById('uploadBlock');
    if (uploadBlock) uploadBlock.style.display = 'none';
    // Show and initialize DataTable
    const table = document.getElementById('finance-table');
    if (table) {
      table.style.display = 'table';
      if (window.$ && $.fn.DataTable && !$.fn.DataTable.isDataTable('#finance-table')) {
        $('#finance-table').DataTable();
      }
    }
  }
  function goHome() {
    document.getElementById('lancar-page').style.display = 'none';
    document.getElementById('home-page').style.display = 'block';
    document.querySelector('.dock').style.display = 'flex';
  }
</script>
</html>
</body>
</html>
