<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>WebGPU + Vídeo (detecção de pessoas)</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 11;
    }
    #video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
    }
    #btn-share {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      padding: 8px 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 14px;
      border-radius: 4px;
    }
    #testImg {
      display: block;
      margin: 20px auto;
      width: 400px;
      max-width: 90%;
      position: relative;
      z-index: 10;
    }
    #btn-test-img {
      display: block;
      margin: 10px auto;
      padding: 8px 12px;
      font-size: 14px;
      position: relative;
      z-index: 10;
    }
  </style>

  <!-- TF.js principal e coco-ssd -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
</head>
<body>

  <!-- Botão para compartilhar tela -->
  <button id="btn-share">Compartilhar Tela</button>
  <button id="btn-stop" disabled style="position:absolute; top:45px; left:10px; z-index:10; padding:8px 12px; background:rgba(0,0,0,0.6); color:white; border:none; cursor:pointer; font-size:14px; border-radius:4px;">
    Parar Compartilhamento
  </button>
  <button id="btn-webcam" style="position:absolute; top:80px; left:10px; z-index:10; padding:8px 12px; background:rgba(0,0,0,0.6); color:white; border:none; cursor:pointer; font-size:14px; border-radius:4px;">
    Usar Webcam
  </button>
  <select id="cameraSelect" style="position:absolute; top:115px; left:10px; z-index:10; padding:6px; font-size:14px; border-radius:4px;">
    <option value="">Carregando câmeras...</option>
  </select>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <canvas id="overlay" style="position:absolute; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index: 11;"></canvas>
  <div id="eventLog" style="position:absolute; bottom:10px; left:10px; width:300px; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.6); color:white; padding:8px; font-size:12px; z-index:10; border-radius:4px;">
    <strong>Log de Eventos:</strong><br>
  </div>
  <div id="peopleCount" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); color:white; padding:8px 12px; font-size:14px; z-index:10; border-radius:4px;">
    Pessoas: 0
  </div>

  <!-- Script principal: WebGPU + captura de tela + detecção dinâmica -->
  <script type="module">
    import 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu@4.22.0/dist/tf-backend-webgpu.min.js';

    // Lista câmeras disponíveis no dispositivo e preenche o <select>
    async function populateCameraList() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoInputs = devices.filter(d => d.kind === "videoinput");
        const select = document.getElementById('cameraSelect');
        select.innerHTML = ""; 
        videoInputs.forEach(device => {
          const option = document.createElement('option');
          option.value = device.deviceId;
          option.textContent = device.label || `Câmera ${select.length + 1}`;
          select.appendChild(option);
        });
        if (videoInputs.length === 0) {
          const option = document.createElement('option');
          option.value = "";
          option.textContent = "Nenhuma câmera encontrada";
          select.appendChild(option);
        }
      } catch (err) {
        console.error("Erro ao listar câmeras:", err);
      }
    }
    // Chama logo que o script for carregado
    populateCameraList();

    // Função para adicionar mensagens ao log
    function appendEventLog(msg) {
      const logDiv = document.getElementById('eventLog');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.textContent = `[${time}] ${msg}`;
      logDiv.appendChild(entry);
      // opcional: mantém o scroll sempre no final
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    // Filtrar aviso de NonMaxSuppression síncrono no WebGPU
    const originalWarn = console.warn.bind(console);
    console.warn = (msg, ...args) => {
      if (typeof msg === 'string' && msg.includes('tf.nonMaxSuppression() in webgpu locks the UI thread')) {
        return;
      }
      originalWarn(msg, ...args);
    };

    let faceDetected = false;  
    let capturing = false;

    // 1) Configurar backend TF.js (WebGPU ou fallback para WebGL)
    try {
      await tf.setBackend('webgpu');
      await tf.ready();
      console.log("TF.js backend configurado para:", tf.getBackend());
      appendEventLog(`Backend configurado: ${tf.getBackend()}`);
    } catch (err) {
      console.warn("WebGPU não disponível, usando WebGL. Erro:", err);
      await tf.setBackend('webgl');
      await tf.ready();
      console.log("TF.js backend configurado para:", tf.getBackend());
      appendEventLog(`Backend configurado: ${tf.getBackend()}`);
    }

    // 2) Função que usa coco-ssd para detectar pessoas no vídeo
    async function faceDetectionLoop(videoElem) {
      if (!capturing) return;
      // Prepare overlay
      const overlay = document.getElementById('overlay');
      const ctx = overlay.getContext('2d');
      overlay.width = window.innerWidth;
      overlay.height = window.innerHeight;

      try {
        if (!window.objectModel) {
          window.objectModel = await cocoSsd.load();
        }
        const predictions = await window.objectModel.detect(videoElem);
        faceDetected = predictions.some(pred => pred.class === 'person');
        // Conta quantas pessoas (class === 'person') foram detectadas
        const personDetections = predictions.filter(pred => pred.class === 'person');
        const count = personDetections.length;
        // Atualiza painel de contagem
        document.getElementById('peopleCount').innerText = `Pessoas: ${count}`;
        if (count > 0) {
          const msg = `🚨 ${count} pessoas detectadas`;
          console.log(msg, personDetections);
          appendEventLog(msg);
        }
        // Draw bounding boxes on overlay
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        if (personDetections.length > 0) {
          const videoWidth = videoElem.videoWidth;
          const videoHeight = videoElem.videoHeight;
          const scaleX = overlay.width / videoWidth;
          const scaleY = overlay.height / videoHeight;
          ctx.strokeStyle = 'red';
          ctx.lineWidth = 3;
          personDetections.forEach(det => {
            const [x, y, w, h] = det.bbox;
            ctx.strokeRect(x * scaleX, y * scaleY, w * scaleX, h * scaleY);
          });
        }
      } catch (err) {
        console.error('Erro na detecção de objeto no vídeo:', err);
        faceDetected = false;
      }
      setTimeout(() => faceDetectionLoop(videoElem), 500);
    }

    // 3) Iniciar captura de tela
    async function startScreenCapture() {
      const videoElem = document.getElementById('video');
      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: { cursor: "always" },
          audio: false
        });
        videoElem.srcObject = stream;
        await new Promise(r => videoElem.onloadedmetadata = r);
        capturing = true;
        faceDetectionLoop(videoElem);
        return videoElem;
      } catch (err) {
        alert("Erro ao capturar a tela: " + err);
        throw err;
      }
    }

    // 4) Inicializar WebGPU e pipeline para exibir vídeo
    async function initWebGPU(videoElem) {
      if (!navigator.gpu) {
        alert("WebGPU não suportado neste navegador.");
        return;
      }
      const adapter = await navigator.gpu.requestAdapter();
      const device  = await adapter.requestDevice();
      const canvas  = document.getElementById('canvas');
      const context = canvas.getContext('webgpu');
      const format  = navigator.gpu.getPreferredCanvasFormat();

      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      context.configure({ device, format, alphaMode: "opaque" });

      const videoTex = device.createTexture({
        size: [videoElem.videoWidth, videoElem.videoHeight, 1],
        format: "rgba8unorm",
        usage: GPUTextureUsage.TEXTURE_BINDING |
               GPUTextureUsage.COPY_DST      |
               GPUTextureUsage.RENDER_ATTACHMENT
      });

      const wgslShaderCode = `
      struct VertexOutput {
        @builtin(position) Position : vec4<f32>,
        @location(0) fragUV      : vec2<f32>,
      };

      @group(0) @binding(0) var videoTex : texture_2d<f32>;
      @group(0) @binding(1) var videoSampler : sampler;

      @vertex
      fn vs_main(@builtin(vertex_index) idx : u32) -> VertexOutput {
        var pos = array<vec2<f32>, 3>(
          vec2<f32>(-1.0, -1.0),
          vec2<f32>( 3.0, -1.0),
          vec2<f32>(-1.0,  3.0)
        );
        var uv = array<vec2<f32>, 3>(
          vec2<f32>(0.0, 1.0),
          vec2<f32>(2.0, 1.0),
          vec2<f32>(0.0, -1.0)
        );
        var output : VertexOutput;
        output.Position = vec4<f32>(pos[idx], 0.0, 1.0);
        output.fragUV   = uv[idx];
        return output;
      }

      @fragment
      fn fs_main(in : VertexOutput) -> @location(0) vec4<f32> {
        return textureSample(videoTex, videoSampler, in.fragUV);
      }
      `;

      const shaderModule = device.createShaderModule({ code: wgslShaderCode });
      const pipeline     = device.createRenderPipeline({
        layout: 'auto',
        vertex:  { module: shaderModule, entryPoint: 'vs_main' },
        fragment:{ 
          module: shaderModule, 
          entryPoint: 'fs_main',
          targets: [{ format }]
        },
        primitive: { topology: 'triangle-list' }
      });

      const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: videoTex.createView() },
          { binding: 1, resource: sampler },
        ]
      });

      function frame() {
        if (!capturing) return;

        device.queue.copyExternalImageToTexture(
          { source: videoElem, origin: { x: 0, y: 0 } },
          { texture: videoTex, mipLevel: 0, origin: { x: 0, y: 0 } },
          { width: videoElem.videoWidth, height: videoElem.videoHeight, depthOrArrayLayers: 1 }
        );

        const commandEncoder = device.createCommandEncoder();
        const textureView    = context.getCurrentTexture().createView();
        const renderPass     = commandEncoder.beginRenderPass({
          colorAttachments: [{
            view: textureView,
            loadOp: "clear",
            clearValue: faceDetected
              ? { r: 0.0, g: 0.8, b: 0.0, a: 1.0 }
              : { r: 0.0, g: 0.0, b: 0.8, a: 1.0 },
            storeOp: "store"
          }]
        });

        renderPass.setPipeline(pipeline);
        renderPass.setBindGroup(0, bindGroup);
        renderPass.draw(3, 1, 0, 0);
        renderPass.end();

        device.queue.submit([commandEncoder.finish()]);
        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);

      const track = videoElem.srcObject.getVideoTracks()[0];
      track.addEventListener('ended', () => {
        capturing = false;
        console.log("Compartilhamento encerrado.");
      });
    }

    // 5) Botão para iniciar captura + WebGPU
    document.getElementById('btn-share').addEventListener('click', async () => {
      if (capturing) return;
      const videoElem = await startScreenCapture();
      if (navigator.gpu) {
        initWebGPU(videoElem);
      }
      document.getElementById('btn-share').disabled = true;
      document.getElementById('btn-share').innerText = "Tela Compartilhada";
      appendEventLog("Compartilhamento iniciado");
      // Habilita o botão de parar
      document.getElementById('btn-stop').disabled = false;
    });

    // Função para iniciar captura da webcam selecionando deviceId
    async function startWebcamCapture(deviceId = null) {
      const videoElem = document.getElementById('video');
      try {
        const constraints = {
          video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "user" },
          audio: false
        };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        videoElem.srcObject = stream;
        await new Promise(r => videoElem.onloadedmetadata = r);
        capturing = true;
        faceDetectionLoop(videoElem);
        return videoElem;
      } catch (err) {
        alert("Erro ao acessar a webcam: " + err);
        throw err;
      }
    }

    // Botão para parar compartilhamento
    document.getElementById('btn-stop').addEventListener('click', () => {
      // Interrompe todas as tracks de vídeo do objeto MediaStream
      const videoElem = document.getElementById('video');
      if (videoElem.srcObject) {
        videoElem.srcObject.getTracks().forEach(track => track.stop());
        capturing = false;
        // Reabilita os botões de compartilhar e webcam, desabilita o de parar
        document.getElementById('btn-share').disabled = false;
        document.getElementById('btn-share').innerText = "Compartilhar Tela";
        document.getElementById('btn-stop').disabled = true;
        document.getElementById('btn-webcam').disabled = false;
        // Limpa canvases
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        appendEventLog("Compartilhamento parado");
        appendEventLog("Stream encerrado");
      }
    });

    // Botão para iniciar captura da webcam + WebGPU
    document.getElementById('btn-webcam').addEventListener('click', async () => {
      if (capturing) return;
      const select = document.getElementById('cameraSelect');
      const selectedDeviceId = select.value;
      const videoElem = await startWebcamCapture(selectedDeviceId);
      if (navigator.gpu) {
        initWebGPU(videoElem);
      }
      document.getElementById('btn-share').disabled = true;
      document.getElementById('btn-webcam').disabled = true;
      document.getElementById('btn-stop').disabled = false;
      appendEventLog("Webcam iniciada");
    });
  </script>

</body>
</html>
