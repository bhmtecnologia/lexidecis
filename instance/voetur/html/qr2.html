<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>WebGPU + Vídeo (detecção de QR Code)</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 11;
    }
    #video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: auto;
      height: auto;
      max-width: 100vw;
      max-height: 100vh;
      transform: translate(-50%, -50%);
      object-fit: contain;
      z-index: 0;
    }
    #controls {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.8);
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      z-index: 20;
    }
    #controls button, #controls select {
      padding: 6px 10px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    #backendIndicator {
      margin-left: auto;
      color: #fff;
      font-size: 14px;
      white-space: nowrap;
      padding-right: 10px;
    }
    #eventAlert {
      position: fixed;
      top: 50px;
      left: 0;
      width: 100%;
      background: rgba(0,200,0,0.9);
      color: white;
      text-align: center;
      padding: 6px;
      font-size: 16px;
      z-index: 20;
    }
    #detectionInfo {
      position: fixed;
      top: 90px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px;
      font-size: 14px;
      border-radius: 4px;
      z-index: 20;
    }
    #eventLog {
      position: fixed;
      top: 130px;
      left: 10px;
      width: 300px;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px;
      font-size: 12px;
      z-index: 20;
      border-radius: 4px;
    }
    #cameraSelect {
      padding: 6px 10px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>

  <!-- Removido: QuaggaJS -->
  <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script> -->

  <!-- Inclui TensorFlow e backend WebGPU -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script type="module">
    import 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu@4.22.0/dist/tf-backend-webgpu.min.js';
  </script>

  <!-- ZXing para leitura de múltiplos QR Codes -->
  <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
  <script>
    window.zxingReader = new ZXing.BrowserMultiFormatReader();
  </script>
  <script>
    // Exemplo mínimo funcional usando ZXing diretamente na câmera
    document.addEventListener('DOMContentLoaded', () => {
      const video = document.getElementById('video');

      // Inicializa o leitor ZXing
      const codeReader = new ZXing.BrowserMultiFormatReader();

      // Tenta usar qualquer câmera disponível
      codeReader.decodeFromVideoDevice(null, video, (result, err) => {
        if (result) {
          console.log('Código detectado:', result.getText());
          document.getElementById('eventAlert').textContent = `ZXing: ${result.getText()}`;
          document.getElementById('eventAlert').style.background = "rgba(0,200,0,0.9)";
        }
        if (err && !(err instanceof ZXing.NotFoundException)) {
          console.error('Erro de leitura ZXing:', err);
        }
      });

      // Para a câmera ao fechar a aba ou recarregar
      window.addEventListener('beforeunload', () => codeReader.reset());
    });
  </script>
</head>
<body>
  <div id="controls">
    <button id="btn-webcam">Camera</button>
    <button id="btn-share">Compartilhar Tela</button>
    <!-- O botão de ativar/desativar QR apenas desativa o loop de leitura -->
    <button id="btn-toggle-detect">Desativar QR</button>
    <button id="btn-toggle-qr">Desativar Leitura QR</button>
    <button id="btn-stop" disabled>Parar Compartilhamento</button>
    <div id="backendIndicator">...</div>
  </div>

  <div id="eventAlert">Nenhum evento</div>
  <div id="qrStats" style="
    position: fixed;
    top: 90px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 8px;
    font-size: 14px;
    border-radius: 4px;
    z-index: 20;
    max-width: 300px;
    white-space: pre-wrap;
  ">
    QR Codes únicos detectados: 0
  </div>
  <div id="eventLog">
    <strong>Log de Eventos:</strong><br>
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <canvas id="overlay"></canvas>

  <script type="module">
    let faceDetected = false;
    let capturing = false;
    let detectEnabled = true;
    let qrEnabled = true;
    let qrInitial = null;
    let qrLast = null;
    let barInitial = null;
    let barLast = null;

    const recentQRCodes = new Map(); // código -> timestamp
    const QR_REPEAT_INTERVAL_MS = 3000; // 3 segundos

    function updateQRStats() {
      const qrStats = document.getElementById('qrStats');
      const entries = Array.from(recentQRCodes.keys());
      qrStats.innerHTML = `QR Codes únicos detectados: ${entries.length}\n` +
        entries.map((code, i) => `${String.fromCharCode(97 + i)}) ${code}`).join('\n');
    }


    function appendEventLog(msg) {
      const logDiv = document.getElementById('eventLog');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.textContent = `[${time}] ${msg}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    // Filtrar aviso de NonMaxSuppression síncrono no WebGPU
    const originalWarn = console.warn.bind(console);
    console.warn = (msg, ...args) => {
      if (typeof msg === 'string' && msg.includes('tf.nonMaxSuppression() in webgpu locks the UI thread')) {
        return;
      }
      originalWarn(msg, ...args);
    };

    // Função para iniciar captura de tela
    async function startScreenCapture() {
      const videoElem = document.getElementById('video');
      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: { cursor: "always" },
          audio: false
        });
        videoElem.srcObject = stream;
        await new Promise(r => videoElem.onloadedmetadata = r);
        capturing = true;
        return videoElem;
      } catch (err) {
        alert("Erro ao capturar a tela: " + err);
        throw err;
      }
    }

    // Função para iniciar captura de webcam (sempre câmera traseira, sem deviceId)
    async function startWebcamCapture() {
      const videoElem = document.getElementById('video');
      try {
        const constraints = {
          video: { facingMode: { exact: "environment" }, width: { ideal: 640 }, height: { ideal: 480 } },
          audio: false
        };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        videoElem.srcObject = stream;
        await new Promise(r => videoElem.onloadedmetadata = r);
        await videoElem.play();
        capturing = true;
        return videoElem;
      } catch (err) {
        alert("Erro ao acessar a webcam: " + err);
        throw err;
      }
    }

    // Inicializa WebGPU + pipeline de exibição
    async function initWebGPU(videoElem) {
      if (!navigator.gpu) {
        alert("WebGPU não suportado neste navegador.");
        return;
      }
      const adapter = await navigator.gpu.requestAdapter();
      const device  = await adapter.requestDevice();
      const canvas  = document.getElementById('canvas');
      const overlay = document.getElementById('overlay');
      const context = canvas.getContext('webgpu');
      const format  = navigator.gpu.getPreferredCanvasFormat();

      // Ajusta tamanhos
      canvas.width  = videoElem.videoWidth;
      canvas.height = videoElem.videoHeight;
      overlay.width = videoElem.videoWidth;
      overlay.height = videoElem.videoHeight;
      context.configure({ device, format, alphaMode: "opaque" });

      const videoTex = device.createTexture({
        size: [videoElem.videoWidth, videoElem.videoHeight, 1],
        format: "rgba8unorm",
        usage: GPUTextureUsage.TEXTURE_BINDING |
               GPUTextureUsage.COPY_DST      |
               GPUTextureUsage.RENDER_ATTACHMENT
      });

      const wgslShaderCode = `
      struct VertexOutput {
        @builtin(position) Position : vec4<f32>,
        @location(0) fragUV      : vec2<f32>,
      };

      @group(0) @binding(0) var videoTex : texture_2d<f32>;
      @group(0) @binding(1) var videoSampler : sampler;

      @vertex
      fn vs_main(@builtin(vertex_index) idx : u32) -> VertexOutput {
        var pos = array<vec2<f32>, 3>(
          vec2<f32>(-1.0, -1.0),
          vec2<f32>( 3.0, -1.0),
          vec2<f32>(-1.0,  3.0)
        );
        var uv = array<vec2<f32>, 3>(
          vec2<f32>(0.0, 1.0),
          vec2<f32>(2.0, 1.0),
          vec2<f32>(0.0, -1.0)
        );
        var output : VertexOutput;
        output.Position = vec4<f32>(pos[idx], 0.0, 1.0);
        output.fragUV   = uv[idx];
        return output;
      }

      @fragment
      fn fs_main(in : VertexOutput) -> @location(0) vec4<f32> {
        return textureSample(videoTex, videoSampler, in.fragUV);
      }
      `;

      const shaderModule = device.createShaderModule({ code: wgslShaderCode });
      const pipeline     = device.createRenderPipeline({
        layout: 'auto',
        vertex:  { module: shaderModule, entryPoint: 'vs_main' },
        fragment:{ 
          module: shaderModule, 
          entryPoint: 'fs_main',
          targets: [{ format }]
        },
        primitive: { topology: 'triangle-list' }
      });

      const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
      const bindGroup = device.createBindGroup({
        layout: pipeline.getBindGroupLayout(0),
        entries: [
          { binding: 0, resource: videoTex.createView() },
          { binding: 1, resource: sampler },
        ]
      });

      // Loop de renderização WebGPU
      function frame() {
        if (!capturing) return;
        faceDetected = false;

        device.queue.copyExternalImageToTexture(
          { source: videoElem, origin: { x: 0, y: 0 } },
          { texture: videoTex, mipLevel: 0, origin: { x: 0, y: 0 } },
          { width: videoElem.videoWidth, height: videoElem.videoHeight, depthOrArrayLayers: 1 }
        );

        const commandEncoder = device.createCommandEncoder();
        const textureView    = context.getCurrentTexture().createView();
        const renderPass     = commandEncoder.beginRenderPass({
          colorAttachments: [{
            view: textureView,
            loadOp: "clear",
            clearValue: faceDetected
              ? { r: 0.0, g: 0.8, b: 0.0, a: 1.0 }
              : { r: 0.0, g: 0.0, b: 0.8, a: 1.0 },
            storeOp: "store"
          }]
        });

        renderPass.setPipeline(pipeline);
        renderPass.setBindGroup(0, bindGroup);
        renderPass.draw(3, 1, 0, 0);
        renderPass.end();

        device.queue.submit([commandEncoder.finish()]);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);

      // Quando a captura terminar
      const track = videoElem.srcObject.getVideoTracks()[0];
      track.addEventListener('ended', () => {
        capturing = false;
        appendEventLog("Compartilhamento encerrado");
      });

    // (Removido: Inicia o loop de QR scanning via jsQR; leitura agora é feita exclusivamente via ZXing)
    }

    // (Removido: Funções de leitura de QR Codes usando jsQR; leitura agora é feita exclusivamente via ZXing)

    // Botão Compartilhar Tela
    document.getElementById('btn-share').addEventListener('click', async () => {
      if (capturing) return;
      const videoElem = await startScreenCapture();
      // Show WebGPU canvas and overlay again
      const canvas = document.getElementById('canvas');
      const overlay = document.getElementById('overlay');
      canvas.style.display = '';
      overlay.style.display = '';
      if (navigator.gpu) {
        initWebGPU(videoElem);
      }
      document.getElementById('btn-share').disabled = true;
      document.getElementById('btn-share').innerText = "Tela Compartilhada";
      appendEventLog("Compartilhamento iniciado");
      document.getElementById('btn-stop').disabled = false;
      document.getElementById('btn-webcam').disabled = true;
    });

    // Botão Parar Compartilhamento
    document.getElementById('btn-stop').addEventListener('click', () => {
      const videoElem = document.getElementById('video');
      if (videoElem.srcObject) {
        videoElem.srcObject.getTracks().forEach(track => track.stop());
        capturing = false;
        document.getElementById('btn-share').disabled = false;
        document.getElementById('btn-share').innerText = "Compartilhar Tela";
        document.getElementById('btn-stop').disabled = true;
        document.getElementById('btn-webcam').disabled = false;
        // Limpa overlay
        const overlay = document.getElementById('overlay');
        const ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        // Hide WebGPU canvas and overlay so last frame is cleared
        const canvas = document.getElementById('canvas');
        // overlay already defined above
        canvas.style.display = 'none';
        overlay.style.display = 'none';
        appendEventLog("Compartilhamento parado");
        appendEventLog("Stream encerrado");
      }
    });

    // Botão Usar Webcam
    document.getElementById('btn-webcam').addEventListener('click', async () => {
      if (capturing) return;
      const videoElem = await startWebcamCapture();
      // Show WebGPU canvas and overlay again
      const canvas = document.getElementById('canvas');
      const overlay = document.getElementById('overlay');
      canvas.style.display = '';
      overlay.style.display = '';
      if (navigator.gpu) {
        initWebGPU(videoElem);
      }
      document.getElementById('btn-share').disabled = true;
      document.getElementById('btn-webcam').disabled = true;
      document.getElementById('btn-stop').disabled = false;
      appendEventLog("Webcam iniciada");
    });

    // Botão para ativar/desativar QR scanning
    document.getElementById('btn-toggle-detect').addEventListener('click', () => {
      detectEnabled = !detectEnabled;
      const btn = document.getElementById('btn-toggle-detect');
      btn.innerText = detectEnabled ? 'Desativar QR' : 'Ativar QR';
      appendEventLog(detectEnabled ? 'Leitura de QR retomada' : 'Leitura de QR pausada');
    });

    // Botão para ativar/desativar leitura de QR (qrEnabled flag)
    document.getElementById('btn-toggle-qr').addEventListener('click', () => {
      qrEnabled = !qrEnabled;
      document.getElementById('btn-toggle-qr').innerText = qrEnabled ? 'Desativar Leitura QR' : 'Ativar Leitura QR';
    });

    // Indicador de backend (WebGPU ou WebGL)
    tf.ready().then(async () => {
      if (navigator.gpu) {
        await tf.setBackend('webgpu');
      } else {
        await tf.setBackend('webgl');
      }
      document.getElementById('backendIndicator').textContent = tf.getBackend().toUpperCase();
    });

  </script>
</body>
</html>
