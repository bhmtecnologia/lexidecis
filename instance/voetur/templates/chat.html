  <style>
    :root {
      --sidebar-w: 280px;
    }
    .hidden { display: none !important; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--body-color);
      color: var(--theme-body-font-color);
    }

    /* ===== Layout principal ===== */
    #wrapper {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--body-color);
    }

    #chat-sidebar {
      width: var(--sidebar-w);
      min-width: 240px;
      max-width: 340px;
      background: var(--body-color);
      border-right: 1px solid var(--shape-border);
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
      transition: margin-left 0.3s ease, transform 0.3s ease, width 0.3s ease;
    }

    .sidebar-header button {
      margin-left: .25rem;
    }

    .sidebar-bottom {
      background: var(--bg-light);
      padding: 0;
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
    }

    #userMenuBtn {
      width: 100%;
      padding: .75rem 1rem;
      background: none;
      border: none;
      text-align: left;
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    #userMenuBtn i:last-child {
      margin-left: auto;
      transition: transform .2s;
    }
    .sidebar-bottom.open #userMenuBtn i:last-child {
      transform: rotate(180deg);
    }

    /* Dropdown look & feel (Select2‑like) */
    #userMenu {
      position: absolute;
      bottom: 100%;
      left: 0;
      width: 100%;
      margin: 0;
      padding: .25rem 0;
      border: 1px solid var(--border-light-color);
      border-radius: 4px;
      background: var(--dropdown-bg-color);
      box-shadow: 0 2px 4px rgba(0,0,0,.08);
      list-style: none;
      z-index: 1050;
      transition: all 0.2s ease;
    }
    #userMenu.hidden { display: none !important; }
    #userMenu .dropdown-item {
      display: flex;
      align-items: center;
      padding: .5rem 1rem;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      color: var(--theme-body-font-color);
    }
    #userMenu .dropdown-item:hover {
      background: var(--table-hover-color);
    }

    #chat-sidebar header {
      padding: .75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--shape-border);
    }

    #chat-sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #chat-sidebar li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .5rem 1rem;
      border-bottom: 1px solid var(--shape-border);
    }
    #chat-sidebar li:hover {
      background: var(--table-hover-color);
    }

    /* Destaque do item selecionado */
    #chat-sidebar li.selected {
      background: var(--active-bg-color);
    }

    /* Cursor pointer ao passar sobre Lexi AI */
    #lexi-ai-item {
      cursor: pointer;
    }
    /* Alterar cor de fundo ao passar o mouse sobre Lexi AI */
    #lexi-ai-item:hover {
      background: var(--active-bg-color);
    }
    /* Make Explore GPTs look clickable */
    #explore-gpt-item {
      cursor: pointer;
    }
    #explore-gpt-item:hover {
      background: var(--active-bg-color);
    }

    .btn-icon {
      color: var(--font-color);
      background: none;
      border: none;
      padding: .25rem;
      font-size: 1rem;
      cursor: pointer;
    }

    #chat-area {
      flex: 1;
      position: relative;
      background: var(--light-background);
      transition: margin-left 0.3s ease;
    }

    flowise-fullchatbot {
      height: 100%;
      width: 100%;
      display: block;
    }

    /* === Mini‑sidebar (desktop, quando oculto) === */
    #sidebar-mini {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 44px;
      background: var(--body-color);
      border-right: 1px solid var(--shape-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 1rem;
      z-index: 1044;
      transition: left 0.3s ease, opacity 0.3s ease;
    }
    #sidebar-mini .btn-icon {
      font-size: 1.25rem;
    }
    #sidebar-mini .mt-auto { margin-top: auto; }
    #sidebar-mini .mb-3   { margin-bottom: 1rem; }

    body.with-mini-sidebar #wrapper {
      margin-left: 44px; /* mesma largura da mini-sidebar */
      transition: margin-left 0.3s ease;
    }

    /* Search icon prefix */
    .search-box {
      position: relative;
      border-bottom: 1px solid var(--shape-border);
    }
    .search-box .search-icon {
      position: absolute;
      top: 50%;
      left: 1rem;
      transform: translateY(-50%);
      color: var(--font-color);
      pointer-events: none;
      font-size: 1rem;
      z-index: 10;
    }
    .search-box .select2-selection--single {
      padding-left: 2rem;
    }
    /* Ensure sidebar content and chat list can scroll */
    #chat-sidebar > .flex-grow-1.d-flex.flex-column.justify-content-start {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #chat-sidebar .flex-grow-1[data-simplebar] {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
    /* Theme buttons matching default theme colors */
    .btn-theme {
      background-color: var(--theme-default);
      color: var(--theme-body-font-color);
      border: none;
    }
    .btn-theme:hover {
      background-color: var(--active-bg-color);
      color: var(--theme-body-font-color);
    }
    .btn-outline-theme {
      background: none;
      color: var(--theme-default);
      border: 1px solid var(--theme-default);
    }
    .btn-outline-theme:hover {
      background-color: var(--active-bg-color);
      color: var(--theme-body-font-color);
    }

    /* Override Lexi AI and Explore GPTs button to match theme text-only style */
    #lexi-ai-item,
    #explore-gpt-item {
      color: var(--theme-default);
      background: none;
      border: none;
      background-color: transparent;
    }
    #lexi-ai-item:hover,
    #explore-gpt-item:hover {
      background-color: var(--theme-default) !important;
      color: var(--body-color) !important;
    }

    /* Hover style for chat list items - updated to only set background, and set inner text/icons to theme-body-font-color */
    #chat-list li:hover {
      background-color: var(--theme-default) !important;
    }
    #chat-list li:hover * {
      color: var(--theme-body-font-color) !important;
    }

    /* Provider icon style for AI providers sidebar list */
    .provider-icon {
      width: 1rem;
      height: 1rem;
      margin-right: 0.5rem;
      object-fit: contain;
    }

    /* Smaller font size for chat list items */
    #chat-list li {
      font-size: 0.875rem;
    }
    /* Match GPT list font size to chat list */
    #ai-providers-list li {
      font-size: 0.875rem;
    }

    /* Modern sidebar divider */
    #chat-sidebar hr {
      border: none;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--theme-default), transparent);
      margin: 0.5rem 1rem;
      opacity: 0.7;
    }
    #chat-list li { cursor: pointer; }

  <script type="module">
    // Intercept all fetch calls to include user identifiers
    const _origFetch = window.fetch;
    window.fetch = async (resource, init = {}) => {
      const headers = new Headers(init.headers || {});
      if (AuthService.user) {
        headers.set('x-user-email', AuthService.user.email);
        headers.set('x-user-uuid',  AuthService.user.uid);
        // Include the user's JWT in every request
        let jwt = AuthService.token;
        // If AuthService.user provides getIdToken(), use it
        if (!jwt && AuthService.user && typeof AuthService.user.getIdToken === 'function') {
          jwt = await AuthService.user.getIdToken();
        }
        if (jwt) {
          headers.set('x-user-jwt', jwt);
        }
        // Include the GPT ID header
        headers.set('x-gpt-id', '1');
        // Include the user's JWT as a Bearer token only if not already present
        if (!headers.has('Authorization')) {
          headers.set('Authorization', `Bearer ${jwt}`);
        }
      }
      return _origFetch(resource, { ...init, headers });
    };
    // Initialize Flowise embed configuration with LexiDecis theme and observers stub
    window.flowiseConfig = {
      theme: {
        chatWindow: {
          showTitle: true,
          titleBackgroundColor: "#20703b",
          welcomeMessage: "Sou a Lexi AI, com tecnologia ChatGPT 4o da OpenAI. Ideal para responder perguntas, gerar ideias e ajudar com clareza e rapidez. O que deseja saber?",
          errorMessage: "Ops, reduza sua pergunta e tente novamente.",
          backgroundColor: "transparent",
          userMessage: {
            backgroundColor: "#d9e8e5",
            textColor: "#292929",
            showAvatar: false
          },
          textInput: {
            placeholder: "Mensagem...",
            backgroundColor: "#f5f5f5",
            textColor: "#292929",
            sendButtonColor: "#20703b",
            maxChars: 100000,
            maxCharsWarningMessage: "Você excedeu o limite de caracteres. Insira menos de 100000 caracteres.",
            autoFocus: true,
            sendMessageSound: true,
            receiveMessageSound: true
          },
          feedback: {
            color: "#20703b"
          },
          dateTimeToggle: {
            date: true,
            time: true
          },
          footer: {
            textColor: "#20703b",
            text: "Sempre verifique as respostas - ",
            company: "LexiDecis",
            companyLink: "https://lexidecis.com.br"
          }
        }
      },
      observersConfig: {
        // Stub: will be overridden per session
      }
    };
    import AuthService from '../assets/js/auth.js';
    import { listChats, listGpts, getGptConfig, createChatMessage } from "../assets/js/api.js";

    // === Flowise chatflowId mapping helper ===
    const chatflowIdMap = {
      'FLOW1_CHAT': 'FLOW1_CHAT'
    };
    function mapChatflowId(id) {
      return chatflowIdMap[id] || id;
    }
    const themeToggle = document.getElementById('theme-toggle');
    const miniThemeToggle = document.getElementById('mini-theme-toggle');
    // Initialize mini toggle icon
    miniThemeToggle.innerHTML = themeToggle.innerHTML;
    // Toggle theme when clicking mini toggle
    miniThemeToggle.addEventListener('click', () => themeToggle.click());
    const root = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) root.classList.add('dark-only');
    themeToggle.innerHTML = root.classList.contains('dark-only') ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon-stars"></i>';
    themeToggle.addEventListener('click', () => {
      root.classList.toggle('dark-only');
      const isDark = root.classList.contains('dark-only');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeToggle.innerHTML = isDark ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon-stars"></i>';
      miniThemeToggle.innerHTML = themeToggle.innerHTML;
    });

    // === Build dynamic AI provider list ===
    // === Build dynamic AI provider list ===
    const aiList = document.getElementById('ai-providers-list');
    const configCache = {};
    // Make gptMap available to chat history loader
    let gptMap = {};
    (async () => {
      await new Promise(resolve => {
        const checkAuth = setInterval(() => {
          if (AuthService.user) { clearInterval(checkAuth); resolve(); }
        }, 100);
      });
      const gptList = await listGpts(AuthService);
      gptMap = Object.fromEntries(gptList.map(g => [g.id, g]));
      gptList.forEach(gpt => {
        const li = document.createElement('li');
        li.id = gpt.id;
        li.className = 'px-3 py-2 d-flex align-items-center';
        li.setAttribute('role', 'button');
        li.tabIndex = 0;
        li.innerHTML = `
          <img src="${gpt.imageUrl}" class="provider-icon" alt="${gpt.name} icon"/>
          <span class="flex-grow-1">${gpt.name}</span>
        `;
        li.addEventListener('click', async () => {
          let override = configCache[gpt.id];
          if (!override) {
            override = await getGptConfig(AuthService, gpt.id);
            configCache[gpt.id] = override; // now a flat object
          }
          // Handle case where override is an array with a JSON string under an empty key
          if (Array.isArray(override) && override.length > 0) {
            const wrapper = override[0];
            if (wrapper && typeof wrapper === 'object' && Object.prototype.hasOwnProperty.call(wrapper, '')) {
              try {
                override = JSON.parse(wrapper['']);
                configCache[gpt.id] = override;
              } catch (err) {
                console.error('Error parsing chatflowConfig JSON string:', err);
              }
            }
          }
          // Ensure sessionId is set: generate only for new chats
          if (!override.sessionId) {
            const sessionId = crypto.randomUUID();
            override = { sessionId, ...override };
            configCache[gpt.id] = override;
          }
          // Use base Flowise config from the GPT metadata
          const baseFlowise = gpt.flowiseConfig.flowise;
          // === Initialize empty history in localStorage for new session ===
          const newExtKey = `${baseFlowise.chatflowId}_EXTERNAL`;
          const newFlagKey = `${baseFlowise.chatflowId}_historyInjected`;
          // Always clear previous history and start fresh for a new chat
          localStorage.removeItem(newExtKey);
          localStorage.removeItem(newFlagKey);
          localStorage.setItem(newExtKey, JSON.stringify({ chatHistory: [], chatId: override.sessionId }));
          localStorage.setItem(newFlagKey, 'true');
          // Build config with chatflowConfig nested
          const cfg = {
            chatflowid: baseFlowise.chatflowId,
            apiHost:          baseFlowise.apiHost,
            token:            baseFlowise.token,
            headers: {
              'x-user-email': AuthService.user.email,
              'x-user-uuid':  AuthService.user.uid,
              'x-gpt-id':     gpt.id,
              'x-user-jwt':   AuthService.token
            },

    (async () => {
      await new Promise(resolve => {
        const checkAuth = setInterval(() => {

      });
      const chatListEl = document.getElementById('chat-list');
      chatListEl.innerHTML = '<li id="chat-loading" class="px-3 py-2 text-muted">Carregando chats...</li>';
      try {
        let resp = await listChats(AuthService);
        if (typeof resp === 'string') resp = JSON.parse(resp);
        const items = Array.isArray(resp) ? resp : resp.data ? [resp] : [];
        const chatItems = items.flatMap(i => {
          const raw = i.data;
          return Array.isArray(raw) ? raw : typeof raw === 'string' ? JSON.parse(raw) : [raw];
        });
        chatListEl.innerHTML = '';
        chatItems.forEach(chat => {
          const li = document.createElement('li');
          const span = document.createElement('span');
          span.textContent = chat.name || chat.id;
          li.appendChild(span);
          const actions = document.createElement('div');
          actions.innerHTML = `<button class="chat-options-btn btn-icon" title="Opções"><i class="bi bi-three-dots"></i></button>`;
          li.appendChild(actions);
          chatListEl.appendChild(li);
          tippy(li.querySelector('.chat-options-btn'), {
            content: `
              <ul class="list-unstyled m-0">
                <li><button class="dropdown-item">Renomear</button></li>
                <li><button class="dropdown-item">Arquivar</button></li>
                <li><button class="dropdown-item text-danger">Excluir</button></li>
              </ul>
            `,
            allowHTML: true,
            interactive: true,
            trigger: 'click',
            placement: 'right-start'
          });
          // Clique para carregar histórico usando chatflowId mapping
          li.addEventListener('click', async () => {
            // Marca visualmente o item selecionado
            document.querySelectorAll('#chat-sidebar li').forEach(elem => elem.classList.remove('selected'));
            li.classList.add('selected');

            const sessionId = chat.id;
            // Load GPT-specific override config (if not proxy)
            const gptKey = chat.fk_gpt_id || chat.gpt_id;
            // Debug logs for GPT config retrieval
            console.log('Debug: chat object has fk_gpt_id =', chat.fk_gpt_id, 'gpt_id =', chat.gpt_id);
            console.log('Debug: available GPT configs in cache:', Object.keys(configCache));
            let override = configCache[gptKey];
            if (!override) {
              override = await getGptConfig(AuthService, gptKey);
              configCache[gptKey] = override;
            }
            // If override is wrapped as an array with a JSON string under empty key, parse it
            if (!Array.isArray(override) && override[0] && typeof override[0] === 'object' && override[0]['']) {
              try {
                const parsed = JSON.parse(override[0]['']);
                override = parsed;
                configCache[gptKey] = override;
                console.log('Parsed wrapped override for GPT key', gptKey, '=', override);
              } catch (err) {
                console.error('Error parsing wrapped override for GPT key', gptKey, err);
              }
            }
            // Ensure sessionId is updated in the override
            override = { ...override, sessionId };
            configCache[gptKey] = override;
            // Debug log after setting override
            console.log('Debug: override for GPT key', gptKey, '=', override);
            try {
            // Determine the actual Flowise chatflowId for this GPT
            const gpt = gptMap[gptKey];
            const realFlowId = gpt && gpt.flowiseConfig && gpt.flowiseConfig.flowise
              ? gpt.flowiseConfig.flowise.chatflowId
              : (chat.fk_gpt_id || chat.gpt_id);
            // Use proxy-mapped chatflow ID only, without sessionId
            const proxyFlowId = mapChatflowId(realFlowId);
            // Determine API host for this GPT
            const apiHost = gpt && gpt.flowiseConfig && gpt.flowiseConfig.flowise
              ? gpt.flowiseConfig.flowise.apiHost
              : window.flowiseConfig.apiHost;
            const flowId = `${proxyFlowId}_${sessionId}`;
            // Session-specific storage keys
            const sessionExtKey = `${proxyFlowId}__${sessionId}_EXTERNAL`;
            const sessionFlagKey = `${proxyFlowId}__${sessionId}_historyInjected`;

            // Inject session history only if not already stored
            if (!localStorage.getItem(sessionFlagKey)) {
              // Fetch history directly from Flowise API
              const response = await fetch(
                `${apiHost}/api/v1/chatmessage/${realFlowId}?sessionId=${sessionId}`, {
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${gpt.flowiseConfig.flowise.token}`
                  }
                }
              );
              if (!response.ok) throw new Error(`Status ${response.status}`);
              const apiHistory = await response.json();
              const formattedHistory = apiHistory.map(msg => ({
                message: msg.content,
                type: msg.role === 'userMessage' ? 'userMessage' : 'apiMessage',
                dateTime: msg.createdDate || new Date().toISOString(),
                messageId: msg.id || (typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substr(2, 9)),
                fileUploads: msg.fileUploads || []
              }));
              // Store under session-specific keys
              localStorage.setItem(sessionExtKey, JSON.stringify({ chatHistory: formattedHistory, chatId: sessionId }));
              localStorage.setItem(sessionFlagKey, 'true');
            }

            // Copy session history into the base key so web.js picks it up
            const baseExtKey = `${proxyFlowId}_EXTERNAL`;
            const baseFlagKey = `${proxyFlowId}_historyInjected`;
            const sessionData = localStorage.getItem(sessionExtKey);
            if (sessionData) {
              localStorage.setItem(baseExtKey, sessionData);
              localStorage.setItem(baseFlagKey, 'true');
            }
            // === Build and initialize embed using a fresh cfg object ===
            const cfg = {
              chatflowid:  realFlowId,
              apiHost:     apiHost,
              token:       gpt.flowiseConfig.flowise.token,
              headers: {
                'x-user-email': AuthService.user.email,
                'x-user-uuid':  AuthService.user.uid,
                'x-user-jwt':   AuthService.token,
                'x-gpt-id':     gpt.id
              },
              chatflowConfig: override,
              theme:           window.flowiseConfig.theme,
              observersConfig: {
                observeLoading: async (loading) => {
                  if (loading) {
                    try {
                      const userInput = document
                        .querySelector('flowise-fullchatbot')
                        .shadowRoot
                        .querySelector('textarea').value;
                      console.log('Sending chatmessage payload:', {
                        chatflowid: cfg.chatflowid,
                        sessionId: override.sessionId,
                        role: 'user',
                        message: userInput
                      });
                      await createChatMessage(
                        AuthService,
                        cfg.chatflowid,
                        override.sessionId,
                        'user',
                        userInput
                      );
                      console.log('Chat message created successfully');
                    } catch (err) {
                      console.error('Failed to create chat message', err);
                    }
                  }
                }
              }
            };
            const chatArea = document.getElementById('chat-area');
            chatArea.innerHTML = '<flowise-fullchatbot></flowise-fullchatbot>';
            Chatbot.initFull(cfg);
            } catch (err) {
              console.error('Erro ao carregar histórico:', err);
            }
          });
        });
        refreshSearchOptions();
      } catch (err) {
        console.error('Erro ao carregar chats:', err);
      }
    })();
    AuthService.onAuthChange(user => {

        window.location.href = './login.html?redirect=chat.html';

document.getElementById('new-chat').addEventListener('click', () => {

    document.getElementById('logout-btn').addEventListener('click', () => AuthService.logout());
    const SIDEBAR_KEY = 'chatSidebarHidden';

      const $sel = $('#chat-search');
      $sel.find('option').not(':first').remove();
      document.querySelectorAll('#chat-list li span').forEach(span => $sel.append(new Option(span.textContent, span.textContent, false, false)));

    function isMobile() { return window.innerWidth <= 768; }
    function sidebarVisible() { return !sidebar.classList.contains('hidden'); }
    function updateUI() {
      const visible = sidebarVisible();
      toggleBtn.firstElementChild.className = visible ? 'bi bi-chevron-left' : 'bi bi-chevron-right';
      miniBar.classList.toggle('hidden', visible);
      document.body.classList.toggle('with-mini-sidebar', !visible);

    const gptModalEl = document.getElementById('gptModal');
    gptModalEl.addEventListener('show.bs.modal', async () => {
      const body = document.getElementById('gptModalBody');
      body.innerHTML = `
        <div id="gpt-categories" class="mb-3"></div>
        <select id="gpt-search" style="width: 100%"></select>
        <div id="gpt-cards" class="row mt-3"></div>
      `;
      try {
        const gpts = await listGpts(AuthService);
        if (!Array.isArray(gpts) || gpts.length === 0) {
          body.innerHTML = '<p class="text-muted">Nenhum GPT disponível.</p>';
          return;
        }
        // Populate search dropdown
        const searchSelect = document.getElementById('gpt-search');
        // Group GPTs by category
        const categories = {};
        gpts.forEach(g => {
          const cat = g.category || 'Sem categoria';
          if (!categories[cat]) categories[cat] = [];
          categories[cat].push(g);
        });
        // Build category buttons (inclui Todos)
        const catContainer = document.getElementById('gpt-categories');
        const allCats = ['Todos', ...Object.keys(categories)];
        catContainer.innerHTML = allCats.map(cat => `
          <button type="button" class="btn btn-outline-primary me-2 mb-2" data-cat="${cat}">
            ${cat}
          </button>
        `).join('');
        // Build grouped options
        let groupHtml = '<option></option>';
        for (const cat of Object.keys(categories)) {
          groupHtml += `<optgroup label="${cat}">`;
          categories[cat].forEach(g => {
            groupHtml += `<option value="${g.name}" data-image-url="${g.imageUrl}">${g.name}</option>`;
          });
          groupHtml += `</optgroup>`;
        }
        searchSelect.innerHTML = groupHtml;
        $(searchSelect).select2({
          placeholder: 'Pesquisar GPT',
          allowClear: true,
          width: '100%',
          dropdownParent: $('#gptModal'),
          templateResult: function(data) {
            if (!data.id) return data.text;
            const imgUrl = $(data.element).data('image-url');
            if (!imgUrl) return data.text;
            const $result = $(`
              <span><img src="${imgUrl}" style="width:24px;height:24px;object-fit:cover;margin-right:8px;" />${data.text}</span>
            `);
            return $result;
          },
          templateSelection: function(data) {
            if (!data.id) return data.text;
            const imgUrl = $(data.element).data('image-url');
            if (!imgUrl) return data.text;
            const $selection = $(`
              <span><img src="${imgUrl}" style="width:20px;height:20px;object-fit:cover;margin-right:4px;" />${data.text}</span>
            `);
            return $selection;

            col.style.display = (!val || title === val) ? '' : 'none';

              const modalEl = document.getElementById('gptModal');
              const bsModal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
              bsModal.hide();
              // Trigger GPT selection in the sidebar
              document.getElementById(gpt.id).click();
            }
          });
        });
        // Category filter buttons
        document.querySelectorAll('#gpt-categories button').forEach(btn => {
          btn.addEventListener('click', () => {
            const sel = btn.getAttribute('data-cat');
            // Highlight active
            document.querySelectorAll('#gpt-categories button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Reset search
            $('#gpt-search').val(null).trigger('change');
            // Filter cards
            document.querySelectorAll('#gpt-cards [data-cat]').forEach(col => {
              col.style.display = (sel === 'Todos' || col.getAttribute('data-cat') === sel) ? '' : 'none';
            });
          });
        });
        // Activate "Todos" by default
        document.querySelector('#gpt-categories button[data-cat="Todos"]').classList.add('active');
      } catch (error) {
        console.error('Erro ao carregar GPTs:', error);
        body.innerHTML = '<p class="text-danger">Falha ao carregar GPTs. Tente novamente mais tarde.</p>';
      }
    });
  </script>
