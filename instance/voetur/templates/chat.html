  <style>
    :root {
      --sidebar-w: 280px;
    }
    .hidden { display: none !important; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--body-color);
      color: var(--theme-body-font-color);
    }

    /* ===== Layout principal ===== */
    #wrapper {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--body-color);
    }

    #chat-sidebar {
      width: var(--sidebar-w);
      min-width: 240px;
      max-width: 340px;
      background: var(--body-color);
      border-right: 1px solid var(--shape-border);
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
      transition: margin-left 0.3s ease, transform 0.3s ease, width 0.3s ease;
    }

    .sidebar-header button {
      margin-left: .25rem;
    }

    .sidebar-bottom {
      background: var(--bg-light);
      padding: 0;
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
    }

    #userMenuBtn {
      width: 100%;
      padding: .75rem 1rem;
      background: none;
      border: none;
      text-align: left;
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    #userMenuBtn i:last-child {
      margin-left: auto;
      transition: transform .2s;
    }
    .sidebar-bottom.open #userMenuBtn i:last-child {
      transform: rotate(180deg);
    }

    /* Dropdown look & feel (Select2‑like) */
    #userMenu {
      position: absolute;
      bottom: 100%;
      left: 0;
      width: 100%;
      margin: 0;
      padding: .25rem 0;
      border: 1px solid var(--border-light-color);
      border-radius: 4px;
      background: var(--dropdown-bg-color);
      box-shadow: 0 2px 4px rgba(0,0,0,.08);
      list-style: none;
      z-index: 1050;
      transition: all 0.2s ease;
    }
    #userMenu.hidden { display: none !important; }
    #userMenu .dropdown-item {
      display: flex;
      align-items: center;
      padding: .5rem 1rem;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      color: var(--theme-body-font-color);
    }
    #userMenu .dropdown-item:hover {
      background: var(--table-hover-color);
    }

    #chat-sidebar header {
      padding: .75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #chat-sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #chat-sidebar li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .5rem 1rem;
      border-bottom: 1px solid var(--shape-border);
    }
    #chat-sidebar li:hover {
      background: var(--table-hover-color);
    }

    /* Destaque do item selecionado */
    #chat-sidebar li.selected {
      background: var(--active-bg-color);
    }

    /* Cursor pointer ao passar sobre Lexi AI */
    #lexi-ai-item {
      cursor: pointer;
    }
    /* Alterar cor de fundo ao passar o mouse sobre Lexi AI */
    #lexi-ai-item:hover {
      background: var(--active-bg-color);
    }
    /* Make Explore GPTs look clickable */
    #explore-gpt-item {
      cursor: pointer;
    }
    #explore-gpt-item:hover {
      background: var(--active-bg-color);
    }

    .btn-icon {
      color: var(--font-color);
      background: none;
      border: none;
      padding: .25rem;
      font-size: 1rem;
      cursor: pointer;
    }

    #chat-area {
      flex: 1;
      position: relative;
      background: var(--light-background);
      transition: margin-left 0.3s ease;
    }

    flowise-fullchatbot {
      height: 100%;
      width: 100%;
      display: block;
    }

    /* === Mini‑sidebar (desktop, quando oculto) === */
    #sidebar-mini {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 44px;
      background: var(--body-color);
      border-right: 1px solid var(--shape-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 1rem;
      z-index: 1044;
      transition: left 0.3s ease, opacity 0.3s ease;
    }
    #sidebar-mini .btn-icon {
      font-size: 1.25rem;
    }
    #sidebar-mini .mt-auto { margin-top: auto; }
    #sidebar-mini .mb-3   { margin-bottom: 1rem; }

    body.with-mini-sidebar #wrapper {
      margin-left: 44px; /* mesma largura da mini-sidebar */
      transition: margin-left 0.3s ease;
    }

    /* Search box layout with icon outside select */
    .search-box {
      display: flex;
      align-items: center;
      /* border-bottom: 1px solid var(--shape-border); */
      gap: 0.5rem;
    }
    .search-box .search-icon {
      font-size: 1rem;
      color: var(--font-color);
    }
    /* Ensure sidebar content and chat list can scroll */
    #chat-sidebar > .flex-grow-1.d-flex.flex-column.justify-content-start {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #chat-sidebar .flex-grow-1[data-simplebar] {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
    /* Theme buttons matching default theme colors */
    .btn-theme {
      background-color: var(--theme-default);
      color: var(--theme-body-font-color);
      border: none;
    }
    .btn-theme:hover {
      background-color: var(--active-bg-color);
      color: var(--theme-body-font-color);
    }
    .btn-outline-theme {
      background: none;
      color: var(--theme-default);
      border: 1px solid var(--theme-default);
    }
    .btn-outline-theme:hover {
      background-color: var(--active-bg-color);
      color: var(--theme-body-font-color);
    }

    /* Override Lexi AI and Explore GPTs button to match theme text-only style */
    #lexi-ai-item,
    #explore-gpt-item {
      color: var(--theme-body-font-color);
      background: none;
      border: none;
      background-color: transparent;
    }
    #lexi-ai-item:hover,
    #explore-gpt-item:hover {
      background-color: var(--theme-secondary) !important;
      color: var(--body-color) !important;
    }

    /* Hover style for chat list items - updated to only set background, and set inner text/icons to theme-body-font-color */
    #chat-list li:hover {
      background-color: var(--theme-secondary) !important;
    }
    #chat-list li:hover * {
      color: var(--theme-body-font-color) !important;
    }
    /* Prevent hover color change on the options button */
    #chat-list li:hover .chat-options-btn,
    #chat-list li:hover .chat-options-btn * {
      color: var(--font-color) !important;
    }

    /* Provider icon style for AI providers sidebar list */
    .provider-icon {
      width: 1rem;
      height: 1rem;
      margin-right: 0.5rem;
      object-fit: contain;
    }

    /* Smaller font size for chat list items */
    #chat-list li {
      font-size: 0.875rem;
    }
    /* Left-align chat items */
    #chat-list li {
      justify-content: flex-start !important;
    }
    /* Match GPT list font size to chat list */
    #ai-providers-list li {
      font-size: 0.875rem;
    }

    /* Modern sidebar divider */
    #chat-sidebar hr {
      border: none;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--theme-default), transparent);
      margin: 0.5rem 1rem;
      opacity: 0.7;
    }
    #chat-list li { cursor: pointer; }

    /* Remove divider between chat list items */
    #chat-list li {
      border-bottom: none !important;
    }

    /* Remove divider below Nova conversa */
    #new-conversation {
      border-bottom: none !important;
    }

    /* Remove divider between Nova conversa and Explore GPTs */
    #new-conversation,
    #explore-gpt-item {
      border-bottom: none !important;
    }

    /* Reduce spacing between chat items by 40% */
    #chat-list li {
      padding: 0.3rem 0.6rem !important;
    }

    /* Custom message count badge: inverted colors with border */
    #chat-list li .badge {
      background-color: var(--body-color) !important;
      color: var(--font-color) !important;
      border: 1px solid var(--font-color) !important;
    }
  </style>

  <script type="module">
    // Intercept all fetch calls to include user identifiers
    const _origFetch = window.fetch;
    window.fetch = async (resource, init = {}) => {
      const headers = new Headers(init.headers || {});
      if (AuthService.user) {
        headers.set('x-user-email', AuthService.user.email);
        headers.set('x-user-uuid',  AuthService.user.uid);
        // Include the user's JWT in every request
        let jwt = AuthService.token;
        // If AuthService.user provides getIdToken(), use it
        if (!jwt && AuthService.user && typeof AuthService.user.getIdToken === 'function') {
          jwt = await AuthService.user.getIdToken();
        }
        if (jwt) {
          headers.set('x-user-jwt', jwt);
        }
        // Include the GPT ID header
        headers.set('x-gpt-id', '1');
        // Include the user's JWT as a Bearer token only if not already present
        if (!headers.has('Authorization')) {
          headers.set('Authorization', `Bearer ${jwt}`);
        }
      }
      return _origFetch(resource, { ...init, headers });
    };
    // Initialize Flowise embed configuration with LexiDecis theme and observers stub
    window.flowiseConfig = {
      theme: {
        disclaimer: {
          title: 'Disclaimer',
          message: 'By using this chatbot, you agree to the <a target="_blank" href="https://flowiseai.com/terms">Terms & Condition</a>',
          textColor: 'black',
          buttonColor: '#3b82f6',
          buttonText: 'Start Chatting',
          buttonTextColor: 'white',
          blurredBackgroundColor: 'rgba(0, 0, 0, 0.4)', //The color of the blurred background that overlays the chat interface
          backgroundColor: 'white',
          denyButtonText: 'Cancel',
          denyButtonBgColor: '#ef4444',
        },

        chatWindow: {
          showTitle: true,
          titleBackgroundColor: "var(--theme-default)",
          welcomeMessage: "Sou a Lexi AI, com tecnologia ChatGPT 4o da OpenAI. Ideal para responder perguntas, gerar ideias e ajudar com clareza e rapidez. O que deseja saber?",
          errorMessage: "Ops, reduza sua pergunta e tente novamente.",
          backgroundColor: "transparent",
          botMessage: {
          backgroundColor: '#f7f8ff',
          textColor: '#303235',
          showAvatar: false,
          //avatarSrc: 'https://raw.githubusercontent.com/zahidkhawaja/langchain-chat-nextjs/main/public/parroticon.png',
        },
          userMessage: {
            backgroundColor: "var(--body-color)",
            textColor: "#292929",
            showAvatar: false
          },
          textInput: {
            placeholder: "Mensagem...",
            backgroundColor: "var(--theme-default)",
            textColor: "#292929",
            sendButtonColor: "#ffffff",
            maxChars: 100000,
            maxCharsWarningMessage: "Você excedeu o limite de caracteres. Insira menos de 100000 caracteres.",
            autoFocus: true,
            sendMessageSound: true,
            receiveMessageSound: true
          },
          feedback: {
            color: "var(--theme-default)"
          },
          dateTimeToggle: {
            date: true,
            time: true
          },
          footer: {
            textColor: "var(--theme-default)",
            text: "Sempre verifique as respostas - ",
            company: "LexiDecis",
            companyLink: "https://lexidecis.com.br"
          }
        }
      },
      observersConfig: {
        // Stub: will be overridden per session
      }
    };
    import AuthService from '../assets/js/auth.js';
    import { listChats, listGpts, getGptConfig, createChatMessage } from "../assets/js/api.js";

    // === Flowise chatflowId mapping helper ===
    const chatflowIdMap = {
      'FLOW1_CHAT': 'FLOW1_CHAT'
    };
    function mapChatflowId(id) {
      return chatflowIdMap[id] || id;
    }
    const themeToggle = document.getElementById('theme-toggle');
    const miniThemeToggle = document.getElementById('mini-theme-toggle');
    // Initialize mini toggle icon
    miniThemeToggle.innerHTML = themeToggle.innerHTML;
    // Toggle theme when clicking mini toggle
    miniThemeToggle.addEventListener('click', () => themeToggle.click());
    const root = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) root.classList.add('dark-only');
    themeToggle.innerHTML = root.classList.contains('dark-only') ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon-stars"></i>';
    themeToggle.addEventListener('click', () => {
      root.classList.toggle('dark-only');
      const isDark = root.classList.contains('dark-only');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeToggle.innerHTML = isDark ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon-stars"></i>';
      miniThemeToggle.innerHTML = themeToggle.innerHTML;
    });

    // === Build dynamic AI provider list ===
    // === Build dynamic AI provider list ===
    const aiList = document.getElementById('ai-providers-list');
    const configCache = {};
    // Make gptMap available to chat history loader
    let gptMap = {};
    (async () => {
      await new Promise(resolve => {
        const checkAuth = setInterval(() => {
          if (AuthService.user) { clearInterval(checkAuth); resolve(); }
        }, 100);
      });
      const gptList = await listGpts(AuthService);
      gptMap = Object.fromEntries(gptList.map(g => [g.id, g]));
      gptList.forEach(gpt => {
        const li = document.createElement('li');
        li.id = gpt.id;
        li.className = 'px-3 py-2 d-flex align-items-center justify-content-between';
        li.setAttribute('role', 'button');
        li.tabIndex = 0;
        const isVideo = gpt.imageUrl.toLowerCase().endsWith('.mp4');
        const mediaElem = isVideo
          ? `<video src="${gpt.imageUrl}" class="provider-icon" autoplay loop muted playsinline></video>`
          : `<img src="${gpt.imageUrl}" class="provider-icon" alt="${gpt.name} icon"/>`;
        li.innerHTML = `
          <div class="d-flex align-items-center">
            ${mediaElem}
            <span class="ms-2">${gpt.name}</span>
          </div>
          <span class="badge small bg-light text-dark">${gpt.category || 'Sem categoria'}</span>
        `;
        li.addEventListener('click', async () => {
          // Show loading spinner on GPT item
          const spinner = document.createElement('div');
          spinner.className = 'spinner-border spinner-border-sm text-primary me-2';
          spinner.setAttribute('role', 'status');
          spinner.innerHTML = '<span class="visually-hidden">Loading...</span>';
          li.insertBefore(spinner, li.firstChild);
          let override = configCache[gpt.id];
          if (!override) {
            override = await getGptConfig(AuthService, gpt.id);
            configCache[gpt.id] = override; // now a flat object
          }
          // Handle case where override is an array with a JSON string under an empty key
          if (Array.isArray(override) && override.length > 0) {
            const wrapper = override[0];
            if (wrapper && typeof wrapper === 'object' && Object.prototype.hasOwnProperty.call(wrapper, '')) {
              try {
                override = JSON.parse(wrapper['']);
                configCache[gpt.id] = override;
              } catch (err) {
                console.error('Error parsing chatflowConfig JSON string:', err);
              }
            }
          }
          // Ensure sessionId is set: generate only for new chats
          if (!override.sessionId) {
            const sessionId = crypto.randomUUID();
            override = { sessionId, ...override };
            configCache[gpt.id] = override;
          }
          // Use base Flowise config from the GPT metadata
          const baseFlowise = gpt.flowiseConfig.flowise;
          // Normalize API host to avoid double slashes
          const rawApiHost = baseFlowise.apiHost || '';
          let apiHost = rawApiHost.replace(/\/$/, '');
          // Normalize apiHost: if missing protocol (e.g., ":3000" or "localhost:3000"), prepend current origin protocol and host
          if (!/^https?:\/\//.test(apiHost)) {
            apiHost = window.location.protocol + '//' + apiHost;
          }
          // === Initialize empty history in localStorage for new session ===
          const newExtKey = `${baseFlowise.chatflowId}_EXTERNAL`;
          const newFlagKey = `${baseFlowise.chatflowId}_historyInjected`;
          // Always clear previous history and start fresh for a new chat
          localStorage.removeItem(newExtKey);
          localStorage.removeItem(newFlagKey);
          localStorage.setItem(newExtKey, JSON.stringify({ chatHistory: [], chatId: override.sessionId }));
          localStorage.setItem(newFlagKey, 'true');
          // Build config with chatflowConfig nested
          const cfg = {
            chatflowid: baseFlowise.chatflowId,
            apiHost:          apiHost,
            token:            baseFlowise.token,
            headers: {
              'x-user-email': AuthService.user.email,
              'x-user-uuid':  AuthService.user.uid,
              'x-gpt-id':     gpt.id,
              'x-user-jwt':   AuthService.token
            },
            theme:            window.flowiseConfig.theme,
            observersConfig: {
              observeLoading: async (loading) => {
                if (loading) {
                  // Capture user input from the chatbot's textarea
                  try {
                    const userInput = document
                      .querySelector('flowise-fullchatbot')
                      .shadowRoot
                      .querySelector('textarea').value;
                    console.log('Sending chatmessage payload:', {
                      chatflowid: cfg.chatflowid,
                      sessionId: override.sessionId,

          const mediaTag = isCardVideo
            ? `<video src="${imageUrl}" class="card-img-top img-fluid" autoplay loop muted playsinline></video>`
            : `<img src="${imageUrl}" class="card-img-top img-fluid" alt="${name}">`;
          return `
            <div class="col-12 col-sm-6 col-md-6 col-lg-4 mb-4" data-cat="${category}">
              <div class="card h-100 shadow-sm">
                ${mediaTag}
                <div class="card-body d-flex flex-column">
                  <h5 class="card-title">${name}</h5>
                  <p class="card-text flex-grow-1">${description}</p>
                  <p class="card-text"><small class="text-muted">${category}</small></p>
                </div>
              </div>
            </div>`;
        }).join('');
        document.getElementById('gpt-cards').innerHTML = cards;
        // Make GPT cards clickable
        document.querySelectorAll('#gpt-cards .col-12').forEach(col => {
          col.style.cursor = 'pointer';
          col.addEventListener('click', () => {
            const name = col.querySelector('.card-title').textContent;
            const gpt = gpts.find(g => g.name === name);
            if (gpt) {
              // Hide the modal
              const modalEl = document.getElementById('gptModal');
              const bsModal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
              bsModal.hide();
              // Trigger GPT selection in the sidebar
              document.getElementById(gpt.id).click();
            }
          });
        });
        // Category filter buttons
        document.querySelectorAll('#gpt-categories button').forEach(btn => {
          btn.addEventListener('click', () => {
            const sel = btn.getAttribute('data-cat');
            // Highlight active
            document.querySelectorAll('#gpt-categories button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Reset search
            $('#gpt-search').val(null).trigger('change');
            // Filter cards
            document.querySelectorAll('#gpt-cards [data-cat]').forEach(col => {
              col.style.display = (sel === 'Todos' || col.getAttribute('data-cat') === sel) ? '' : 'none';
            });
          });
        });
        // Activate "Todos" by default
        document.querySelector('#gpt-categories button[data-cat="Todos"]').classList.add('active');
      } catch (error) {
        console.error('Erro ao carregar GPTs:', error);
        body.innerHTML = '<p class="text-danger">Falha ao carregar GPTs. Tente novamente mais tarde.</p>';
      }
    });
  </script>
</body>
