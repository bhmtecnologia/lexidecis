<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>API com Firebase Auth</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css">
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>

  <script>
    // Inicializa o Firebase
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_DOMINIO.firebaseapp.com",
      projectId: "SEU_PROJECT_ID",
    };
    firebase.initializeApp(firebaseConfig);

    window.onload = function() {
      const ui = SwaggerUIBundle({
        spec: {
          openapi: "3.0.0",
          info: { title: "Minha API com Firebase", version: "1.0.0" },
          paths: { "/usuarios": { get: { summary: "Lista de usuários", responses: { "200": { description: "OK" } } } } },
          components: {
            securitySchemes: {
              bearerAuth: {
                type: "http",
                scheme: "bearer",
                bearerFormat: "JWT"
              }
            }
          },
          security: [{ bearerAuth: [] }]
        },
        dom_id: '#swagger-ui',
        presets: [SwaggerUIBundle.presets.apis],
        layout: "BaseLayout",
        docExpansion: "none"
      });

      // Função de login manual
      async function loginAndAuthorize() {
        const email = prompt("Digite seu e-mail:");
        const password = prompt("Digite sua senha:");

        try {
          const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
          const token = await userCredential.user.getIdToken();

          const authData = {
            bearerAuth: "Bearer " + token
          };
          
          ui.preauthorizeApiKey('bearerAuth', token);
          
          alert("Login feito! Token injetado no Swagger.");
        } catch (error) {
          console.error("Erro ao fazer login:", error);
          alert("Erro no login: " + error.message);
        }
      }

      // Cria botão de login extra
      const button = document.createElement('button');
      button.innerText = "Login Firebase";
      button.style.position = 'fixed';
      button.style.top = '10px';
      button.style.right = '10px';
      button.style.zIndex = '9999';
      button.onclick = loginAndAuthorize;
      document.body.appendChild(button);
    };
  </script>
</body>
</html>
