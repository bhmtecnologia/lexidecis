<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat3 – Histórico via Proxy Full‑Screen</title>
  <style>
    :root {
      --theme-default: #20703b;
      --active-bg-color: #d9e8e5;
      --body-font-color: #292929;
      --light-color: #f5f5f5;
    }
    body { font-family: sans-serif; margin: 0; padding: 0; }
    #welcome-screen {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    input, button { font-size: 1rem; padding: 0.5rem; }
    .d-none { display: none !important; }
    #chatbot-container {
      display: none;
    }
    #chatbot-container.active {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      z-index: 9999;
      display: block;
    }
    flowise-fullchatbot {
      width: 100%;
      height: 100%;
      display: block;
    }
    #historyLog {
      margin-top: 1rem;
      white-space: pre-wrap;
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 4px;
      max-height: 200px;
      overflow: auto;
    }
  </style>
</head>
<body>

  <div id="welcome-screen">
    <h1>Chat3 – Histórico via Proxy</h1>

    <div>
      <label for="sessionId">Session ID:</label>
      <input id="sessionId" type="text" placeholder="Cole aqui o sessionId" size="40" />
      <button id="btnFetch">Buscar e Injetar Histórico</button>
    </div>

    <div id="historyLog">Aqui aparecerá o histórico JSON.</div>
  </div>

  <div id="chatbot-container" class="d-none"></div>

  <script type="module">
    import { getChatHistory } from '../assets/js/api.js';

    // Configuração apontando para o proxy (sem token)
    const config = {
      chatflowId: "FLOW1_CHAT",
      apiHost:    "https://proxy-5cun.onrender.com"
    };

    // AuthService dummy (não usamos token via proxy)
    const AuthService = {
      user: {
        async getIdToken() {
          // Sem necessidade de autenticação
          return;
        }
      }
    };

    const btn           = document.getElementById('btnFetch');
    const historyLog    = document.getElementById('historyLog');
    const welcomeScreen = document.getElementById('welcome-screen');
    const chatbotContainer = document.getElementById('chatbot-container');

    btn.addEventListener('click', async () => {
      const sessionId = document.getElementById('sessionId').value.trim();
      if (!sessionId) {
        historyLog.textContent = 'Informe um sessionId válido.';
        return;
      }

      // 1. Oculta o formulário e mostra feedback
      welcomeScreen.classList.add('d-none');
      historyLog.textContent = 'Buscando histórico…';

      try {
        // 2. Buscar e formatar o histórico (token vazio)
        const history = await getChatHistory(
          AuthService,
          sessionId,
          config.chatflowId,
          config.apiHost,
          ''  // sem token
        );

        // 3. Exibir no log para debug
        historyLog.textContent = JSON.stringify(history, null, 2);

        // 4. Injetar no localStorage
        const keyExternal = `${config.chatflowId}_EXTERNAL`;
        const keyInjected = `${config.chatflowId}_historyInjected`;
        localStorage.setItem(keyExternal,  JSON.stringify({ chatHistory: history, chatId: sessionId }));
        localStorage.setItem(keyInjected,  'true');

        // 5. Montar o componente full‑screen
        chatbotContainer.innerHTML = '<flowise-fullchatbot></flowise-fullchatbot>';
        chatbotContainer.classList.add('active');
        chatbotContainer.classList.remove('d-none');

        // 6. Importa dinamicamente o script do embed via proxy e inicializa em full-screen
        import('https://proxy-5cun.onrender.com/web.js')
          .then(({ default: Chatbot }) => {
            window.flowiseConfig = {
              chatflowid: config.chatflowId,
              apiHost:    config.apiHost,
              theme: {
                chatWindow: {
                  showTitle: true,
                  titleBackgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--theme-default').trim(),
                  welcomeMessage: 'Sou a Lexi AI, com tecnologia ChatGPT 4o da OpenAI. Ideal para responder perguntas, gerar ideias e ajudar com clareza e rapidez. O que deseja saber?',
                  errorMessage: 'Ops, reduza sua pergunta e tente novamente.',
                  backgroundColor: 'transparent',
                  userMessage: {
                    backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--active-bg-color').trim(),
                    textColor: getComputedStyle(document.documentElement).getPropertyValue('--body-font-color').trim(),
                    showAvatar: false
                  },
                  textInput: {
                    placeholder: 'Mensagem...',
                    backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--light-color').trim(),
                    textColor: getComputedStyle(document.documentElement).getPropertyValue('--body-font-color').trim(),
                    sendButtonColor: getComputedStyle(document.documentElement).getPropertyValue('--theme-default').trim(),
                    maxChars: 100000,
                    maxCharsWarningMessage: 'Você excedeu o limite de caracteres. Insira menos de 100000 caracteres.',
                    autoFocus: true,
                    sendMessageSound: true,
                    receiveMessageSound: true
                  },
                  feedback: {
                    color: getComputedStyle(document.documentElement).getPropertyValue('--theme-default').trim()
                  },
                  dateTimeToggle: { date: true, time: true },
                  footer: {
                    textColor: getComputedStyle(document.documentElement).getPropertyValue('--theme-default').trim(),
                    text: 'Sempre verifique as respostas - ',
                    company: 'LexiDecis',
                    companyLink: 'https://lexidecis.com.br'
                  }
                }
              }
            };
            Chatbot.initFull(window.flowiseConfig);
          })
          .catch(err => console.error('Erro carregando Flowise via proxy:', err));

      } catch (err) {
        console.error(err);
        historyLog.textContent = 'Erro: ' + err.message;
      }
    });
  </script>

</body>
</html>
