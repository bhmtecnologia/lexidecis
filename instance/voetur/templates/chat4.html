<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat4 – Histórico Reutilizando api.js</title>
  <style>
    :root {
      --theme-default: #20703b;
      --active-bg-color: #d9e8e5;
      --body-font-color: #292929;
      --light-color: #f5f5f5;
    }
    body { font-family: sans-serif; margin: 0; padding: 0; }
    #welcome-screen {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    input, button { font-size: 1rem; padding: 0.5rem; }
    .d-none { display: none !important; }
    #chatbot-container {
      display: none;
    }
    #chatbot-container.active {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      z-index: 9999;
      display: block;
    }
    flowise-fullchatbot {
      width: 100%;
      height: 100%;
      display: block;
    }
    #historyLog {
      margin-top: 1rem;
      white-space: pre-wrap;
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 4px;
      max-height: 200px;
      overflow: auto;
    }
  </style>
</head>
<body>

  <div id="welcome-screen">
    <h1>Chat4 – Histórico com api.js</h1>

    <div>
      <label for="sessionId">Session ID:</label>
      <input id="sessionId" type="text" placeholder="Cole aqui o sessionId" size="40" />
      <button id="btnFetch">Buscar e Injetar Histórico</button>
    </div>

    <div id="historyLog">O histórico aparecerá aqui.</div>
  </div>

  <div id="chatbot-container" class="d-none"></div>

  <script type="module">
    import { fetchChatHistory, injectChatHistory } from '../assets/js/api.js';

    // Configuração do proxy
    const config = {
      chatflowId: "FLOW1_CHAT",
      apiHost:    "https://proxy-5cun.onrender.com"
    };

    // AuthService dummy
    const AuthService = {
      user: {
        async getIdToken() { return; }
      }
    };

    const btn             = document.getElementById('btnFetch');
    const historyLog      = document.getElementById('historyLog');
    const welcomeScreen   = document.getElementById('welcome-screen');
    const chatbotContainer= document.getElementById('chatbot-container');

    btn.addEventListener('click', async () => {
      const sessionId = document.getElementById('sessionId').value.trim();
      if (!sessionId) {
        historyLog.textContent = 'Informe um sessionId válido.';
        return;
      }

      // Esconde o form e mostra mensagem de carregando
      welcomeScreen.classList.add('d-none');
      historyLog.textContent = 'Buscando histórico…';

      try {
        // 1) Busca e formata histórico
        const history = await fetchChatHistory(
          AuthService,
          sessionId,
          config.chatflowId,
          config.apiHost,
          ''  // sem token no proxy
        );

        // 2) Mostra no log para debug
        historyLog.textContent = JSON.stringify(history, null, 2);

        // 3) Injeta no localStorage
        injectChatHistory(config.chatflowId, sessionId, history);

        // 4) Monta o componente full-screen
        chatbotContainer.innerHTML = '<flowise-fullchatbot></flowise-fullchatbot>';
        chatbotContainer.classList.add('active');
        chatbotContainer.classList.remove('d-none');

        // 5) Carrega e inicializa o Flowise Embed via proxy
        import('https://proxy-5cun.onrender.com/web.js')
          .then(({ default: Chatbot }) => {
            window.flowiseConfig = {
              chatflowid: config.chatflowId,
              apiHost:    config.apiHost,
              theme: {
                chatWindow: {
                  showTitle: true,
                  titleBackgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--theme-default').trim(),
                  welcomeMessage: 'Bem-vindo ao Chat4 via proxy!',
                  errorMessage: 'Erro, tente novamente.',
                  backgroundColor: 'transparent',
                  userMessage: {
                    backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--active-bg-color').trim(),
                    textColor: getComputedStyle(document.documentElement).getPropertyValue('--body-font-color').trim(),
                    showAvatar: false
                  },
                  textInput: {
                    placeholder: 'Digite sua mensagem…',
                    backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--light-color').trim(),
                    textColor: getComputedStyle(document.documentElement).getPropertyValue('--body-font-color').trim(),
                    sendButtonColor: getComputedStyle(document.documentElement).getPropertyValue('--theme-default').trim(),
                    autoFocus: true
                  },
                  dateTimeToggle: { date: true, time: true },
                  footer: {
                    textColor: getComputedStyle(document.documentElement).getPropertyValue('--theme-default').trim(),
                    text: '— Proxy Chat4',
                    company: 'LexiDecis',
                    companyLink: 'https://lexidecis.com.br'
                  }
                }
              }
            };
            Chatbot.initFull(window.flowiseConfig);
          })
          .catch(err => {
            console.error('Erro carregando Embed via proxy:', err);
            historyLog.textContent = 'Erro ao carregar o chat.';
          });

      } catch (err) {
        console.error(err);
        historyLog.textContent = 'Erro: ' + err.message;
      }
    });
  </script>

</body>
</html>
