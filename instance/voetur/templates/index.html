    <!-- Script de autenticação: utiliza AuthService para monitorar o estado -->
    <script type="module">
      import AuthService from "../assets/js/auth.js";

      // Monitorar mudanças de autenticação e atualizar a interface
      AuthService.onAuthChange((user) => {
        const pageWrapper = document.getElementById('pageWrapper');
        const userEmailDropdown = document.getElementById('user-email-dropdown');

        if (!user) {
          // Redireciona para a página de login se o usuário não estiver autenticado
          window.location.href = 'login.html';
        } else {
          // Exibe o conteúdo principal e atualiza o email do usuário no header
          if (pageWrapper) pageWrapper.style.display = 'block';
          if (userEmailDropdown) userEmailDropdown.textContent = user.email;
        }
      });

      // Configura o botão de logout para utilizar AuthService.logout()
      document.addEventListener("DOMContentLoaded", () => {
        const logoutButton = document.getElementById('nav-signout');
        if (logoutButton) {
          logoutButton.addEventListener('click', async (event) => {
            event.preventDefault();
            const result = await AuthService.logout();
            if (result.success) {
              window.location.href = "login.html";
            } else {
              alert("Erro ao fazer logout: " + result.error);
            }
          });
        }

        // Configura o botão de abrir chat (se estiver habilitado)
        const openChatBtn = document.getElementById('openChatBtn');
        const chatModal = document.getElementById('chatModal');
        const closeChatBtn = document.getElementById('closeChatBtn');

        if (openChatBtn && chatModal && closeChatBtn) {
          openChatBtn.addEventListener('click', () => {
            chatModal.style.display = 'block';
          });
          closeChatBtn.addEventListener('click', () => {
            chatModal.style.display = 'none';
          });
        }
      });
    </script>

    <!-- Script para montar o menu dinâmico baseado nas permissões do usuário -->
    <script type="module">
      import AuthService from "../assets/js/auth.js";
      import { getUserProfile } from "../assets/js/api.js";
      import { buildSidebarMenu } from "../assets/js/menu-builder.js";

      AuthService.onAuthChange(async (user) => {
        if (user) {
          try {
            const profileData = await getUserProfile(AuthService);
            // Se a API retorna um array, use o primeiro objeto
            const profile = Array.isArray(profileData) && profileData.length > 0 ? profileData[0] : profileData;
            console.log("Perfil retornado da API (ajustado):", profile);
            window.userProfile = profile;
            buildSidebarMenu(profile);
          } catch (err) {
            console.error("Erro ao carregar perfil/menu:", err);
            const simpleBar = document.getElementById("simple-bar");
            if (simpleBar) {
              simpleBar.innerHTML = `<li><a href="#">Erro ao carregar menu</a></li>`;
            }
          }
        }
      });
    </script>
