<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Plano de Ação - 5W2H</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.css">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .kanban-board {
      max-width: 100%;
    }
    .kanban-item {
      white-space: normal;
      padding: 10px;
      font-size: 14px;
    }
    .kanban-title-board {
      background-color: #007bff;
      color: white;
      padding: 8px;
    }
  </style>
</head>
<body>
  <h2>Plano de Ação - Reunião Geral (5W2H)</h2>
  <div id="filters" style="margin-bottom: 20px;">
    <label style="margin-right: 10px;">Quem: 
      <select id="filter-who" style="width:200px;">
        <option value="">Todos</option>
      </select>
    </label>
    <label style="margin-right: 10px;">Por quê: 
      <select id="filter-why" style="width:200px;">
        <option value="">Todos</option>
      </select>
    </label>
    <button id="apply-filters">Aplicar filtros</button>
    <button id="reset-filters">Limpar filtros</button>
  </div>
  <div id="kanban"></div>

  <script src="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.js"></script>
  <script>
  // Fetch plano de ação items from API and render Kanban
  fetch('https://n8n.power.tec.br/webhook/lexidecis/v1/plano-de-acao')
    .then(response => response.json())
    .then(data => {
      const allItems = data;

      // Populate filter selects
      const whoValues = [...new Set(allItems.map(i => i.who).filter(Boolean))];
      const whyValues = [...new Set(allItems.map(i => i.why).filter(Boolean))];
      whoValues.forEach(val => {
        $('#filter-who').append(new Option(val, val));
      });
      whyValues.forEach(val => {
        $('#filter-why').append(new Option(val, val));
      });
      // Initialize Select2
      $('#filter-who').select2({ placeholder: 'Filtrar por responsável', allowClear: true });
      $('#filter-why').select2({ placeholder: 'Filtrar por motivo', allowClear: true });

      function renderBoard(items) {
        document.getElementById('kanban').innerHTML = '';
        new jKanban({
          element: '#kanban',
          boards: [
            {
              id: 'planned',
              title: 'Planejados',
              class: 'primary',
              item: items.map(item => ({
                title: `
          <strong>${item.numero}. ${item.what}</strong><br>
          ${item.who ? `<em>Quem:</em> ${item.who}<br>` : ''}
          ${item.when ? `<em>Quando:</em> ${item.when}<br>` : ''}
          ${item.why ? `<em>Por quê:</em> ${item.why}<br>` : ''}
          ${item.where ? `<em>Onde:</em> ${item.where}<br>` : ''}
          ${item.how ? `<em>Como:</em> ${item.how}<br>` : ''}
          ${item.how_much ? `<em>Quanto:</em> ${item.how_much}` : ''}
        `.trim()
              }))
            },
            {
              id: 'in_execution',
              title: 'Em Execução',
              class: 'warning',
              item: []
            },
            {
              id: 'blocked',
              title: 'Bloqueados',
              class: 'danger',
              item: []
            },
            {
              id: 'completed',
              title: 'Concluídos',
              class: 'success',
              item: []
            }
          ]
        });
      }

      renderBoard(allItems);

      document.getElementById('apply-filters').addEventListener('click', () => {
        const whoFilter = $('#filter-who').val();
        const whyFilter = $('#filter-why').val();
        const filtered = allItems.filter(item =>
          (!whoFilter || (item.who && item.who.toLowerCase().includes(whoFilter.toLowerCase()))) &&
          (!whyFilter || (item.why && item.why.toLowerCase().includes(whyFilter.toLowerCase())))
        );
        renderBoard(filtered);
      });
      document.getElementById('reset-filters').addEventListener('click', () => {
        $('#filter-who').val(null).trigger('change');
        $('#filter-why').val(null).trigger('change');
        renderBoard(allItems);
      });
    })
    .catch(error => {
      console.error('Erro ao carregar dados do plano de ação:', error);
      document.getElementById('kanban').innerHTML = '<p>Falha ao carregar o plano de ação.</p>';
    });
</script>
</body>
</html>
