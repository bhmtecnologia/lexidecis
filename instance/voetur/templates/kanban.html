<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Plano de Ação - 5W2H</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.css">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .kanban-board {
      max-width: 100%;
    }
    .kanban-item {
      white-space: normal;
      padding: 10px;
      font-size: 14px;
    }
    .kanban-title-board {
      background-color: #007bff;
      color: white;
      padding: 8px;
    }
    .modal-overlay { display:flex; }
    .modal-content input { margin-bottom:10px; }
  </style>
</head>
<body>
  <div style="display:flex; align-items:center; margin-bottom:10px;">
    <h2 style="margin-right:20px;">Plano de Ação - Reunião Geral (5W2H)</h2>
    <button id="btn-kanban" style="margin-right:5px;">Kanban</button>
    <button id="btn-calendar">Calendário</button>
    <button id="btn-create" style="margin-left:10px;">Novo Item</button>
    <button id="btn-group-quem" style="margin-left:10px;">Por Quem</button>
  </div>
  <div id="filters" style="margin-bottom: 20px;">
    <label style="margin-right: 10px;">Quem: 
      <select id="filter-who" style="width:200px;">
        <option value="">Todos</option>
      </select>
    </label>
    <label style="margin-right: 10px;">Por quê: 
      <select id="filter-why" style="width:200px;">
        <option value="">Todos</option>
      </select>
    </label>
    <button id="apply-filters">Aplicar filtros</button>
    <button id="reset-filters">Limpar filtros</button>
  </div>
  <div id="kanban"></div>
  <div id="calendar" style="display:none;"></div>

  <!-- Edit Item Modal -->
  <div id="edit-modal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
    <div class="modal-content" style="background:#fff; padding:20px; border-radius:4px; width:400px; max-width:90%;">
      <h3>Editar Item</h3>
      <form id="edit-form">
        <input type="hidden" id="modal-id" />
        <div><label>Número:<br><input type="text" id="modal-numero" style="width:100%;" readonly></label></div>
        <div><label>O que:<br><input type="text" id="modal-o-que" style="width:100%;"></label></div>
        <div><label>Quem:<br><input type="text" id="modal-quem" style="width:100%;"></label></div>
        <div><label>Por quê:<br><input type="text" id="modal-por-que" style="width:100%;"></label></div>
        <div><label>Início:<br><input type="datetime-local" id="modal-inicio" style="width:100%;"></label></div>
        <div><label>Fim:<br><input type="datetime-local" id="modal-fim" style="width:100%;"></label></div>
        <div><label>Quando:<br><input type="datetime-local" id="modal-quando" style="width:100%;"></label></div>
        <div><label>Onde:<br><input type="text" id="modal-onde" style="width:100%;"></label></div>
        <div><label>Como:<br><input type="text" id="modal-como" style="width:100%;"></label></div>
        <div><label>Quanto:<br><input type="text" id="modal-quanto" style="width:100%;"></label></div>
        <div><label>Observações:<br><textarea id="modal-observacoes" style="width:100%; height:80px;"></textarea></label></div>
        <div style="margin-top:10px; text-align:right;">
          <button type="button" id="modal-cancel">Cancelar</button>
          <button type="button" id="modal-save">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jkanban@1.3.1/dist/jkanban.min.js"></script>
  <script>
  // Fetch plano de ação items from API and render Kanban
  fetch('https://n8n.power.tec.br/webhook/lexidecis/v1/plano-de-acao')
    .then(response => response.json())
    .then(data => {
      const allItems = data;
      let filtered = null;
      const modal = document.getElementById('edit-modal');
      const form = document.getElementById('edit-form');

      // Populate filter selects
      const whoValues = [...new Set(allItems.map(i => i.quem).filter(Boolean))];
      const whyValues = [...new Set(allItems.map(i => i.por_que).filter(Boolean))];
      whoValues.forEach(val => {
        $('#filter-who').append(new Option(val, val));
      });
      whyValues.forEach(val => {
        $('#filter-why').append(new Option(val, val));
      });
      // Initialize Select2
      $('#filter-who').select2({ placeholder: 'Filtrar por responsável', allowClear: true });
      $('#filter-why').select2({ placeholder: 'Filtrar por motivo', allowClear: true });

      function renderCalendar(items) {
        const calendarEl = document.getElementById('calendar');
        calendarEl.innerHTML = '';
        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          height: 'auto',
          events: items.map(i => ({
            title: `${i.numero}. ${i.o_que}`,
            start: i.inicio,
            end:   i.fim
          }))
        });
        calendar.render();
      }

      function renderByQuem(items) {
        document.getElementById('kanban').innerHTML = '';
        const groups = [...new Set(items.map(i => i.quem).filter(Boolean))];
        const boards = groups.map(quem => ({
          id: `quem_${quem}`,
          title: quem,
          class: 'info',
          item: items
            .filter(i => i.quem === quem)
            .map(item => ({
              id: item.id,
              title: `
                <div class="card-summary">
                  <strong>${item.numero}. ${item.o_que}</strong><br>
                  <em>Quem:</em> ${item.quem}
                  <a href="#" class="toggle-details" style="float:right;">Mais</a>
                </div>
                <div class="card-details" style="display:none; margin-top:8px;">
                  ${item.por_que ? `<div><em>Por quê:</em> ${item.por_que}</div>` : ''}
                  ${item.inicio  ? `<div><em>Início:</em> ${new Date(item.inicio).toLocaleString()}</div>` : ''}
                  ${item.fim     ? `<div><em>Fim:</em> ${new Date(item.fim).toLocaleString()}</div>` : ''}
                  ${item.quando  ? `<div><em>Quando:</em> ${new Date(item.quando).toLocaleString()}</div>` : ''}
                  ${item.onde    ? `<div><em>Onde:</em> ${item.onde}</div>` : ''}
                  ${item.como    ? `<div><em>Como:</em> ${item.como}</div>` : ''}
                  ${item.quanto  ? `<div><em>Quanto:</em> ${item.quanto}</div>` : ''}
                  ${item.observacoes ? `<div><em>Observações:</em> ${item.observacoes}</div>` : ''}
                </div>
              `.trim()
            }))
        }));
        new jKanban({
          element: '#kanban',
          boards: boards,
          dropEl: function() {}, // disable drag/drop here
        });
      }

      function renderBoard(items) {
        document.getElementById('kanban').innerHTML = '';
        // Create buckets for each status
        const buckets = {
          planejado:    [],
          em_execucao: [],
          bloqueado:   [],
          concluido:   []
        };
        items.forEach(item => {
          const key = item.status || 'planejado';
          buckets[key].push({
            id: item.id,
            title: `
              <div class="card-summary">
                <strong>${item.numero}. ${item.o_que}</strong><br>
                <em>Quem:</em> ${item.quem}
                <a href="#" class="toggle-details" style="float:right;">Mais</a>
              </div>
              <div class="card-details" style="display:none; margin-top:8px;">
                ${item.por_que ? `<div><em>Por quê:</em> ${item.por_que}</div>` : ''}
                ${item.inicio  ? `<div><em>Início:</em> ${new Date(item.inicio).toLocaleString()}</div>` : ''}
                ${item.fim     ? `<div><em>Fim:</em> ${new Date(item.fim).toLocaleString()}</div>` : ''}
                ${item.quando  ? `<div><em>Quando:</em> ${new Date(item.quando).toLocaleString()}</div>` : ''}
                ${item.onde    ? `<div><em>Onde:</em> ${item.onde}</div>` : ''}
                ${item.como    ? `<div><em>Como:</em> ${item.como}</div>` : ''}
                ${item.quanto  ? `<div><em>Quanto:</em> ${item.quanto}</div>` : ''}
                ${item.observacoes ? `<div><em>Observações:</em> ${item.observacoes}</div>` : ''}
              </div>
            `.trim()
          });
        });
        new jKanban({
          element: '#kanban',
          boards: [
            { id: 'planejado',    title: 'Planejados',    class: 'primary',   item: buckets.planejado },
            { id: 'em_execucao',   title: 'Em Execução',  class: 'warning',   item: buckets.em_execucao },
            { id: 'bloqueado',    title: 'Bloqueados',    class: 'danger',    item: buckets.bloqueado },
            { id: 'concluido',    title: 'Concluídos',    class: 'success',   item: buckets.concluido }
          ],
          dropEl(el, target, source, sibling) {
            // Format dates to "YYYY-MM-DD HH:MM:SS.mmm+00"
            function formatTimestamp(dateStr) {
              const d = new Date(dateStr);
              const pad = (n, z = 2) => `${n}`.padStart(z, '0');
              const ms = String(d.getMilliseconds()).padStart(6, '0');
              return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} ` +
                     `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}.` +
                     `${ms}+00`;
            }
            const itemId = el.getAttribute('data-eid') || el.getAttribute('data-id') || el.id;
            const item = allItems.find(i => i.id === itemId);
            if (!item) return;
            const newStatus = target.parentElement.getAttribute('data-id');
            // Update status and format dates before sending
            item.status = newStatus;
            if (item.inicio) item.inicio = formatTimestamp(item.inicio);
            if (item.fim)    item.fim    = formatTimestamp(item.fim);
            fetch(`https://n8n.power.tec.br/webhook/lexidecis/v1/plano-de-acao?id=${itemId}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(item)
            })
            .then(response => {
              if (!response.ok) throw new Error('Erro ao atualizar status');
              return response.json();
            })
            .then(data => {
              console.log('Status atualizado:', data);
            })
            .catch(err => {
              console.error(err);
              alert('Falha ao atualizar status do item');
            });
          },
        });
        document.getElementById('kanban').addEventListener('click', function(e) {
          if (e.target.classList.contains('toggle-details')) {
            e.preventDefault();
            e.stopPropagation();
            const details = e.target.closest('.kanban-item').querySelector('.card-details');
            if (details) {
              details.style.display = details.style.display === 'none' ? 'block' : 'none';
            }
          }
        });
        // Open modal when clicking on card summary (excluding "Mais")
        document.getElementById('kanban').addEventListener('click', function(e) {
          if (e.target.classList.contains('toggle-details')) return;
          const itemEl = e.target.closest('.kanban-item');
          if (itemEl) {
            const itemId = itemEl.getAttribute('data-id') || itemEl.getAttribute('data-eid') || itemEl.id;
            const item = allItems.find(i => i.id === itemId);
            if (!item) return;
            // Helper to format date/time for datetime-local input
            const formatForInput = dtStr => {
              const d = new Date(dtStr);
              return isNaN(d) ? '' : d.toISOString().slice(0,16);
            };
            // Populate modal fields
            document.getElementById('modal-id').value = item.id;
            document.getElementById('modal-numero').value = item.numero;
            document.getElementById('modal-o-que').value = item.o_que;
            document.getElementById('modal-quem').value = item.quem;
            document.getElementById('modal-por-que').value = item.por_que;
            document.getElementById('modal-inicio').value = formatForInput(item.inicio);
            document.getElementById('modal-fim').value    = formatForInput(item.fim);
            document.getElementById('modal-quando').value = formatForInput(item.quando);
            document.getElementById('modal-onde').value   = item.onde || '';
            document.getElementById('modal-como').value    = item.como || '';
            document.getElementById('modal-quanto').value  = item.quanto || '';
            document.getElementById('modal-observacoes').value = item.observacoes || '';
            modal.style.display = 'flex';
          }
        });
      }
      // Initial render
      renderBoard(allItems);
      renderCalendar(allItems);

      document.getElementById('apply-filters').addEventListener('click', () => {
        const whoFilter = $('#filter-who').val();
        const whyFilter = $('#filter-why').val();
        filtered = allItems.filter(item =>
          (!whoFilter || (item.quem && item.quem.toLowerCase().includes(whoFilter.toLowerCase()))) &&
          (!whyFilter || (item.por_que && item.por_que.toLowerCase().includes(whyFilter.toLowerCase())))
        );
        renderBoard(filtered);
        renderCalendar(filtered);
      });
      document.getElementById('reset-filters').addEventListener('click', () => {
        $('#filter-who').val(null).trigger('change');
        $('#filter-why').val(null).trigger('change');
        filtered = null;
        renderBoard(allItems);
        renderCalendar(allItems);
      });

      document.getElementById('btn-kanban').addEventListener('click', () => {
        document.getElementById('kanban').style.display = '';
        document.getElementById('calendar').style.display = 'none';
        renderBoard(filtered || allItems);
      });
      document.getElementById('btn-calendar').addEventListener('click', () => {
        document.getElementById('kanban').style.display = 'none';
        document.getElementById('calendar').style.display = '';
        renderCalendar(filtered || allItems);
      });
      document.getElementById('btn-group-quem').addEventListener('click', () => {
        document.getElementById('kanban').style.display = '';
        document.getElementById('calendar').style.display = 'none';
        renderByQuem(filtered || allItems);
      });

      // Modal cancel handler
      document.getElementById('modal-cancel').addEventListener('click', () => {
        modal.style.display = 'none';
      });

      // Novo Item button opens modal in create mode
      document.getElementById('btn-create').addEventListener('click', () => {
        // Compute next number and set it in modal-numero
        const maxNumero = allItems.length
          ? Math.max(...allItems.map(i => Number(i.numero)))
          : 0;
        document.getElementById('modal-numero').value = maxNumero + 1;
        // Clear other modal fields
        document.getElementById('modal-id').value = '';
        document.getElementById('modal-o-que').value = '';
        document.getElementById('modal-quem').value = '';
        document.getElementById('modal-por-que').value = '';
        document.getElementById('modal-inicio').value = '';
        document.getElementById('modal-fim').value = '';
        document.getElementById('modal-quando').value = '';
        document.getElementById('modal-onde').value = '';
        document.getElementById('modal-como').value = '';
        document.getElementById('modal-quanto').value = '';
        document.getElementById('modal-observacoes').value = '';
        modal.style.display = 'flex';
      });

      // Modal save handler (form submit)
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const id = document.getElementById('modal-id').value;
        const isNew = !id;
        const updated = {
          ...(isNew ? {} : allItems.find(i => i.id === id)),
          o_que: document.getElementById('modal-o-que').value,
          quem:  document.getElementById('modal-quem').value,
          por_que: document.getElementById('modal-por-que').value,
          observacoes: document.getElementById('modal-observacoes').value,
          quando: document.getElementById('modal-quando').value.replace('T', ' ')+ '+00',
          onde: document.getElementById('modal-onde').value,
          como: document.getElementById('modal-como').value,
          quanto: document.getElementById('modal-quanto').value,
          inicio: document.getElementById('modal-inicio').value.replace('T', ' ')+ '+00',
          fim:    document.getElementById('modal-fim').value.replace('T', ' ')+ '+00'
        };
        const url = 'https://n8n.power.tec.br/webhook-test/lexidecis/v1/plano-de-acao' + (isNew ? '' : `?id=${id}`);
        const method = isNew ? 'POST' : 'PUT';
        fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updated)
        })
        .then(res => res.json())
        .then(data => {
          if (isNew) {
            allItems.push(data);
          } else {
            const idx = allItems.findIndex(i => i.id === id);
            allItems[idx] = updated;
          }
          renderBoard(filtered || allItems);
          renderCalendar(filtered || allItems);
          modal.style.display = 'none';
        })
        .catch(err => {
          console.error(err);
          alert('Falha ao salvar alterações');
        });
      });
      // Trigger form submission when Save button is clicked
      document.getElementById('modal-save').addEventListener('click', () => {
        form.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
      });
    })
    .catch(error => {
      console.error('Erro ao carregar dados do plano de ação:', error);
      document.getElementById('kanban').innerHTML = '<p>Falha ao carregar o plano de ação.</p>';
    });
</script>
</body>
</html>
