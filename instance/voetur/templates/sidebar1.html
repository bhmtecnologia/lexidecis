<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat – Demo Sidebar + Área de Mensagens</title>

  <!-- Bootstrap Icons (apenas para os ícones) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Select2 (pesquisa) -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <!-- CSS Principal -->
  <link id="color" rel="stylesheet" href="../assets/css/color-1.css" media="screen" />

  <style>
    :root {
      --sidebar-w: 280px;
    }
    .hidden { display: none !important; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--body-color);
      color: var(--theme-body-font-color);
    }

    /* ===== Layout principal ===== */
    #wrapper {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--body-color);
    }

    #chat-sidebar {
      width: var(--sidebar-w);
      min-width: 240px;
      max-width: 340px;
      background: var(--body-color);
      border-right: 1px solid var(--shape-border);
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
      transition: margin-left 0.3s ease, transform 0.3s ease, width 0.3s ease;
    }

    .sidebar-header button {
      margin-left: .25rem;
    }


    .sidebar-bottom {
      background: var(--bg-light);
      padding: 0;
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
    }

    #userMenuBtn {
      width: 100%;
      padding: .75rem 1rem;
      background: none;
      border: none;
      text-align: left;
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    #userMenuBtn i:last-child {
      margin-left: auto;
      transition: transform .2s;
    }
    .sidebar-bottom.open #userMenuBtn i:last-child {
      transform: rotate(180deg);
    }

    /* Dropdown look & feel (Select2‑like) */
    #userMenu {
      position: absolute;
      bottom: 100%;
      left: 0;
      width: 100%;
      margin: 0;
      padding: .25rem 0;
      border: 1px solid var(--border-light-color);
      border-radius: 4px;
      background: var(--dropdown-bg-color);
      box-shadow: 0 2px 4px rgba(0,0,0,.08);
      list-style: none;
      z-index: 1050;
      transition: all 0.2s ease;
    }
    #userMenu.hidden { display: none !important; }
    #userMenu .dropdown-item {
      display: flex;
      align-items: center;
      padding: .5rem 1rem;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      color: var(--theme-body-font-color);
    }
    #userMenu .dropdown-item:hover {
      background: var(--table-hover-color);
    }

    #chat-sidebar header {
      padding: .75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--shape-border);
    }

    #chat-sidebar ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #chat-sidebar li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .5rem 1rem;
      border-bottom: 1px solid var(--shape-border);
    }
    #chat-sidebar li:hover {
      background: var(--table-hover-color);
    }

    .btn-icon {
      color: var(--font-color);
      background: none;
      border: none;
      padding: .25rem;
      font-size: 1rem;
      cursor: pointer;
    }

    #chat-area {
      flex: 1;
      position: relative;
      background: var(--light-background);
      transition: margin-left 0.3s ease;
    }

    flowise-fullchatbot {
      height: 100%;
      width: 100%;
      display: block;
    }

    /* === Mini‑sidebar (desktop, quando oculto) === */
    #sidebar-mini {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 44px;
      background: var(--body-color);
      border-right: 1px solid var(--shape-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 1rem;
      z-index: 1044;
      transition: left 0.3s ease, opacity 0.3s ease;
    }
    #sidebar-mini .btn-icon {
      font-size: 1.25rem;
    }
    #sidebar-mini .mt-auto { margin-top: auto; }
    #sidebar-mini .mb-3   { margin-bottom: 1rem; }

    body.with-mini-sidebar #wrapper {
      margin-left: 44px; /* mesma largura da mini-sidebar */
      transition: margin-left 0.3s ease;
    }

    /* Search icon prefix */
    .search-box {
      position: relative;
      border-bottom: 1px solid var(--shape-border);
    }
    .search-box .search-icon {
      position: absolute;
      top: 50%;
      left: 1rem;
      transform: translateY(-50%);
      color: var(--font-color);
      pointer-events: none;
      font-size: 1rem;
      z-index: 10;
    }
    .search-box .select2-selection--single {
      padding-left: 2rem;
    }
    /* Ensure sidebar content and chat list can scroll */
    #chat-sidebar > .flex-grow-1.d-flex.flex-column.justify-content-start {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #chat-sidebar .flex-grow-1[data-simplebar] {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simplebar@6.2.3/dist/simplebar.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/simplebar@6.2.3/dist/simplebar.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css" />
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
</head>
<body>

  <!-- Mini‑sidebar que aparece quando painel principal está oculto (desktop) -->
  <div id="sidebar-mini" class="hidden">
    <button id="mini-toggle" class="btn-icon" title="Mostrar conversas"><i class="bi bi-chevron-right"></i></button>
    <button id="mini-new"    class="btn-icon mt-3" title="Novo chat"><i class="bi bi-plus-lg"></i></button>
    <button id="mini-user"   class="btn-icon mt-auto mb-3" title="Minha conta"><i class="bi bi-person-circle"></i></button>
  </div>

  <div id="wrapper">

    <!-- Sidebar -->
    <nav id="chat-sidebar" class="d-flex flex-column">
      <div class="flex-grow-1 d-flex flex-column justify-content-start">
        <header class="sidebar-header">
          <strong></strong>
          <div class="ms-auto d-flex align-items-center">
            <button id="theme-toggle" class="btn-icon" title="Alternar tema">
              <i class="bi bi-moon-stars"></i>
            </button>
            <button id="new-chat" class="btn-icon" title="Novo chat"><i class="bi bi-plus-lg"></i></button>
            <button id="toggle-list" class="btn-icon" title="Ocultar"><i class="bi bi-chevron-left"></i></button>
          </div>
        </header>

        <!-- Pesquisar -->
        <div class="px-3 py-2 search-box">
          <i class="bi bi-search search-icon"></i>
          <select id="chat-search" style="width:100%">
            <option></option>
          </select>
        </div>

        <!-- Item fixo Lexi AI -->
        <ul class="list-unstyled m-0">
          <li class="px-3 py-0 d-flex align-items-center">
            <i class="bi bi-stars me-1"></i><span class="flex-grow-1">Lexi&nbsp;AI</span>
          </li>
        </ul>
        <!-- Explore GPTs -->
        <ul class="list-unstyled m-0">
          <li class="px-3 py-0 d-flex align-items-center">
            <i class="bi bi-grid-3x3-gap me-2"></i><span class="flex-grow-1">Explore&nbsp;GPTs</span>
          </li>
        </ul>
        <!-- Seção Chats -->
        <div class="px-3 py-0 text-muted small fw-semibold">Chats</div>

        <!-- Lista de chats -->
        <div class="flex-grow-1" data-simplebar style="overflow-y: auto; flex: 1; min-height: 0;">
          <ul id="chat-list" class="mb-0 pt-0"></ul>
        </div>

      </div>

      <!-- Seção inferior do usuário -->
      <div class="sidebar-bottom" id="avatarBlock">
        <button id="userMenuBtn">
          <i class="bi bi-person-circle fs-2 me-2"></i>
          <span class="fw-semibold" id="user-name">Bruno Murakami</span>
          <i class="bi bi-chevron-up small"></i>
        </button>
        
        <ul id="userMenu" class="hidden">
          <li>
            <button class="dropdown-item" id="logout-btn">
              <i class="bi bi-box-arrow-right me-2"></i>Sair
            </button>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Área de Mensagens -->
    <section id="chat-area">
      <!-- Flowise Embed (ou qualquer outro componente de chat) -->
      <flowise-fullchatbot></flowise-fullchatbot>
    </section>
  </div>

  <!-- ===== JS de interação (puro, sem dependências) ===== -->
  <script type="module">
    import AuthService from '../assets/js/auth.js';
    import { listChats } from "../assets/js/api.js";

    // Theme toggle logic
    const themeToggle = document.getElementById('theme-toggle');
    const root = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      root.classList.add('dark-only');
    }
    themeToggle.innerHTML = root.classList.contains('dark-only')
      ? '<i class="bi bi-sun"></i>'
      : '<i class="bi bi-moon-stars"></i>';
    themeToggle.addEventListener('click', () => {
      root.classList.toggle('dark-only');
      const isDark = root.classList.contains('dark-only');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeToggle.innerHTML = isDark
        ? '<i class="bi bi-sun"></i>'
        : '<i class="bi bi-moon-stars"></i>';
    });
    // Intercept all fetch calls to include user identifiers
    const _origFetch = window.fetch;
    window.fetch = (resource, init = {}) => {
      const headers = new Headers(init.headers || {});
      if (AuthService.user) {
        headers.set('x-user-email', AuthService.user.email);
        headers.set('x-user-uuid', AuthService.user.uid);
      }
      return _origFetch(resource, { ...init, headers });
    };
    
    // Load and render chat list
    (async () => {
      // Wait until AuthService.user is available
      await new Promise(resolve => {
        const checkAuth = setInterval(() => {
          if (AuthService.user) {
            clearInterval(checkAuth);
            resolve();
          }
        }, 100);
      });
      try {
        let resp = await listChats(AuthService);
        if (typeof resp === 'string') resp = JSON.parse(resp);
        const items = Array.isArray(resp) ? resp : resp.data ? [resp] : [];
        const chatItems = items.flatMap(i => {
          const raw = i.data;
          return Array.isArray(raw)
            ? raw
            : typeof raw === 'string'
              ? JSON.parse(raw)
              : [raw];
        });
        const chatListEl = document.getElementById('chat-list');
        chatListEl.innerHTML = '';
        chatItems.forEach(chat => {
          const li = document.createElement('li');
          const span = document.createElement('span');
          span.textContent = chat.name || chat.id;
          li.appendChild(span);
          const actions = document.createElement('div');
          actions.innerHTML = `<button class="chat-options-btn btn-icon" title="Opções"><i class="bi bi-three-dots"></i></button>`;
          li.appendChild(actions);
          chatListEl.appendChild(li);
          tippy(li.querySelector('.chat-options-btn'), {
            content: `
              <ul class="list-unstyled m-0">
                <li><button class="dropdown-item">Renomear</button></li>
                <li><button class="dropdown-item">Arquivar</button></li>
                <li><button class="dropdown-item text-danger">Excluir</button></li>
              </ul>
            `,
            allowHTML: true,
            interactive: true,
            trigger: 'click',
            placement: 'right-start'
          });
        });
        refreshSearchOptions();
      } catch (err) {
        console.error('Erro ao carregar chats:', err);
      }
    })();

    // Redirect to login if not authenticated
    AuthService.onAuthChange(user => {
      if (!user) {
        window.location.href = './login.html';
      }
    });

    const sidebar    = document.getElementById('chat-sidebar');
    const toggleBtn  = document.getElementById('toggle-list');
    const miniBar    = document.getElementById('sidebar-mini');
    const miniToggle = document.getElementById('mini-toggle');
    const miniNew    = document.getElementById('mini-new');
    const miniUser   = document.getElementById('mini-user');

    document.getElementById('new-chat').addEventListener('click', () =>
      alert('Criar novo chat - integrar à API')
    );
    document.getElementById('logout-btn').addEventListener('click', () =>
      AuthService.logout()
    );

    const SIDEBAR_KEY = 'chatSidebarHidden';

    function refreshSearchOptions() {
      const $sel = $('#chat-search');
      $sel.find('option').not(':first').remove();
      document.querySelectorAll('#chat-list li span').forEach(span => {
        $sel.append(new Option(span.textContent, span.textContent, false, false));
      });
      $sel.val('').trigger('change');
    }

    $(function(){
      refreshSearchOptions();
      $('#chat-search').select2({
        placeholder: 'Pesquisar',
        allowClear: true,
        width: '100%'
      });
    });

    function isMobile() { return window.innerWidth <= 768; }
    function sidebarVisible() { return !sidebar.classList.contains('hidden'); }
    function updateUI() {
      const visible = sidebarVisible();
      toggleBtn.firstElementChild.className = visible ? 'bi bi-chevron-left' : 'bi bi-chevron-right';
      miniBar.classList.toggle('hidden', visible);
      document.body.classList.toggle('with-mini-sidebar', !visible);
    }
    function toggleSidebar() {
      sidebar.classList.toggle('hidden');
      localStorage.setItem(SIDEBAR_KEY, sidebar.classList.contains('hidden'));
      updateUI();
    }

    if (window.innerWidth <= 768) {
      sidebar.classList.add('hidden');
    } else if (localStorage.getItem(SIDEBAR_KEY) === 'true') {
      sidebar.classList.add('hidden');
    } else {
      sidebar.classList.remove('hidden');
    }

    toggleBtn.addEventListener('click', toggleSidebar);
    miniToggle.addEventListener('click', toggleSidebar);
    miniNew.addEventListener('click', () => {
      document.getElementById('new-chat').click();
    });
    miniUser.addEventListener('click', () => {
      if (!sidebarVisible()) toggleSidebar();
      document.getElementById('userMenuBtn').click();
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth <= 768) {
        sidebar.classList.add('hidden');
        localStorage.setItem(SIDEBAR_KEY, 'true');
      } else {
        sidebar.classList.remove('hidden');
        localStorage.setItem(SIDEBAR_KEY, 'false');
      }
      updateUI();
    });

    updateUI();

    /* ====== Flowise demo init (opcional) ====== */
    import('https://proxy-5cun.onrender.com/web.js')
      .then(({ default: Chatbot }) => {
        Chatbot.initFull({
          chatflowid: 'MAIN_CHAT',
          apiHost: 'https://proxy-5cun.onrender.com',
          theme: {
            chatWindow: {
              showTitle: true,
              titleAvatarSrc: 'https://www.bhm.tec.br/images/152x152/10788698/favicon.png',
              titleBackgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--theme-default').trim(),
              errorMessage: 'Ops, reduza sua pergunta e tente novamente.',
              backgroundColor: 'transparent',
              userMessage: {
                backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--active-bg-color').trim(),
                textColor: getComputedStyle(document.documentElement).getPropertyValue('--body-font-color').trim(),
                showAvatar: false,
              },
              textInput: {
                placeholder: 'Mensagem...',
                backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--light-color').trim(),
                textColor: getComputedStyle(document.documentElement).getPropertyValue('--body-font-color').trim(),
                sendButtonColor: getComputedStyle(document.documentElement).getPropertyValue('--theme-default').trim(),
                maxChars: 100000,
                maxCharsWarningMessage: 'Você excedeu o limite de caracteres. Insira menos de 100000 caracteres.',
                autoFocus: true,
                sendMessageSound: true,
                receiveMessageSound: true,
              },
              feedback: {
                color: getComputedStyle(document.documentElement).getPropertyValue('--theme-default').trim(),
              },
              dateTimeToggle: {
                date: true,
                time: true,
              },
              footer: {
                textColor: getComputedStyle(document.documentElement).getPropertyValue('--theme-default').trim(),
                text: 'Sempre verifique as respostas - ',
                company: 'LexiDecis',
                companyLink: 'https://lexidecis.com.br',
              }
            }
          }
        });
      })
      .catch(err => console.error('Erro carregando Flowise:', err));

    const avatarBlock = document.getElementById('avatarBlock');
    const userMenu    = document.getElementById('userMenu');
    const userBtn     = document.getElementById('userMenuBtn');

    userBtn.addEventListener('click', () => {
      userMenu.classList.toggle('hidden');
      avatarBlock.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!avatarBlock.contains(e.target)) {
        userMenu.classList.add('hidden');
        avatarBlock.classList.remove('open');
      }
    });
  </script>

</body>
</html>
