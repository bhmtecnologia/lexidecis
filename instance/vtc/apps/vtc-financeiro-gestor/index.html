<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
  />
  <title>Tela Estilo iOS</title>

  <!-- FontAwesome para os ícones de app -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    /* 1. Estilo geral do corpo: plano de fundo tipo iOS */
    body {
      margin: 0;
      padding: 0;
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('./images/wallpaper.jpg') no-repeat center center fixed;
      background-size: cover;
      filter: blur(2px);
      z-index: -1;
    }

    /* 2. Container que agrupa os ícones em grid */
    .home-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, auto);
      justify-items: center;
      align-items: center;
      padding-top: calc(env(safe-area-inset-top, 0px) + 60px);
      padding-left: 12px;
      padding-right: 12px;
      row-gap: 24px;
      column-gap: 20px;
      /* limit area so icons do not go behind the dock */
      padding-bottom: calc(140px + env(safe-area-inset-bottom, 0px));
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 3. Cada “ícone de app” */
    .app-icon {
      width: 68px;
      height: 68px;
      border-radius: 17px; /* cantos arredondados, parecido com iOS */
      background-color: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 6px;
      position: relative;
    }
    .app-icon i {
      font-size: 32px;
      color: white;
    }
    .app-label {
      text-align: center;
      font-size: 12px;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 68px;
    }

    /* 4. Estilo do Dock inferior */
    .dock {
      position: fixed;
      bottom: 56px;
      left: 0;
      width: 100%;
      height: 84px; /* aproximado do iPhone */
      background-color: rgba(255, 255, 255, 0.20);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 0px); /* considera barra de gesto */
    }
    .dock-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 60%; /* largura do dock */
      max-width: 400px;
    }
    .dock-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      text-decoration: none;
    }
    .dock-icon i {
      font-size: 32px;
      color: inherit;
    }
    .dock-label {
      font-size: 10px;
      margin-top: 2px;
    }

    /* 5. Ajuste para texto ficar legível sobre o fundo */
    .app-label,
    .dock-label {
      text-shadow: 0 0 3px rgba(0, 0, 0, 0.8);
    }

    /* 6. Fake “barra de status” no topo (hora/bateria) */
    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 44px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: env(safe-area-inset-top, 0px);
      z-index: 10;
      pointer-events: none;
    }
    .navbar {
      position: relative;
      z-index: 20;
    }
    .status-bar span {
      color: white;
      font-size: 14px;
      font-weight: 500;
    }
    .app-item a {
      text-decoration: none;
      color: inherit;
    }
    #lancar-page {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 44px);
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
      z-index: 5;
    }
    #lancar-page .page-content {
      padding-top: env(safe-area-inset-top, 0px);
      margin: 0;
    }
    #home-page {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }
    /* Custom app-style table */
    #finance-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background-color: #ffffff;
    }
    #finance-table thead {
      background-color: #f2f2f2;
    }
    #finance-table th,
    #finance-table td {
      padding: 12px 16px;
      text-align: left;
      font-size: 14px;
      color: #333;
      border-bottom: 1px solid #eee;
    }
    #finance-table tbody tr:nth-child(even) {
      background-color: #fafafa;
    }
    #finance-table tbody tr:hover {
      background-color: #f0f0f0;
    }
    /* Adjust DataTables pagination buttons */
    .dataTables_wrapper .dataTables_paginate button {
      background: none;
      border: none;
      color: #007AFF;
      padding: 6px 12px;
      margin: 0 4px;
      border-radius: 4px;
    }
    .dataTables_wrapper .dataTables_paginate button.current,
    .dataTables_wrapper .dataTables_paginate button:hover {
      background-color: rgba(0, 122, 255, 0.1);
    }
  </style>
  <!-- DataTables CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css" />
  <!-- jQuery (required by DataTables) -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <!-- VTC Financeiro Gestor App -->
  <script src="./js/apps/vtc-financeiro-gestor/vtc-financeiro-gestor.js"></script>
</head>
<body>
  <!-- 6. Barra de status simulada (apenas décor; não é funcional) -->
  <div class="status-bar">
    <span id="status-clock"></span>
  </div>

  <!-- 2. Grade de ícones -->
  <div id="home-page" data-name="home" class="page no-toolbar">
    <div class="home-grid">
    <!-- Exemplo de ícones “fixos” -->
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-envelope" style="color: #FF3B30;"></i>
      </div>
      <div class="app-label">Mail</div>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-camera" style="color: #FF9500;"></i>
      </div>
      <div class="app-label">Câmera</div>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-map-location-dot" style="color: #34C759;"></i>
      </div>
      <div class="app-label">Mapas</div>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-clock" style="color: #007AFF;"></i>
      </div>
      <div class="app-label">Relógio</div>
    </div>
    <div class="app-item">
      <a href="#" onclick="openLancar()">
        <div class="app-icon">
          <i class="fa-solid fa-notes-medical" style="color: #5856D6;"></i>
        </div>
        <div class="app-label">Financeiro</div>
      </a>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-music" style="color: #AF52DE;"></i>
      </div>
      <div class="app-label">Música</div>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-photo-film" style="color: #FFD60A;"></i>
      </div>
      <div class="app-label">Fotos</div>
    </div>
    <div class="app-item">
      <div class="app-icon">
        <i class="fa-solid fa-cog" style="color: #8E8E93;"></i>
      </div>
      <div class="app-label">Ajustes</div>
    </div>
    <div class="app-item">
      <a href="https://voetur.bennercloud.com.br/CORPORATIVO/Pages/Prestacaodecontas.aspx?i=K_PRESTACAODECONTAS&amp;m=MAIN" target="_blank">
        <div class="app-icon">
          <i class="fa-solid fa-file-invoice" style="color: #5AC8FA;"></i>
        </div>
        <div class="app-label">Prestação</div>
      </a>
    </div>
    <!-- Acrescente mais linhas/colunas conforme desejar -->
    </div>
  </div>

  <div id="lancar-page" class="page" style="display:none; background-color: #ffffff;">
    <div class="page-content">
      <div class="block-title" style="padding: 1rem; background-color: #003366; color: #ffffff; font-size: 1.2rem; margin: 0;">
        Financeiro
      </div>
      <div class="block" id="uploadBlock" style="padding: 1rem;">
        <h3 style="color: white; font-size: 1.2rem; margin-bottom: 1rem;">Enviar Anexo</h3>
        <form id="uploadForm">
          <div class="mb-3">
            <label for="arquivoInput" style="color: white;">Selecione o arquivo:</label>
            <input type="file" id="arquivoInput" style="width: 100%; margin-top: 0.5rem;" />
          </div>
          <button type="submit" id="uploadBtn" style="background-color: #fff; color: #000; padding: 0.5rem 1rem; border: none; border-radius: 8px;">Enviar</button>
        </form>
        <div id="uploadResult" style="margin-top: 1rem; color: white;"></div>
      </div>
      <!-- A interface do VTC Financeiro Gestor será renderizada aqui -->
      <div class="block" style="padding: 1rem;">
        <!-- O conteúdo será renderizado por renderVtcFinanceiroGestor() -->
      </div>
    </div>
    <!-- Financeiro Bottom Icon Menu -->
    <div id="finance-icon-menu" style="position: fixed; bottom: 84px; left: 0; right: 0; height: 56px; background-color: #ffffff; display: flex; justify-content: space-around; align-items: center; z-index: 45;">
      <div style="text-align: center;">
        <i class="fa-solid fa-chart-line" style="font-size: 24px; color: #007AFF;"></i>
        <div style="font-size: 10px; color: #000;">Resumo</div>
      </div>
      <div style="text-align: center;">
        <i class="fa-solid fa-list" style="font-size: 24px; color: #34C759;"></i>
        <div style="font-size: 10px; color: #000;">Contas</div>
      </div>
      <div style="text-align: center;">
        <a href="#" id="btnNovoOption" style="text-decoration: none; color: inherit;">
          <i class="fa-solid fa-plus-circle" style="font-size: 24px; color: #5856D6;"></i>
          <div style="font-size: 10px; color: #000;">Novo</div>
        </a>
      </div>
      <div style="text-align: center;">
        <i class="fa-solid fa-gear" style="font-size: 24px; color: #8E8E93;"></i>
        <div style="font-size: 10px; color: #000;">Ajustes</div>
      </div>
    </div>
    <!-- Novo Options Overlay -->
    <div id="novo-options" onclick="if(event.target.id === 'novo-options') this.style.display='none';" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 50;">
      <div style="position: relative; background: #fff; border-radius: 8px; padding: 1rem; width: 80%; max-width: 300px;">
        <a href="#" id="closeNovoOptions" style="position: absolute; top: 8px; right: 8px; text-decoration: none; color: #000; font-size: 18px;">&#x2715;</a>
        <h3 style="margin-top: 0; color: #000;">Selecione a opção</h3>
        <button id="selectImageBtn" style="width: 100%; padding: 10px; margin-bottom: 10px;">Selecionar PNG/JPG</button>
        <button id="takePhotoBtn" style="width: 100%; padding: 10px;">Tirar Foto</button>
      </div>
    </div>
    <!-- Hidden file inputs -->
    <input type="file" id="fileInputImage" accept="image/png, image/jpeg" style="display: none;" />
    <input type="file" id="fileInputCamera" accept="image/*" capture="environment" style="display: none;" />
    <script>
      document.getElementById('uploadForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const fileInput = document.getElementById('arquivoInput');
        const resultEl = document.getElementById('uploadResult');
        if (fileInput.files.length === 0) {
          resultEl.textContent = 'Nenhum arquivo selecionado.';
        } else {
          const fileName = fileInput.files[0].name;
          resultEl.textContent = 'Arquivo "' + fileName + '" pronto para upload.';
        }
      });

      // Novo options functionality
      document.getElementById('btnNovoOption').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('novo-options').style.display = 'flex';
      });
      document.getElementById('closeNovoOptions').addEventListener('click', function() {
        document.getElementById('novo-options').style.display = 'none';
      });
      document.getElementById('selectImageBtn').addEventListener('click', function() {
        document.getElementById('fileInputImage').click();
      });
      document.getElementById('takePhotoBtn').addEventListener('click', function() {
        document.getElementById('fileInputCamera').click();
      });
      // Handle file selection for image
      document.getElementById('fileInputImage').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          alert('Arquivo selecionado: ' + file.name);
        }
        document.getElementById('novo-options').style.display = 'none';
      });
      // Handle file selection for camera
      document.getElementById('fileInputCamera').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          alert('Foto capturada: ' + file.name);
        }
        document.getElementById('novo-options').style.display = 'none';
      });
    </script>
  <!-- Android Navigation Footer -->
  <div id="android-nav" style="position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background-color: #000; display: flex; justify-content: space-around; align-items: center; z-index: 30;">
    <a href="#" onclick="goHome()" style="color: #fff; font-size: 24px;"><i class="fa-solid fa-arrow-left"></i></a>
    <a href="#" onclick="goHome()" style="color: #fff; font-size: 24px;"><i class="fa-solid fa-home"></i></a>
    <a href="#" onclick="openLancar()" style="color: #fff; font-size: 24px;"><i class="fa-solid fa-table-cells"></i></a>
  </div>
  <style>
    /* Ensure Android nav only shows on lancar-page */
    #android-nav {
      display: none;
    }
    #lancar-page #android-nav {
      display: flex;
    }
    /* Add bottom padding to page-content so content isn’t hidden by nav */

      padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px));
    }
    /* Android nav visibility for home and lancar pages */
    #android-nav-home,
    #android-nav {
      display: none;
    }
    #home-page #android-nav-home,
    #lancar-page #android-nav {
      display: flex;
    }
  </style>
  </div>
  <!-- Android Navigation Footer -->
  <div id="android-nav-home" style="position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background-color: #000; display: flex; justify-content: space-around; align-items: center; z-index: 30;">
    <a href="#" onclick="goHome()" style="color: #fff; font-size: 24px;"><i class="fa-solid fa-arrow-left"></i></a>
    <a href="#" onclick="goHome()" style="color: #fff; font-size: 24px;"><i class="fa-solid fa-home"></i></a>
    <a href="#" onclick="openLancar()" style="color: #fff; font-size: 24px;"><i class="fa-solid fa-table-cells"></i></a>
  </div>

  <!-- 4. Dock inferior -->
</body>

</div>
<script>
  function updateClock() {
    const now = new Date();
    // Weekday and month names in Portuguese
    const weekdays = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
    const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
    const dayName = weekdays[now.getDay()];
    const day = now.getDate();
    const monthName = months[now.getMonth()];
    // Time formatting
    let hours = now.getHours();
    let minutes = now.getMinutes();
    if (hours < 10) hours = '0' + hours;
    if (minutes < 10) minutes = '0' + minutes;
    // Combine date and time
    document.getElementById('status-clock').textContent =
      `${dayName}, ${day} ${monthName} ${hours}:${minutes}`;
  }
  // Initialize clock immediately
  updateClock();
  // Update every minute
  setInterval(updateClock, 60000);

  function openLancar() {
    document.getElementById('home-page').style.display = 'none';
    document.getElementById('lancar-page').style.display = 'block';
    document.querySelector('.dock').style.display = 'none';
    // Hide upload form block
    const uploadBlock = document.getElementById('uploadBlock');
    if (uploadBlock) uploadBlock.style.display = 'none';
    // Chama o renderer do app financeiro avançado
    renderVtcFinanceiroGestor();
  }
  function goHome() {
    document.getElementById('lancar-page').style.display = 'none';
    document.getElementById('home-page').style.display = 'block';
    document.querySelector('.dock').style.display = 'flex';
  }
</script>
</html>
