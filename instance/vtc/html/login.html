<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexiDecis - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Aqui vão os mesmos estilos do seu exemplo anterior */
    :root {
      --bg-color: #0f0f0f;
      --card-bg: rgba(255, 255, 255, 0.1);
      --primary-color: #1c1d1c;
      --input-bg: rgba(255, 255, 255, 0.15);
      --text-color: #ffffff;
      --placeholder-color: #c0c0c0;
      --button-hover: #1ed760;
      --link-color: #1c1d1c;
      --border-color: rgba(255, 255, 255, 0.2);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      position: relative;
      font-family: 'Inter', sans-serif;
      color: var(--text-color);
      height: 100vh;
      overflow: hidden;
    }
    /* Wallpaper with blur */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('../images/wallpaper-1.jpg') no-repeat center center fixed;
      background-size: cover;
      filter: blur(4px);
      z-index: 0;
    }
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
      top: 0;
      left: 0;
    }
    #login-container {
      display: none;
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 60vh;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      padding: 1rem;
      z-index: 2;
      animation: slideIn 0.6s ease-out forwards;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(100%);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    h2 {
      color: var(--primary-color);
      margin-bottom: 1.5rem;
      text-align: center;
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      position: relative;
    }
    h2::after {
      content: '';
      display: block;
      width: 50px;
      height: 3px;
      background: var(--primary-color);
      margin: 0.5rem auto 0;
      border-radius: 2px;
    }
    .form-label {
      color: var(--text-color);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    .form-control {
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text-color);
      transition: border 0.3s, box-shadow 0.3s;
      font-family: 'Inter', sans-serif;
    }
    .form-control::placeholder {
      color: var(--placeholder-color);
    }
    .form-control:focus {
      outline: none;
      border: 1px solid var(--primary-color);
      box-shadow: 0 0 8px var(--primary-color);
      background: var(--input-bg);
    }
    .btn-primary {
      background-color: var(--primary-color);
      border: none;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
      cursor: pointer;
      margin-top: 1rem;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary:hover {
      background-color: var(--button-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(29, 185, 84, 0.4);
    }
    .btn-primary:active {
      transform: translateY(0);
      box-shadow: none;
    }
    a {
      color: var(--link-color);
      text-decoration: none;
      transition: color 0.3s;
      font-weight: 500;
    }
    a:hover {
      color: var(--primary-color);
      text-decoration: underline;
    }
    @media (max-width: 576px) {
      #login-container {
        padding: 2rem;
      }
      h2 {
        font-size: 1.75rem;
      }
      .btn-primary {
        font-size: 0.95rem;
      }
    }
    .handle {
      width: 40px;
      height: 5px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 2.5px;
      margin: 0.5rem auto;
    }
  </style>
</head>
<body>
  <!-- Lock Screen Overlay -->
  <div id="lock-screen" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.3); z-index: 1;">
    <div id="lock-time" style="color: #ffffff; font-size: 64px; font-weight: 300;"></div>
    <div id="lock-date" style="color: #ffffff; font-size: 20px; font-weight: 300; margin-top: 8px;"></div>
  </div>
  <div id="login-section" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; z-index: 1;">
    <div id="login-container" class="card">
      <div class="handle"></div>
      <a href="#" id="close-login" style="position: absolute; top: 8px; right: 8px; text-decoration: none; color: #ffffff; font-size: 24px; z-index: 3;">&#x2715;</a>
      <h2 style="text-align:center; color:#fff; margin-bottom:2rem;">LexiDecis</h2>
      <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <form id="login-form" style="width: 100%; max-width: 300px;">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="Digite seu email" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Senha</label>
            <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
      </div>
      <div style="text-align: center; margin-bottom: 2rem;">
        <a href="#" id="reset-password-button">Esqueci minha senha</a>
      </div>
    </div>
  </div>
  <script>
    function updateStatusTime() {
      const now = new Date();
      let hours = now.getHours();
      let minutes = now.getMinutes();
      if (hours < 10) hours = '0' + hours;
      if (minutes < 10) minutes = '0' + minutes;
      const timeStr = hours + ':' + minutes;
      // Removed update to status-time element as it no longer exists
      // Update lock-screen time
      const lockTimeEl = document.getElementById('lock-time');
      if (lockTimeEl) lockTimeEl.textContent = timeStr;
      // Update lock-screen date
      const weekdays = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
      const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
      const weekday = weekdays[now.getDay()];
      const day = now.getDate();
      const month = months[now.getMonth()];
      document.getElementById('lock-date').textContent = `${weekday}, ${day} ${month}`;
    }
    updateStatusTime();
    setInterval(updateStatusTime, 1000);

    // Show login container on first interaction
    function showLoginOnTouch() {
      const lockScreen = document.getElementById('lock-screen');
      const loginContainer = document.getElementById('login-container');
      if (lockScreen && loginContainer) {
        lockScreen.style.display = 'none';
        loginContainer.style.display = 'block';
        window.removeEventListener('click', showLoginOnTouch);
        window.removeEventListener('touchstart', showLoginOnTouch);
      }
    }
    window.addEventListener('click', showLoginOnTouch);
    window.addEventListener('touchstart', showLoginOnTouch);

    // Close login and return to lock screen (no animation)
    document.getElementById('close-login').addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      const lockScreen = document.getElementById('lock-screen');
      const loginContainer = document.getElementById('login-container');
      if (lockScreen && loginContainer) {
        loginContainer.style.display = 'none';
        lockScreen.style.display = 'flex';
        // Re-register touch listener to show login again
        window.addEventListener('click', showLoginOnTouch);
        window.addEventListener('touchstart', showLoginOnTouch);
      }
    });

    // Close login when clicking outside the container
    document.getElementById('login-section').addEventListener('click', function(e) {
      const loginContainer = document.getElementById('login-container');
      const lockScreen = document.getElementById('lock-screen');
      // If loginContainer is visible and click is directly on login-section (not inside login-container)
      if (loginContainer.style.display === 'block' && e.target.id === 'login-section') {
        // Animate slide out
        loginContainer.classList.add('slide-out');
        loginContainer.addEventListener('animationend', function handler() {
          loginContainer.style.display = 'none';
          loginContainer.classList.remove('slide-out');
          lockScreen.style.display = 'flex';
          window.addEventListener('click', showLoginOnTouch);
          window.addEventListener('touchstart', showLoginOnTouch);
          loginContainer.removeEventListener('animationend', handler);
        });
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script personalizado para o Login -->
  <script type="module">
    import AuthService from "../js/auth.js";

    // Função para obter o valor do parâmetro "redirect" da URL
    const urlParams = new URLSearchParams(window.location.search);
    // Se o parâmetro não estiver presente, pode definir um valor padrão (por exemplo, "index.html")
    const redirectUrl = urlParams.get('redirect') || 'index.html';

    // Verifica se o usuário já está autenticado
    AuthService.onAuthChange((user) => {
      if (user) {
        window.location.href = redirectUrl;
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      const loginForm = document.getElementById("login-form");
      if (loginForm) {
        loginForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value.trim();
          
          const result = await AuthService.login(email, password);
          if (result.success) {
            // Após login bem-sucedido, redireciona para a URL especificada
            window.location.href = redirectUrl;
          } else {
            alert("Erro ao fazer login: " + result.error);
          }
        });
      }

      const resetPasswordButton = document.getElementById("reset-password-button");
      if (resetPasswordButton) {
        resetPasswordButton.addEventListener("click", async (event) => {
          event.preventDefault();
          const email = prompt("Digite seu e-mail para redefinir a senha:");
          if (email) {
            const result = await AuthService.resetPassword(email);
            if (result.success) {
              alert(result.message);
            } else {
              alert("Erro ao redefinir senha: " + result.error);
            }
          }
        });
      }
    });
  </script>

  <!-- Home Indicator -->
  <div id="home-indicator" style="position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: rgba(255,255,255,0.5); border-radius: 2.5px; z-index: 1;"></div>
</body>
</html>
