<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Entregas - Indicadores e Entregas Terrestres</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background-color: #343a40;
      color: #ffffff;
      padding-top: 20px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.5em;
      font-weight: bold;
    }

    .nav-item {
      padding: 12px 20px;
      cursor: pointer;
      transition: background-color 0.2s ease;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .nav-item:hover {
      background-color: #495057;
    }

    .submenu {
      display: none;
      background-color: #3c4147;
    }

    .submenu .nav-item {
      padding-left: 40px;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1050;
    }

    .modal-content-custom {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      max-width: 600px;
      width: 90%;
      text-align: center;
      position: relative;
    }

    .modal-content-custom img {
      max-width: 100%;
      height: auto;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .close-modal {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #dc3545;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .close-modal:hover {
      background: #c82333;
    }

    /* Responsividade */
    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
      }
    }

    @media (max-width: 576px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
      }

      .submenu .nav-item {
        padding-left: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Central de Fretes</h2>

    <div class="nav-item" onclick="mostrarHome()">
      Home
    </div>

    <div class="nav-item" onclick="mostrarTransportes()">
      Transportes
    </div>

    <!-- Documentos (menu pai) -->
    <div class="nav-item" id="menuDocumentos" onclick="toggleSubmenu()">
      Documentos
    </div>

    <!-- Submenu Documentos -->
    <div class="submenu" id="submenuDocumentos">
      <div class="nav-item" onclick="mostrarEntregasTerrestres()">
        Entregas Terrestres
      </div>
    </div>

    <div class="nav-item" onclick="mostrarIndicadores()">
      Indicadores
    </div>

    <div class="nav-item" onclick="mostrarConfiguracoes()">
      Configurações
    </div>

    <div class="nav-item" onclick="fazerLogout()">
      Sair
    </div>
  </div>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="main-content">
    <div id="conteudoPrincipal">
      <h1>Bem-vindo(a)!</h1>
      <p>Selecione um item no menu à esquerda.</p>
    </div>
  </div>

  <!-- MODAL PARA EXIBIR COMPROVANTE -->
  <div class="modal-overlay" id="modalComprovante">
    <div class="modal-content-custom">
      <button class="close-modal" onclick="fecharModal()">Fechar</button>
      <img id="modalImg" src="#" alt="Comprovante">
    </div>
  </div>

  <script>
    // Referências aos elementos de menu
    const submenuDocumentos = document.getElementById('submenuDocumentos');
    const conteudoPrincipal = document.getElementById('conteudoPrincipal');

    // Modal
    const modalOverlay = document.getElementById('modalComprovante');
    const modalImg = document.getElementById('modalImg');

    // Para armazenar todos os dados parseados (Entregas Terrestres)
    let entregasData = [];
    // Para controlar a ordenação
    let currentSortColumn = null;
    let currentSortDirection = 'asc'; // ou 'desc'

    // Paginação
    let currentPage = 1;   
    let pageSize = 10;     
    const PAGE_SIZES = [10, 25, 50, 100, 'all'];

    /* === MENU LATERAL === */
    function toggleSubmenu() {
      if (submenuDocumentos.style.display === 'block') {
        submenuDocumentos.style.display = 'none';
      } else {
        submenuDocumentos.style.display = 'block';
      }
    }

    function mostrarHome() {
      conteudoPrincipal.innerHTML = `
        <h1>Home</h1>
        <p>Bem-vindo(a) à sua aplicação de gerenciamento de entregas!</p>
      `;
    }

    function mostrarTransportes() {
      conteudoPrincipal.innerHTML = `
        <h1>Transportes</h1>
        <p>Informações sobre transportes...</p>
      `;
    }

    function mostrarIndicadores() {
      conteudoPrincipal.innerHTML = `
        <h1>Indicadores</h1>
        <p>Carregando indicadores...</p>
      `;
      carregarIndicadores();
    }

    function mostrarConfiguracoes() {
      conteudoPrincipal.innerHTML = `
        <h1>Configurações</h1>
        <p>Aqui você pode ajustar as configurações do sistema...</p>
      `;
    }

    function fazerLogout() {
      alert("Você saiu do sistema!");
    }

    /* === ENTREGAS TERRESTRES === */
    async function mostrarEntregasTerrestres() {
      conteudoPrincipal.innerHTML = `
        <h1>Entregas Terrestres</h1>
        <p>Carregando dados...</p>
      `;

      try {
        const response = await fetch('https://n8n.bhm.tec.br/webhook/readnfs?filter=all', {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });

        if (!response.ok) {
          throw new Error(`Erro na requisição: ${response.status} - ${response.statusText}`);
        }

        const textData = await response.text();
        let parsedData;

        if (textData.trim().startsWith('[')) {
          parsedData = JSON.parse(textData);
        } else {
          parsedData = JSON.parse(`[${textData}]`);
        }

        let allRows = [];
        parsedData.forEach(item => {
          if (typeof item.data === 'string') {
            try {
              const rowObj = JSON.parse(item.data); 
              allRows.push(rowObj);
            } catch (e) {
              console.error("Erro ao parsear item.data:", e);
            }
          }
        });

        entregasData = allRows;
        currentPage = 1;
        pageSize = 10; 
        currentSortColumn = null;
        currentSortDirection = 'asc';

        renderEntregasTerrestres();

      } catch (error) {
        console.error("Erro ao obter dados:", error);
        conteudoPrincipal.innerHTML = `
          <h1>Entregas Terrestres</h1>
          <p class="text-danger">Ocorreu um erro ao obter dados: ${error.message}</p>
        `;
      }
    }

    // Monta a interface
    function renderEntregasTerrestres() {
      const allColumns = getAllColumns(entregasData);

      let html = `
        <h1>Entregas Terrestres</h1>
        <div class="row mb-3">
          <div class="col-md-4">
            <input type="text" id="searchInput" class="form-control" placeholder="Pesquisar..." oninput="aplicarFiltros()" />
          </div>
          <div class="col-md-3">
            <select id="columnFilter" class="form-select" onchange="aplicarFiltros()">
              <option value="">-- Todas as colunas --</option>
      `;
      allColumns.forEach(col => {
        html += `<option value="${col}">${col}</option>`;
      });
      html += `</select>`;
      
      // Select do tamanho de página
      html += `
          </div>
          <div class="col-md-3">
            <select id="pageSizeSelect" class="form-select" onchange="mudarPageSize()">
      `;
      PAGE_SIZES.forEach(size => {
        let label = (size === 'all') ? 'Todos' : size;
        let selected = (size === pageSize) ? 'selected' : '';
        html += `<option value="${size}" ${selected}>${label} itens por página</option>`;
      });
      html += `</select>
          </div>
        </div>
        <div id="tableContainer"></div>
      `;

      conteudoPrincipal.innerHTML = html;
      aplicarFiltros();
    }

    function getAllColumns(dataArray) {
      let columnsSet = new Set();
      dataArray.forEach(obj => {
        Object.keys(obj).forEach(key => columnsSet.add(key));
      });
      return Array.from(columnsSet);
    }

    function aplicarFiltros() {
      const searchValue = (document.getElementById('searchInput') || {}).value || '';
      const filterColumn = (document.getElementById('columnFilter') || {}).value || '';
      const searchTerm = searchValue.trim().toLowerCase();

      let dataFiltrada = [...entregasData];
      if (searchTerm) {
        dataFiltrada = dataFiltrada.filter(obj => {
          if (!filterColumn) {
            return Object.values(obj).some(val => {
              if (!val) return false;
              return String(val).toLowerCase().includes(searchTerm);
            });
          } else {
            const val = obj[filterColumn];
            if (!val) return false;
            return String(val).toLowerCase().includes(searchTerm);
          }
        });
      }

      if (currentSortColumn) {
        dataFiltrada.sort((a, b) => {
          const valA = String(a[currentSortColumn] ?? '').toLowerCase();
          const valB = String(b[currentSortColumn] ?? '').toLowerCase();
          if (valA < valB) return currentSortDirection === 'asc' ? -1 : 1;
          if (valA > valB) return currentSortDirection === 'asc' ? 1 : -1;
          return 0;
        });
      }

      atualizarTabelaEPaginacao(dataFiltrada);
    }

    function atualizarTabelaEPaginacao(dataFiltrada) {
      const tableContainer = document.getElementById('tableContainer');
      if (!tableContainer) return;

      if (!dataFiltrada || dataFiltrada.length === 0) {
        tableContainer.innerHTML = `<p>Nenhum registro encontrado.</p>`;
        return;
      }

      const allColumns = getAllColumns(dataFiltrada);

      let totalRegistros = dataFiltrada.length;
      let maxPerPage = (pageSize === 'all') ? totalRegistros : pageSize;
      let totalPages = Math.ceil(totalRegistros / maxPerPage);
      if (totalPages < 1) totalPages = 1;

      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      const startIndex = (currentPage - 1) * maxPerPage;
      const endIndex = startIndex + maxPerPage;
      const dataPagina = dataFiltrada.slice(startIndex, endIndex);

      // Monta Tabela
      let tableHTML = `<table class="table table-striped table-bordered"><thead><tr>`;

      // Coluna extra no início para o botão do comprovante
      tableHTML += `<th>Comprovante</th>`;

      // Demais colunas
      allColumns.forEach(col => {
        let classForSort = '';
        if (col === currentSortColumn) {
          classForSort = (currentSortDirection === 'asc') ? 'sorted-asc' : 'sorted-desc';
        }
        tableHTML += `<th onclick="handleColumnClick('${col}')" class="${classForSort}">${col}</th>`;
      });

      tableHTML += `</tr></thead><tbody>`;

      dataPagina.forEach(obj => {
        tableHTML += `<tr>`;

        /* Se 'comprovante_base64' não está vazio, mostra botão;
           Caso contrário, exibe '-' */
        let comprovanteCell = '-';
        if (obj.comprovante_base64 && obj.comprovante_base64.trim() !== "") {
          // Ajuste se for sempre PNG ou se houver outro campo que indique mimeType
          const base64Image = `data:image/png;base64,${obj.comprovante_base64}`;
          comprovanteCell = `
            <button class="btn btn-sm btn-primary" onclick="verComprovante('${base64Image}')">
              Ver Comprovante
            </button>
          `;
        }

        tableHTML += `<td>${comprovanteCell}</td>`;

        // Preenche as demais colunas
        allColumns.forEach(col => {
          let val = obj[col] ?? '';
          // Formatar datas para melhor visualização
          if (col.toLowerCase().includes('data')) {
            val = new Date(val).toLocaleDateString('pt-BR', {
              year: 'numeric',
              month: 'short',
              day: 'numeric'
            });
          }
          tableHTML += `<td>${val}</td>`;
        });

        tableHTML += `</tr>`;
      });

      tableHTML += `</tbody></table>`;

      // Monta paginação
      let paginationHTML = `<nav aria-label="Page navigation">
        <ul class="pagination justify-content-center">`;

      // Botão Anterior
      paginationHTML += `
          <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="irPaginaAnterior()">Anterior</a>
          </li>
      `;

      // Botões de página (limitados a 5 páginas visíveis)
      let startPage = Math.max(1, currentPage - 2);
      let endPage = Math.min(totalPages, currentPage + 2);

      if (currentPage <= 3) {
        endPage = Math.min(5, totalPages);
      }
      if (currentPage >= totalPages - 2) {
        startPage = Math.max(1, totalPages - 4);
      }

      for (let p = startPage; p <= endPage; p++) {
        paginationHTML += `
          <li class="page-item ${p === currentPage ? 'active' : ''}">
            <a class="page-link" href="#" onclick="irParaPagina(${p})">${p}</a>
          </li>
        `;
      }

      // Botão Próximo
      paginationHTML += `
          <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="irPaginaProxima()">Próximo</a>
          </li>
        </ul>
      </nav>`;

      tableContainer.innerHTML = tableHTML + paginationHTML;
    }

    function handleColumnClick(col) {
      if (currentSortColumn === col) {
        currentSortDirection = (currentSortDirection === 'asc') ? 'desc' : 'asc';
      } else {
        currentSortColumn = col;
        currentSortDirection = 'asc';
      }
      aplicarFiltros();
    }

    function mudarPageSize() {
      const select = document.getElementById('pageSizeSelect');
      if (!select) return;

      let newSize = select.value;
      pageSize = (newSize === 'all') ? 'all' : parseInt(newSize, 10);
      currentPage = 1;
      aplicarFiltros();
    }

    function irParaPagina(p) {
      currentPage = p;
      aplicarFiltros();
    }

    function irPaginaAnterior() {
      currentPage--;
      aplicarFiltros();
    }

    function irPaginaProxima() {
      currentPage++;
      aplicarFiltros();
    }

    /* === MODAL PARA EXIBIR COMPROVANTE === */
    function verComprovante(base64String) {
      modalImg.src = base64String;
      modalOverlay.style.display = 'flex';
    }

    function fecharModal() {
      modalOverlay.style.display = 'none';
      modalImg.src = '#';
    }

    /* === INDICADORES === */
    async function carregarIndicadores() {
      conteudoPrincipal.innerHTML = `
        <h1>Indicadores</h1>
        <p>Carregando indicadores...</p>
      `;

      try {
        const response = await fetch('https://n8n.bhm.tec.br/webhook/readnfs?filter=all', {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });

        if (!response.ok) {
          throw new Error(`Erro na requisição: ${response.status} - ${response.statusText}`);
        }

        const textData = await response.text();
        let parsedData;

        if (textData.trim().startsWith('[')) {
          parsedData = JSON.parse(textData);
        } else {
          parsedData = JSON.parse(`[${textData}]`);
        }

        let allRows = [];
        parsedData.forEach(item => {
          if (typeof item.data === 'string') {
            try {
              const rowObj = JSON.parse(item.data); 
              allRows.push(rowObj);
            } catch (e) {
              console.error("Erro ao parsear item.data:", e);
            }
          }
        });

        processarIndicadores(allRows);

      } catch (error) {
        console.error("Erro ao carregar indicadores:", error);
        conteudoPrincipal.innerHTML = `
          <h1>Indicadores</h1>
          <p class="text-danger">Ocorreu um erro ao carregar indicadores: ${error.message}</p>
        `;
      }
    }

    function processarIndicadores(dados) {
      // Total de NFs
      const totalNFs = dados.length;

      // NFs com comprovante anexado
      const nfsComComprovante = dados.filter(nf => nf.comprovante_anexado === "true").length;

      // NFs sem comprovante anexado
      const nfsSemComprovante = totalNFs - nfsComComprovante;

      // Distribuição das NFs por Cliente
      const nfsPorCliente = {};
      dados.forEach(nf => {
        const cliente = nf.cliente;
        if (nfsPorCliente[cliente]) {
          nfsPorCliente[cliente]++;
        } else {
          nfsPorCliente[cliente] = 1;
        }
      });

      // Distribuição das NFs por Dia de Entrega
      const nfsPorDia = {};
      dados.forEach(nf => {
        const dataEntrega = new Date(nf.data_prevista_entrega);
        const dia = dataEntrega.toLocaleDateString('pt-BR', { year: 'numeric', month: 'short', day: 'numeric' });
        if (nfsPorDia[dia]) {
          nfsPorDia[dia]++;
        } else {
          nfsPorDia[dia] = 1;
        }
      });

      // Tempo Médio de Entrega (Assumindo que "last_modified" é a data de entrega real)
      let totalTempoEntrega = 0;
      let countTempoEntrega = 0;
      dados.forEach(nf => {
        if (nf.last_modified) {
          const dataPrevista = new Date(nf.data_prevista_entrega);
          const dataReal = new Date(nf.last_modified);
          const diffTime = dataReal - dataPrevista; // em milissegundos
          const diffDays = diffTime / (1000 * 60 * 60 * 24); // em dias
          totalTempoEntrega += diffDays;
          countTempoEntrega++;
        }
      });
      const tempoMedioEntrega = countTempoEntrega > 0 ? (totalTempoEntrega / countTempoEntrega).toFixed(2) : 'N/A';

      // Preparar dados para os gráficos
      const labelsStatus = ['Com Comprovante', 'Sem Comprovante'];
      const dataStatus = [nfsComComprovante, nfsSemComprovante];

      const labelsCliente = Object.keys(nfsPorCliente);
      const dataCliente = Object.values(nfsPorCliente);

      const labelsDia = Object.keys(nfsPorDia);
      const dataDia = Object.values(nfsPorDia);

      // Exibir os indicadores
      exibirIndicadoresHTML(totalNFs, nfsComComprovante, nfsSemComprovante, tempoMedioEntrega, labelsStatus, dataStatus, labelsCliente, dataCliente, labelsDia, dataDia);
    }

    function exibirIndicadoresHTML(totalNFs, nfsComComprovante, nfsSemComprovante, tempoMedioEntrega, labelsStatus, dataStatus, labelsCliente, dataCliente, labelsDia, dataDia) {
      let html = `
        <h1>Indicadores</h1>
        <div class="row mb-4">
          <!-- Painel Total de NFs -->
          <div class="col-md-3">
            <div class="card text-white bg-primary mb-3">
              <div class="card-body">
                <h5 class="card-title">Total de NFs</h5>
                <p class="card-text display-6">${totalNFs}</p>
              </div>
            </div>
          </div>
          <!-- Painel NFs com Comprovante -->
          <div class="col-md-3">
            <div class="card text-white bg-success mb-3">
              <div class="card-body">
                <h5 class="card-title">NFs com Comprovante</h5>
                <p class="card-text display-6">${nfsComComprovante}</p>
              </div>
            </div>
          </div>
          <!-- Painel NFs sem Comprovante -->
          <div class="col-md-3">
            <div class="card text-white bg-danger mb-3">
              <div class="card-body">
                <h5 class="card-title">NFs sem Comprovante</h5>
                <p class="card-text display-6">${nfsSemComprovante}</p>
              </div>
            </div>
          </div>
          <!-- Painel Tempo Médio de Entrega -->
          <div class="col-md-3">
            <div class="card text-white bg-warning mb-3">
              <div class="card-body">
                <h5 class="card-title">Tempo Médio de Entrega (dias)</h5>
                <p class="card-text display-6">${tempoMedioEntrega}</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Gráficos -->
        <div class="row">
          <!-- Gráfico de Pizza: Com vs Sem Comprovante -->
          <div class="col-md-6 mb-4">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">Distribuição das NFs por Comprovante</h5>
                <canvas id="statusChart"></canvas>
              </div>
            </div>
          </div>
          <!-- Gráfico de Barras: NFs por Cliente -->
          <div class="col-md-6 mb-4">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">Número de NFs por Cliente</h5>
                <canvas id="clienteChart"></canvas>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <!-- Gráfico de Linha: Tendência das NFs ao Longo do Tempo -->
          <div class="col-md-12 mb-4">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">Tendência das NFs ao Longo do Tempo</h5>
                <canvas id="diaChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      `;

      conteudoPrincipal.innerHTML = html;

      // Criar gráficos
      criarGraficoStatus(labelsStatus, dataStatus);
      criarGraficoCliente(labelsCliente, dataCliente);
      criarGraficoDia(labelsDia, dataDia);
    }

    function criarGraficoStatus(labels, data) {
      const ctx = document.getElementById('statusChart').getContext('2d');
      new Chart(ctx, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            label: 'Status das NFs',
            data: data,
            backgroundColor: [
              '#28a745',
              '#dc3545'
            ],
            borderColor: '#ffffff',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: 'bottom',
            },
            title: {
              display: false,
              text: 'Distribuição das NFs por Comprovante'
            }
          }
        },
      });
    }

    function criarGraficoCliente(labels, data) {
      const ctx = document.getElementById('clienteChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Número de NFs',
            data: data,
            backgroundColor: '#007bff',
            borderColor: '#007bff',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          scales: {
            x: {
              ticks: {
                autoSkip: false,
                maxRotation: 90,
                minRotation: 45
              }
            },
            y: {
              beginAtZero: true,
              precision:0
            }
          },
          plugins: {
            legend: {
              display: false,
            },
            title: {
              display: false,
              text: 'Número de NFs por Cliente'
            }
          }
        },
      });
    }

    function criarGraficoDia(labels, data) {
      const ctx = document.getElementById('diaChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Número de NFs',
            data: data,
            fill: false,
            borderColor: '#17a2b8',
            backgroundColor: '#17a2b8',
            tension: 0.1
          }]
        },
        options: {
          responsive: true,
          scales: {
            x: {
              ticks: {
                autoSkip: false,
                maxRotation: 90,
                minRotation: 45
              }
            },
            y: {
              beginAtZero: true,
              precision:0
            }
          },
          plugins: {
            legend: {
              display: false,
            },
            title: {
              display: false,
              text: 'Tendência das NFs ao Longo do Tempo'
            }
          }
        },
      });
    }
  </script>
</body>
