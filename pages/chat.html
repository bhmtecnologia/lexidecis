<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiDecis - Inteligência Artificial Corporativa</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- CSS externo (se houver) -->
    <link rel="stylesheet" href="../styles/chat.css">
    <link rel="stylesheet" href="../styles/gptManager.css">
    <link rel="stylesheet" href="../styles/loadingScreen.css">
</head>
<body>

    <!-- Sidebar -->
    <nav id="sidebarMenu" class="sidebar d-flex flex-column p-3 bg-dark">
        <!-- Barra de Ícones como Botões -->
        <div class="d-flex justify-content-around mb-3">
            <button id="profile-icon" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Perfil">
                <i class="bi bi-person-circle" style="font-size: 1.5rem;"></i> 
            </button>
            <button id="settings-button" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Configurações">
                <i class="bi bi-gear" style="font-size: 1.5rem;"></i>
            </button>
            <button id="select-gpt-button" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Escolher GPT">
                <i class="bi bi-robot" style="font-size: 1.5rem;"></i>
            </button>
            <button id="new-chat-button" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Nova conversa">
                <i class="bi bi-plus-square" style="font-size: 1.5rem;"></i>
            </button>
        </div>

        <!-- Campo de pesquisa -->
        <div class="input-group mb-3">
            <span class="input-group-text" id="search-icon"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="search-input" placeholder="Buscar" aria-label="Pesquisar chats" aria-describedby="search-icon">
            <button class="btn btn-outline-secondary" type="button" id="clear-search-button">&times;</button>
        </div>

        <!-- Lista de chats com rolagem automática -->
        <ul id="chat-list" class="list-group chat-list overflow-auto custom-chat-list-height">
            <!-- A lista de chats será populada dinamicamente -->
        </ul>

        <hr class="bg-white">

        <!-- Botões e campos na sidebar -->
        <ul class="nav nav-pills flex-column overflow-auto mb-auto">
            <li>
                <a href="#" class="nav-link text-white" id="logout-button">
                    <i class="bi bi-box-arrow-right"></i> Sair
                </a>
            </li>
        </ul>

        <hr class="bg-white">
    </nav>

    <!-- Conteúdo Principal -->
    <div class="content">
        <!-- Componente do chatbot -->
        <div id="chatbot-container">
            <!-- <flowise-fullchatbot></flowise-fullchatbot> -->
        </div>
    </div>

    <!-- Container para mensagens de erro -->
    <div id="error-container" class="alert alert-danger position-fixed bottom-0 end-0 m-3 d-none" role="alert">
        <!-- Mensagem de erro será exibida aqui -->
    </div>

    <!-- Scripts de Autenticação -->
    <script type="module">
        import { verifyAuthState } from "../services/auth.js";
    
        document.addEventListener("DOMContentLoaded", () => {
            console.log("[App] Inicializando fluxo de autenticação...");

            // Verificar o estado de autenticação
            verifyAuthState();

            // Função de logout
            const logout = () => {
                sessionStorage.clear();
                window.location.href = '../index.html';
            };

            // Associar o evento ao botão de logout
            const logoutButton = document.getElementById("logout-button");
            if (logoutButton) {
                logoutButton.addEventListener("click", (event) => {
                    event.preventDefault(); // Prevenir comportamento padrão do link
                    logout();
                });
            }
        });
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Hammer.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js" integrity="sha512-UXumZrZNiOwnTcZSHLOfcTs0aos2MzBWHXOHOuB0J/R44QB0dwY5JgfbvljXcklVf65Gc4El6RjZ+lnwd2az2g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- JavaScript externo -->
    <script type="module" src="../services/renderer.js"></script>

    <!-- Implementação do Hammer.js para Swipe -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const sidebar = document.getElementById('sidebarMenu');
            const overlay = document.getElementById('sidebarOverlay');

            const hammer = new Hammer(document.body);

            hammer.get('swipe').set({ direction: Hammer.DIRECTION_HORIZONTAL });

            document.querySelectorAll('input, button').forEach((element) => {
                const childHammer = new Hammer(element);
                childHammer.get('swipe').set({ enable: false });
            });

            function openSidebar() {
                sidebar.classList.add('active');
                overlay.classList.add('active');
                document.body.classList.add('sidebar-active');
            }

            function closeSidebar() {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
                document.body.classList.remove('sidebar-active');
            }

            hammer.on('swiperight', function () {
                if (!sidebar.classList.contains('active')) {
                    openSidebar();
                }
            });

            hammer.on('swipeleft', function () {
                if (sidebar.classList.contains('active')) {
                    closeSidebar();
                }
            });

            overlay.addEventListener('click', closeSidebar);
        });
    </script>
</body>
</html>
