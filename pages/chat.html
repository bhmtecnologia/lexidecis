    <!-- Modal de Renomear Chat -->

            <div class="modal-content">

                    </div>

    <!-- Scripts de Autenticação -->
    <script type="module" src="../services/auth.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Hammer.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js" integrity="sha512-UXumZrZNiOwnTcZSHLOfcTs0aos2MzBWHXOHOuB0J/R44QB0dwY5JgfbvljXcklVf65Gc4El6RjZ+lnwd2az2g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Seu JavaScript externo -->
    <script type="module" src="../services/renderer.js"></script>

    <!-- Ajustes para autenticação com sessionStorage -->
    <script>
        // Recupera os dados do sessionStorage
        const tenant = sessionStorage.getItem('tenant');
        const email = sessionStorage.getItem('email');
        const uuid = sessionStorage.getItem('uuid');

        // Verifica se os dados existem
        if (!tenant || !email || !uuid) {
            alert('Sessão expirada ou inválida. Por favor, faça login novamente.');
            window.location.href = 'index.html';
        } else {
            // Se necessário, você pode usar essas informações aqui
            console.log('Usuário autenticado:', { tenant, email, uuid });
        }

        // Função de logout
        function logout() {
            // Limpa o sessionStorage
            sessionStorage.clear();
            // Redireciona para a página de login
            window.location.href = '../index.html';
        }
    </script>

    <!-- Implementação do Hammer.js para Swipe -->
<!-- Adicione uma div de overlay para fechar a sidebar ao clicar fora -->
<div id="sidebarOverlay" class="sidebar-overlay"></div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const sidebar = document.getElementById('sidebarMenu');
        const overlay = document.getElementById('sidebarOverlay');

        // Inicializar o Hammer.js no body
        const hammer = new Hammer(document.body);

        // Configurar gestos de swipe apenas em áreas fora de inputs e botões
        hammer.get('swipe').set({ direction: Hammer.DIRECTION_HORIZONTAL });

        // Desativar gestos em inputs e botões
        document.querySelectorAll('input, button').forEach((element) => {
            const childHammer = new Hammer(element);
            childHammer.get('swipe').set({ enable: false });
        });

        // Função para abrir a sidebar
        function openSidebar() {
            sidebar.classList.add('active');
            overlay.classList.add('active');
            document.body.classList.add('sidebar-active');
        }

        // Função para fechar a sidebar
        function closeSidebar() {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            document.body.classList.remove('sidebar-active');
        }

        // Detectar swipe para a direita para abrir a sidebar
        hammer.on('swiperight', function (ev) {
            if (!sidebar.classList.contains('active')) {
                console.log('Swipe Right Detectado - Abrindo Sidebar');
                openSidebar();
            }
        });

        // Detectar swipe para a esquerda para fechar a sidebar
        hammer.on('swipeleft', function (ev) {
            if (sidebar.classList.contains('active')) {
                console.log('Swipe Left Detectado - Fechando Sidebar');
                closeSidebar();
            }
        });

        // Fechar a sidebar ao clicar no overlay
        overlay.addEventListener('click', function () {
            console.log('Clique no Overlay Detectado - Fechando Sidebar');
            closeSidebar();
        });
    });
</script>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
    <!-- Os toasts serão dinamicamente adicionados aqui -->
