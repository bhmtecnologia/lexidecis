<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <title>LexiDecis - Inteligência Artificial Corporativa</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- CSS externo -->
    <link rel="stylesheet" href="../styles/chat.css">
    <link rel="stylesheet" href="../styles/gptManager.css">
    <link rel="stylesheet" href="../styles/loadingScreen.css">
    <link rel="stylesheet" href="../styles/sidebar.css">
    <link rel="stylesheet" href="../styles/profileModal.css">
    <link rel="stylesheet" href="../styles/manualModal.css">
    <!-- Performance hints -->
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://webhook.power.tec.br" crossorigin>
</head>
<body>

    <!-- Botão para dispositivos móveis -->
    <button id="toggle-sidebar-btn" class="btn btn-primary lexi-toggle-sidebar-btn">
        <i class="bi bi-list"></i>
    </button>

    <!-- Sidebar -->
    <nav id="sidebarMenu" class="lexi-sidebar lexi-sidebar-menu sidebar d-flex flex-column p-3 bg-dark">
        <!-- Barra de Ícones como Botões -->
        <div class="d-flex justify-content-around mb-3">
            <button id="select-gpt-button" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Escolher GPT">
                <i class="bi bi-robot" style="font-size: 1.5rem;"></i>
            </button>
            <button id="new-chat-button" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Nova conversa">
                <i class="bi bi-pencil-square" style="font-size: 1.5rem;"></i> 
            </button>
        </div>

        <!-- Campo de pesquisa -->
        <div class="input-group mb-3">
            <span class="input-group-text lexi-search-icon" id="search-icon"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control lexi-search-input" id="search-input" placeholder="Buscar" aria-label="Pesquisar chats" aria-describedby="search-icon">
            <button class="btn btn-outline-secondary lexi-clear-search-btn" type="button" id="clear-search-button">&times;</button>
        </div>

        <!-- Lista de chats - Agora com flex-grow para ocupar espaço disponível -->
        <ul id="chat-list" class="list-group lexi-chat-list overflow-auto bg-dark flex-grow-1">
            <!-- Os chats serão carregados dinamicamente pelo ChatManager -->
        </ul>

        <!-- User Menu - Agora sempre visível no final -->
        <div class="lexi-user-menu-container mt-auto">
            <!-- Avatar do usuário (botão do menu) -->
            <div class="d-flex align-items-center lexi-user-menu-trigger" id="user-menu-trigger">
                <div class="lexi-user-avatar me-2" id="user-avatar">U</div>
                <span class="text-white" id="user-display-name">Usuário</span>
                <i class="bi bi-chevron-down text-white ms-auto"></i>
            </div>

            <!-- Menu dropdown -->
            <div class="lexi-user-menu-dropdown" id="user-menu-dropdown">
                <div class="lexi-user-menu-item">
                    <i class="bi bi-envelope me-2"></i>
                    <span id="user-email">usuario@exemplo.com</span>
                </div>
                <div class="lexi-user-menu-item" id="profile-button">
                    <i class="bi bi-person-circle me-2"></i>
                    <span>Gerenciar Perfil</span>
                </div>
                <div class="lexi-user-menu-item" id="config-button">
                    <i class="bi bi-gear me-2"></i>
                    <span>Configurações</span>
                </div>
                <div class="lexi-user-menu-item" id="manual-button">
                    <i class="bi bi-book me-2"></i>
                    <span>Manual do Usuário</span>
                </div>
                <div class="lexi-user-menu-item" id="admin-button">
                    <i class="bi bi-person-gear me-2"></i>
                    <span>Painel do Admin</span>
                </div>
                <div class="lexi-user-menu-item lexi-user-menu-logout" id="logout-button">
                    <i class="bi bi-box-arrow-right me-2"></i>
                    <span>Sair</span>
                </div>
                <hr class="lexi-user-menu-divider">
                <div class="lexi-user-menu-item" id="active-users-counter">
                    <i class="bi bi-circle-fill text-success me-2"></i>
                    <span>Usuários Ativos: 1</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Overlay para sidebar em dispositivos móveis -->
    <div id="sidebarOverlay" class="lexi-sidebar-overlay"></div>

    <!-- Sistema de Loading Unificado será injetado automaticamente pelo UnifiedLoadingManager -->

    <!-- Conteúdo Principal -->
    <div class="content">
        <div id="welcome-message" class="d-flex flex-column gap-3 justify-content-center align-items-center vh-100 text-center px-3">
            <h1>Bem-vindo à LexiDecis!</h1>
            <p class="text-white-50 m-0">Pronto para começar? Inicie uma nova conversa.</p>
            <button id="start-new-chat-button" class="btn btn-success btn-lg w-100" style="max-width: 360px;">
                <i class="bi bi-chat-dots me-2"></i>
                Iniciar nova conversa
            </button>
        </div>
        
        <div id="chatbot-container" class="d-none">
            <!-- Chatbot será inicializado aqui -->
        </div>
    </div>

    <!-- Container para mensagens de erro -->
    <div id="error-container" class="alert alert-danger position-fixed bottom-0 end-0 m-3 d-none" role="alert">
        <!-- Mensagem de erro -->
    </div>

    <!-- Modal do Painel Admin -->
    <div class="modal fade" id="adminModal" tabindex="-1" aria-labelledby="adminModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="adminModalLabel">Painel do Admin</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <iframe id="adminIframe" src="/admin/index.html" width="100%" height="600px" frameborder="0"></iframe>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal do Manual do Usuário -->
    <div class="modal fade" id="manualModal" tabindex="-1" aria-labelledby="manualModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="manualModalLabel">
                        <i class="bi bi-book"></i> Manual do Usuário - LexiDecis
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <iframe id="manualIframe" src="manual-usuario.html" width="100%" height="100%" frameborder="0" style="min-height: 80vh;"></iframe>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script para melhorar experiência mobile -->
    <script>
        // Previne zoom automático em dispositivos móveis - versão aprimorada
        (function() {
            // Função para forçar viewport consistente
            function enforceViewport() {
                var viewport = document.querySelector('meta[name=viewport]');
                if (viewport) {
                    viewport.setAttribute('content',
                        'width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no');
                }
            }

            // Aplica estilos de anti-zoom a um elemento
            function applyAntiZoomStyles(element) {
                if (element) {
                    element.style.fontSize = '16px';
                    element.style.webkitAppearance = 'none';
                    element.style.webkitTextSizeAdjust = '100%';
                    element.style.textSizeAdjust = '100%';
                    element.style.touchAction = 'manipulation';
                    element.style.webkitTapHighlightColor = 'transparent';
                }
            }

            // Aplica estilos a todos os elementos do chatbot
            function applyChatbotStyles() {
                var chatbot = document.querySelector('flowise-fullchatbot');
                if (chatbot) {
                    // Aplica aos inputs e textareas do chatbot
                    var inputs = chatbot.querySelectorAll('input, textarea, select');
                    inputs.forEach(function(input) {
                        applyAntiZoomStyles(input);
                        input.style.minHeight = '44px';
                    });

                    // Aplica a todos os elementos dentro do chatbot
                    var allElements = chatbot.querySelectorAll('*');
                    allElements.forEach(function(el) {
                        el.style.webkitTextSizeAdjust = '100%';
                        el.style.textSizeAdjust = '100%';
                    });
                }
            }

            // Previne zoom duplo em iOS
            var lastTouchEnd = 0;
            document.addEventListener('touchend', function(event) {
                var now = (new Date()).getTime();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, false);

            // Monitora foco em inputs
            document.addEventListener('focusin', function(event) {
                if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA' || event.target.tagName === 'SELECT') {
                    enforceViewport();
                    applyAntiZoomStyles(event.target);
                }
            }, true);

            // Monitora toque
            document.addEventListener('touchstart', function(event) {
                enforceViewport();
            }, true);

            document.addEventListener('DOMContentLoaded', function() {
                // Aplica estilos iniciais
                var allInputs = document.querySelectorAll('input, textarea, select');
                allInputs.forEach(applyAntiZoomStyles);

                // Monitora continuamente o chatbot
                var chatbotObserver = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        if (mutation.type === 'childList' && mutation.addedNodes.length > 0) {
                            mutation.addedNodes.forEach(function(node) {
                                if (node.tagName === 'FLOWISE-FULLCHATBOT') {
                                    // Aplica estilos imediatamente
                                    applyChatbotStyles();
                                    // Continua aplicando periodicamente
                                    var styleInterval = setInterval(function() {
                                        applyChatbotStyles();
                                        // Para após 10 segundos
                                        setTimeout(function() {
                                            clearInterval(styleInterval);
                                        }, 10000);
                                    }, 500);
                                }
                            });
                        }
                    });
                });

                var container = document.getElementById('chatbot-container');
                if (container) {
                    chatbotObserver.observe(container, {
                        childList: true,
                        subtree: true
                    });
                }

                // Verifica periodicamente se o chatbot foi carregado
                var checkInterval = setInterval(function() {
                    if (document.querySelector('flowise-fullchatbot')) {
                        applyChatbotStyles();
                        clearInterval(checkInterval);
                    }
                }, 100);

                // Aplica estilos periodicamente para garantir
                setInterval(function() {
                    enforceViewport();
                    applyChatbotStyles();
                }, 2000);

                // Injeta CSS adicional para máxima prioridade
                var antiZoomCSS = `
                    <style id="anti-zoom-css">
                        /* CSS de máxima prioridade para prevenir zoom */
                        flowise-fullchatbot input,
                        flowise-fullchatbot textarea,
                        flowise-fullchatbot select,
                        flowise-fullchatbot button {
                            font-size: 16px !important;
                            -webkit-text-size-adjust: 100% !important;
                            text-size-adjust: 100% !important;
                            -webkit-appearance: none !important;
                            touch-action: manipulation !important;
                            -webkit-tap-highlight-color: transparent !important;
                            min-height: 44px !important;
                        }

                        flowise-fullchatbot * {
                            -webkit-text-size-adjust: 100% !important;
                            text-size-adjust: 100% !important;
                        }

                        /* Previne zoom em qualquer input dentro do shadow DOM */
                        flowise-fullchatbot ::shadow input,
                        flowise-fullchatbot ::shadow textarea,
                        flowise-fullchatbot ::shadow select {
                            font-size: 16px !important;
                            -webkit-text-size-adjust: 100% !important;
                            text-size-adjust: 100% !important;
                        }
                    </style>
                `;

                // Injeta o CSS no head
                document.head.insertAdjacentHTML('beforeend', antiZoomCSS);
            });
        })();
    </script>

    <!-- Scripts de Autenticação e Renderização -->
    <script type="module" src="../services/renderer.js"></script>

    <!-- Fallback de Logout: garante que o botão funcione mesmo se a inicialização falhar -->
    <script type="module">
        import { logout } from '../services/auth.js';
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('logout-button');
            if (btn && !btn.dataset.bound) {
                btn.addEventListener('click', async (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    try {
                        await logout();
                    } catch (err) {
                        console.error('Logout (fallback) falhou:', err);
                        window.location.href = '../index.html';
                    }
                });
                btn.dataset.bound = 'true';
            }
        });
    </script>
</body>
</html>
