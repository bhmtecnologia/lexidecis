<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiDecis - Inteligência Artificial Corporativa</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- CSS externo (se houver) -->
    <link rel="stylesheet" href="../styles/chat.css">
    <link rel="stylesheet" href="../styles/gptManager.css">
    <link rel="stylesheet" href="../styles/loadingScreen.css">
    <style>
        /* Estilos para o toggle da sidebar em telas pequenas */
        @media (max-width: 767px) {
            #sidebarMenu {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 250px;
                z-index: 9999;
            }
            #sidebarMenu.active {
                transform: translateX(0%);
            }
            #toggle-sidebar-btn {
                display: block;
            }
            #sidebarOverlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 9998;
            }
            #sidebarOverlay.active {
                display: block;
            }
        }
        @media (min-width: 768px) {
            #toggle-sidebar-btn {
                display: none; /* Não mostrar o botão em telas maiores */
            }
        }

        /* Ajustes no botão toggle para ficar no topo à direita e 20% menor */
        #toggle-sidebar-btn {
            position: fixed;
            z-index: 10000;
            top: 10px;
            right: 10px;
            font-size: 1.0 rem; /* Aproximadamente 20% menor que 1.5rem */
        }
    </style>
</head>
<body>

    <!-- Botão para dispositivos móveis -->
    <button id="toggle-sidebar-btn" class="btn btn-primary">
        <i class="bi bi-list"></i>
    </button>

    <!-- Sidebar -->
    <nav id="sidebarMenu" class="sidebar d-flex flex-column p-3 bg-dark">
        <!-- Barra de Ícones como Botões -->
        <div class="d-flex justify-content-around mb-3">
            <button id="settings-button" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Configurações">
                <i class="bi bi-gear" style="font-size: 1.5rem;"></i>
            </button>
            <button id="profile-icon" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Perfil">
                <i class="bi bi-person-circle" style="font-size: 1.5rem;"></i> 
            </button>
            <button id="select-gpt-button" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Escolher GPT">
                <i class="bi bi-robot" style="font-size: 1.5rem;"></i>
            </button>
            <button id="new-chat-button" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Nova conversa">
                <i class="bi bi-plus-square" style="font-size: 1.5rem;"></i>
            </button>
        </div>

        <!-- Campo de pesquisa -->
        <div class="input-group mb-3">
            <span class="input-group-text" id="search-icon"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="search-input" placeholder="Buscar" aria-label="Pesquisar chats" aria-describedby="search-icon">
            <button class="btn btn-outline-secondary" type="button" id="clear-search-button">&times;</button>
        </div>

        <!-- Lista de chats com rolagem automática -->
        <ul id="chat-list" class="list-group chat-list overflow-auto custom-chat-list-height">
            <!-- A lista de chats será populada dinamicamente -->
        </ul>

        <hr class="bg-white">

        <!-- Botões e campos na sidebar -->
        <ul class="nav nav-pills flex-column overflow-auto mb-auto">
            <li>
                <a href="#" class="nav-link text-white" id="logout-button">
                    <i class="bi bi-box-arrow-right"></i> Sair
                </a>
            </li>
        </ul>

        <hr class="bg-white">
    </nav>

    <!-- Overlay para quando a sidebar estiver aberta em dispositivos móveis -->
    <div id="sidebarOverlay"></div>

    <!-- Conteúdo Principal -->
    <div class="content">
        <!-- Componente do chatbot -->
        <div id="chatbot-container">
            <!-- <flowise-fullchatbot></flowise-fullchatbot> -->
        </div>
    </div>

    <!-- Container para mensagens de erro -->
    <div id="error-container" class="alert alert-danger position-fixed bottom-0 end-0 m-3 d-none" role="alert">
        <!-- Mensagem de erro será exibida aqui -->
    </div>

    <!-- Scripts de Autenticação -->
    <script type="module">
        import { verifyAuthState } from "../services/auth.js";
    
        document.addEventListener("DOMContentLoaded", () => {
            console.log("[App] Inicializando fluxo de autenticação...");

            // Verificar o estado de autenticação
            verifyAuthState();

            // Função de logout
            const logout = () => {
                sessionStorage.clear();
                window.location.href = '../index.html';
            };

            // Associar o evento ao botão de logout
            const logoutButton = document.getElementById("logout-button");
            if (logoutButton) {
                logoutButton.addEventListener("click", (event) => {
                    event.preventDefault();
                    logout();
                });
            }

            // Lógica do botão de toggle da sidebar em telas menores
            const sidebar = document.getElementById('sidebarMenu');
            const toggleBtn = document.getElementById('toggle-sidebar-btn');
            const overlay = document.getElementById('sidebarOverlay');

            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            });

            overlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        });
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Removido Hammer.js e sua implementação -->
    <!-- JavaScript externo -->
    <script type="module" src="../services/renderer.js"></script>

</body>
</html>
