    <!-- chat.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>LexiDecis - Inteligência Artificial Corporativa</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- CSS externo -->
    <link rel="stylesheet" href="../styles/chat.css">
    <link rel="stylesheet" href="../styles/gptManager.css">
    <link rel="stylesheet" href="../styles/loadingScreen.css">
    <link rel="stylesheet" href="../styles/sidebar.css">
</head>
<body>

    <!-- Botão para dispositivos móveis -->
    <button id="toggle-sidebar-btn" class="btn btn-primary lexi-toggle-sidebar-btn">
        <i class="bi bi-list"></i>
    </button>

    <!-- Sidebar -->
    <nav id="sidebarMenu" class="lexi-sidebar sidebar d-flex flex-column p-3 bg-dark" style="height: 100vh; height: -webkit-fill-available;">
        <!-- Barra de Ícones como Botões -->
        <div class="d-flex justify-content-around mb-3">
            <button id="profile-icon" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Perfil">
                <i class="bi bi-person-circle" style="font-size: 1.5rem;"></i> 
            </button>
            <button id="select-gpt-button" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Escolher GPT">
                <i class="bi bi-robot" style="font-size: 1.5rem;"></i>
            </button>
            <button id="new-chat-button" class="btn btn-link text-white" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Nova conversa">
                <i class="bi bi-chat-dots" style="font-size: 1.5rem;"></i>
            </button>
        </div>

        <!-- Campo de pesquisa -->
        <div class="input-group mb-3">
            <span class="input-group-text lexi-search-icon" id="search-icon"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control lexi-search-input" id="search-input" placeholder="Buscar" aria-label="Pesquisar chats" aria-describedby="search-icon">
            <button class="btn btn-outline-secondary lexi-clear-search-btn" type="button" id="clear-search-button">&times;</button>
        </div>

        <!-- Lista de chats -->
        <ul id="chat-list" class="list-group lexi-chat-list overflow-auto custom-chat-list-height bg-dark">
            <!-- Lista será populada dinamicamente -->
        </ul>

        <!-- Botões e campos na sidebar -->
        <ul class="nav nav-pills flex-column overflow-auto mb-auto">
            <!-- Menu items podem ser adicionados aqui no futuro -->
        </ul>

        <!-- User Menu -->
        <div class="lexi-user-menu-container">
            <!-- Avatar do usuário (botão do menu) -->
            <div class="d-flex align-items-center lexi-user-menu-trigger" id="user-menu-trigger">
                <div class="lexi-user-avatar me-2" id="user-avatar">T</div>
                <span class="text-white" id="user-display-name">TI</span>
                <i class="bi bi-chevron-down text-white ms-auto"></i>
            </div>

            <!-- Menu dropdown -->
            <div class="lexi-user-menu-dropdown" id="user-menu-dropdown">
                <div class="lexi-user-menu-item">
                    <i class="bi bi-envelope me-2"></i>
                    <span id="user-email">usuario@exemplo.com</span>
                </div>
                <div class="lexi-user-menu-item" id="config-button">
                    <i class="bi bi-gear me-2"></i>
                    <span>Configurações</span>
                </div>
                <div class="lexi-user-menu-item" id="admin-button">
                    <i class="bi bi-person-gear me-2"></i>
                    <span>Painel do Admin</span>
                </div>
                <div class="lexi-user-menu-item lexi-user-menu-logout" id="logout-button">
                    <i class="bi bi-box-arrow-right me-2"></i>
                    <span>Sair</span>
                </div>
                <hr class="lexi-user-menu-divider">
                <div class="lexi-user-menu-item">
                    <i class="bi bi-circle-fill text-success me-2"></i>
                    <span>Usuários Ativos: 1</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Overlay para sidebar em dispositivos móveis -->
    <div id="sidebarOverlay" class="lexi-sidebar-overlay"></div>

    <!-- Loading Indicator para Chats -->
    <div id="chatLoadingIndicator" class="lexi-chat-loading">
        <div class="d-flex flex-column align-items-center">
            <div class="lexi-loading-spinner"></div>
            <div class="lexi-loading-text">Carregando chat...</div>
        </div>
    </div>

    <!-- Conteúdo Principal -->
    <div class="content">
        <div id="welcome-message" class="d-flex justify-content-center align-items-center vh-100">
            <h1>Bem-vindo à LexiDecis!</h1>
        </div>
        
        <div id="chatbot-container" class="d-none">
            <!-- Chatbot será inicializado aqui -->
        </div>
    </div>

    <!-- Container para mensagens de erro -->
    <div id="error-container" class="alert alert-danger position-fixed bottom-0 end-0 m-3 d-none" role="alert">
        <!-- Mensagem de erro -->
    </div>

    <!-- Modal do Painel Admin -->
    <div class="modal fade" id="adminModal" tabindex="-1" aria-labelledby="adminModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="adminModalLabel">Painel do Admin</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <iframe id="adminIframe" src="/admin/index.html" width="100%" height="600px" frameborder="0"></iframe>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Scripts de Autenticação e Renderização -->
    <script type="module">
        import { verifyAuthState, logout } from "../services/auth.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    
        document.addEventListener("DOMContentLoaded", () => {
            // Verificar o estado de autenticação
            verifyAuthState();

            // Função para atualizar informações do usuário
            function updateUserInfo() {
                const auth = getAuth();
                const user = auth.currentUser;
                
                if (user) {
                    const userAvatar = document.getElementById('user-avatar');
                    const userDisplayName = document.getElementById('user-display-name');
                    const userEmail = document.getElementById('user-email');
                    
                    // Obter a primeira letra do displayName ou email
                    let displayName = user.displayName || user.email || 'U';
                    let firstLetter = displayName.charAt(0).toUpperCase();
                    
                    // Atualizar o avatar com a primeira letra
                    if (userAvatar) {
                        userAvatar.textContent = firstLetter;
                    }
                    
                    // Atualizar o nome de exibição
                    if (userDisplayName) {
                        // Se tem displayName, usa ele, senão usa o email
                        if (user.displayName) {
                            userDisplayName.textContent = user.displayName;
                        } else {
                            // Extrai o username do email (parte antes do @)
                            const emailUsername = user.email.split('@')[0];
                            userDisplayName.textContent = emailUsername;
                        }
                    }
                    
                    // Atualizar o email no menu
                    if (userEmail) {
                        userEmail.textContent = user.email;
                    }
                }
            }

            // Associar o evento ao botão de logout
            const logoutButton = document.getElementById("logout-button");
            if (logoutButton) {
                logoutButton.addEventListener("click", async (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    try {
                        await logout();
                    } catch (error) {
                        console.error("Erro ao realizar logout:", error);
                        // Opcional: Mostrar uma mensagem de erro ao usuário
                    }
                });
            }

            // Associar evento ao botão de configurações
            const configButton = document.getElementById("config-button");
            if (configButton) {
                configButton.addEventListener("click", (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    // Fechar o menu
                    userMenuDropdown.classList.remove('show');
                    // Redirecionar para página de configurações
                    window.location.href = "../pages/config.html";
                });
            }

            // Associar evento ao botão do painel admin
            const adminButton = document.getElementById("admin-button");
            if (adminButton) {
                adminButton.addEventListener("click", (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    // Fechar o menu
                    userMenuDropdown.classList.remove('show');
                    // Abrir modal do painel admin
                    const adminModal = new bootstrap.Modal(document.getElementById('adminModal'));
                    adminModal.show();
                });
            }

            // Configurar listener para mudanças de autenticação
            const auth = getAuth();
            auth.onAuthStateChanged((user) => {
                if (user) {
                    updateUserInfo();
                }
            });

            // Atualizar informações do usuário imediatamente se já estiver logado
            updateUserInfo();

            // Evento para recarregar o iframe quando o modal for aberto
            const adminModal = document.getElementById('adminModal');
            if (adminModal) {
                adminModal.addEventListener('shown.bs.modal', function () {
                    const iframe = document.getElementById('adminIframe');
                    if (iframe) {
                        iframe.src = iframe.src; // Recarrega o iframe
                    }
                });
            }

            // Funcionalidade do menu dropdown do usuário
            const userMenuTrigger = document.getElementById('user-menu-trigger');
            const userMenuDropdown = document.getElementById('user-menu-dropdown');
            
            if (userMenuTrigger && userMenuDropdown) {
                // Toggle do menu ao clicar no trigger
                userMenuTrigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    userMenuDropdown.classList.toggle('show');
                });
                
                // Fechar menu ao clicar fora
                document.addEventListener('click', (e) => {
                    if (!userMenuTrigger.contains(e.target) && !userMenuDropdown.contains(e.target)) {
                        userMenuDropdown.classList.remove('show');
                    }
                });
                
                // Fechar menu ao pressionar ESC
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        userMenuDropdown.classList.remove('show');
                    }
                });
            }

            // Lógica do botão de toggle da sidebar em telas menores
            const sidebar = document.getElementById('sidebarMenu');
            const toggleBtn = document.getElementById('toggle-sidebar-btn');
            const overlay = document.getElementById('sidebarOverlay');

            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            });

            overlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });

            // Gerenciar a exibição da mensagem de boas-vindas e do chatbot
            const welcomeMessage = document.getElementById('welcome-message');
            const chatbotContainer = document.getElementById('chatbot-container');

            // Função para iniciar um novo chat
            const iniciarNovoChat = () => {
                if(welcomeMessage) welcomeMessage.classList.add('d-none');
                chatbotContainer.classList.remove('d-none');
                // Aqui você pode inicializar o chatbot
            };

            // Função para selecionar um chat existente
            const selecionarChat = (chatId) => {
                if(welcomeMessage) welcomeMessage.classList.add('d-none');
                chatbotContainer.classList.remove('d-none');
                // Aqui você pode carregar o chat existente com chatId
            };

            // Função para mostrar loading
            function showChatLoading() {
                const loadingIndicator = document.getElementById('chatLoadingIndicator');
                const body = document.body;
                
                if (loadingIndicator) {
                    loadingIndicator.classList.add('show');
                }
                
                body.classList.add('lexi-loading-active');
            }

            // Função para esconder loading
            function hideChatLoading() {
                const loadingIndicator = document.getElementById('chatLoadingIndicator');
                const body = document.body;
                
                if (loadingIndicator) {
                    loadingIndicator.classList.remove('show');
                }
                
                body.classList.remove('lexi-loading-active');
            }

            // Função para selecionar item de chat
            function selectChatItem(chatId) {
                // Remover seleção anterior
                const allChatItems = document.querySelectorAll('#chat-list li');
                allChatItems.forEach(item => {
                    item.classList.remove('lexi-chat-item-selected');
                });
                
                // Selecionar novo item
                const selectedItem = document.querySelector(`#chat-list li[data-chat-id="${chatId}"]`);
                if (selectedItem) {
                    selectedItem.classList.add('lexi-chat-item-selected');
                }
            }

            // Associar eventos aos botões
            const newChatButton = document.getElementById('new-chat-button');
            if (newChatButton) {
                newChatButton.addEventListener('click', () => {
                    iniciarNovoChat();
                });
            }

            const chatList = document.getElementById('chat-list');
            if (chatList) {
                chatList.addEventListener('click', (event) => {
                    const chatItem = event.target.closest('li');
                    if (chatItem && chatItem.getAttribute('data-chat-id')) {
                        const chatId = chatItem.getAttribute('data-chat-id');
                        
                        // Mostrar loading
                        showChatLoading();
                        
                        // Selecionar item visualmente
                        selectChatItem(chatId);
                        
                        // Simular carregamento do chat (substitua pela sua lógica real)
                        setTimeout(() => {
                            selecionarChat(chatId);
                            hideChatLoading();
                        }, 1500); // 1.5 segundos de loading
                    }
                });
            }

            // **Remover a chamada automática de iniciarNovoChat()**
             iniciarNovoChat(); // Remova ou comente esta linha
        });
    </script>
    <script type="module" src="../services/renderer.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
