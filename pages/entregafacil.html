<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Entrega Fácil - Last Mile Delivery App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Estilos Gerais */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Container Principal */
        #container {
            width: 100%;
            max-width: 420px;
            background-color: #ffffff;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Título */
        h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.8em;
            color: #333333;
        }

        /********************************************
         * INDICADOR DE ETAPAS (Wizard Steps)
         ********************************************/
        .steps {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .circle {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background-color: #ccc; /* Cor padrão (inativo) */
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .label {
            margin-top: 5px;
            font-size: 0.9em;
            color: #333;
        }

        .bar {
            flex: 1; 
            height: 2px;
            background-color: #ccc; /* Cor padrão (inativo) */
            margin: 0 5px;
            transition: background-color 0.3s ease;
        }

        /* Etapa ativa: destaque */
        .step.active .circle {
            background-color: #28a745; /* verde principal */
        }

        /* Etapa concluída: pode usar verde mais escuro ou outro tom */
        .step.completed .circle {
            background-color: #218838; /* verde mais escuro */
        }

        /* Quando a etapa à esquerda estiver completa, a barra até a próxima etapa também fica verde */
        .step.completed + .bar {
            background-color: #28a745;
        }

        /********************************************
         * FIM DO INDICADOR DE ETAPAS
         ********************************************/

        /* Labels e Inputs */
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555555;
            font-size: 1.05em;
        }

        input[type="number"],
        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 1.05em;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Botões */
        .botao-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 16px;
            background-color: #28a745;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #218838;
        }

        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }

        /* Pré-visualização de Imagem */
        .img-preview {
            width: 100%;
            max-height: 220px;
            margin-bottom: 15px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            display: none;
            object-fit: cover;
        }

        /* Resultados da Busca */
        #resultados {
            max-height: 160px;
            overflow-y: auto;
            border: 1px solid #cccccc;
            border-radius: 8px;
            padding: 10px;
            background-color: #f9f9f9;
            margin-bottom: 18px;
        }

        .item-resultado {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background-color 0.2s ease;
            font-size: 0.95em;
        }

        .item-resultado:last-child {
            border-bottom: none;
        }

        .item-resultado:hover {
            background-color: #e9ecef;
        }

        /* Mensagens */
        #mensagem {
            padding: 14px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
            display: none;
            font-size: 0.95em;
        }

        #mensagem.sucesso {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        #mensagem.erro {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Indicador de Carregamento */
        #loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #28a745;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Passos (Wizard) */
        .passo {
            display: none;
        }
        .passo.mostrar {
            display: block;
        }

        /* Responsividade Adicional */
        @media (max-width: 450px) {
            #container {
                padding: 20px;
            }

            h1 {
                font-size: 1.6em;
            }

            label {
                font-size: 1em;
            }

            input[type="number"],
            input[type="text"],
            input[type="file"] {
                font-size: 1em;
                padding: 12px;
            }

            button {
                font-size: 1em;
                padding: 14px;
            }

            .item-resultado {
                font-size: 0.9em;
            }

            .label {
                font-size: 0.85em;
            }

            .circle {
                width: 28px;
                height: 28px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Entrega Fácil</h1>
        
        <!-- INDICADOR DE ETAPAS -->
        <div class="steps">
            <!-- ETAPA 1 -->
            <div class="step" id="etapa1">
                <div class="circle">1</div>
                <div class="label">Selecione NF</div>
            </div>
            <div class="bar"></div>
            <!-- ETAPA 2 -->
            <div class="step" id="etapa2">
                <div class="circle">2</div>
                <div class="label">Anexar Comprovante</div>
            </div>
            <div class="bar"></div>
            <!-- ETAPA 3 -->
            <div class="step" id="etapa3">
                <div class="circle">3</div>
                <div class="label">Confirmar e Enviar</div>
            </div>
        </div>
        <!-- FIM DO INDICADOR DE ETAPAS -->

        <!-- Passo 1: Selecionar NF -->
        <div id="passo1" class="passo mostrar">
            <label for="buscaNF">Buscar NF (Mínimo 3 dígitos):</label>
            <input type="number" id="buscaNF" name="buscaNF" placeholder="Ex: 100" minlength="3" maxlength="20" min="100" aria-describedby="buscaNFHelp">

            <div id="resultados" aria-live="polite" aria-atomic="true"></div>

            <label for="nf">NF Selecionada:</label>
            <input type="text" id="nf" name="nf" placeholder="NF será exibida aqui" readonly>

            <div class="botao-container">
                <!-- Etapa 1 só tem o botão "Próximo". Ele só habilita se tiver NF selecionada. -->
                <button id="btnProximo1" disabled>Próximo</button>
            </div>
        </div>

        <!-- Passo 2: Upload de Comprovante -->
        <div id="passo2" class="passo">
            <label for="comprovante">Foto do Comprovante:</label>
            <input type="file" id="comprovante" accept="image/png, image/jpeg, image/jpg" aria-describedby="comprovanteHelp" disabled>
            <small id="comprovanteHelp" style="display: block; margin-bottom: 10px; color: #777;">
                Formatos: PNG, JPEG, JPG. Máx: 5MB.
            </small>

            <img id="previewComprovante" class="img-preview" src="#" alt="Pré-visualização do Comprovante (Passo 2)">

            <div class="botao-container">
                <button id="btnVoltar2">Voltar</button>
                <button id="btnProximo2" disabled>Próximo</button>
            </div>
        </div>

        <!-- Passo 3: Confirmação e Envio -->
        <div id="passo3" class="passo">
            <p style="margin-bottom:20px;">Verifique se os dados estão corretos e confirme o envio do comprovante.</p>
            
            <label>NF Selecionada:</label>
            <input type="text" id="nfConfirmacao" readonly>

            <!-- Miniatura do Comprovante para confirmação -->
            <label>Comprovante Selecionado:</label>
            <img id="previewComprovanteFinal" class="img-preview" src="#" alt="Pré-visualização do Comprovante (Passo 3)">

            <!-- Botão de Enviar -->
            <div class="botao-container">
                <button id="btnVoltar3">Voltar</button>
                <button onclick="salvarComprovante()" id="btnSalvar">Enviar Comprovante</button>
            </div>
        </div>

        <!-- Indicador de Carregamento Durante o Envio -->
        <div id="loading">
            <div class="spinner"></div>
            <p>Salvando...</p>
        </div>

        <!-- Mensagens -->
        <div id="mensagem"></div>
    </div>

    <script>
        // Seleção de elementos
        const inputBusca = document.getElementById("buscaNF");
        const resultadosDiv = document.getElementById("resultados");
        const inputNF = document.getElementById("nf");
        const comprovanteInput = document.getElementById("comprovante");
        const previewComprovante = document.getElementById("previewComprovante");
        const previewComprovanteFinal = document.getElementById("previewComprovanteFinal");

        const btnProximo1 = document.getElementById("btnProximo1");
        const btnProximo2 = document.getElementById("btnProximo2");
        const btnVoltar2 = document.getElementById("btnVoltar2");
        const btnVoltar3 = document.getElementById("btnVoltar3");
        const btnSalvar = document.getElementById("btnSalvar");
        const nfConfirmacao = document.getElementById("nfConfirmacao");

        const mensagemDiv = document.getElementById("mensagem");
        const loadingDiv = document.getElementById("loading");

        // Divs de Passo
        const passo1Div = document.getElementById("passo1");
        const passo2Div = document.getElementById("passo2");
        const passo3Div = document.getElementById("passo3");

        // Divs de Etapas no indicador
        const etapa1Div = document.getElementById("etapa1");
        const etapa2Div = document.getElementById("etapa2");
        const etapa3Div = document.getElementById("etapa3");

        // Variável para armazenar as NFs
        let nfs = [];

        /********************************************
         * DOMContentLoaded
         ********************************************/
        window.addEventListener("DOMContentLoaded", function() {
            // Deixa a etapa 1 ativa (verde) e exibe o passo 1
            mostrarPasso(1);
            // Carrega as NFs da API
            carregarTodasNFs();
        });

        /********************************************
         * ATUALIZAR INDICADOR DE ETAPAS
         ********************************************/
        function atualizarIndicadorEtapas(passo) {
            // Remove classes de todos
            etapa1Div.classList.remove("active", "completed");
            etapa2Div.classList.remove("active", "completed");
            etapa3Div.classList.remove("active", "completed");

            // Passo 1
            if (passo === 1) {
                etapa1Div.classList.add("active");
            }
            // Passo 2
            else if (passo === 2) {
                etapa1Div.classList.add("completed");
                etapa2Div.classList.add("active");
            }
            // Passo 3
            else if (passo === 3) {
                etapa1Div.classList.add("completed");
                etapa2Div.classList.add("completed");
                etapa3Div.classList.add("active");
            }
        }

        /********************************************
         * MOSTRAR/ESCONDER PASSOS
         ********************************************/
        function mostrarPasso(passo) {
            // Esconde todos
            [passo1Div, passo2Div, passo3Div].forEach(div => div.classList.remove("mostrar"));

            // Mostra apenas o passo atual
            if (passo === 1) {
                passo1Div.classList.add("mostrar");
            } else if (passo === 2) {
                passo2Div.classList.add("mostrar");
            } else if (passo === 3) {
                passo3Div.classList.add("mostrar");
            }

            // Atualiza o indicador visual
            atualizarIndicadorEtapas(passo);
        }

        /********************************************
         * NAVEGACAO ENTRE PASSOS
         ********************************************/
        btnProximo1.addEventListener("click", () => {
            // Ao avançar para o passo 2, habilitar upload
            comprovanteInput.disabled = false;
            mostrarPasso(2);
        });

        btnVoltar2.addEventListener("click", () => {
            mostrarPasso(1);
        });

        btnProximo2.addEventListener("click", () => {
            // Ao avançar para o passo 3, exibir a NF selecionada como confirmação
            nfConfirmacao.value = inputNF.value;
            // Copiamos a mesma imagem (src) do preview do passo 2 para o preview do passo 3
            previewComprovanteFinal.src = previewComprovante.src;
            if (previewComprovante.src !== "#") {
                previewComprovanteFinal.style.display = 'block';
            }
            mostrarPasso(3);
        });

        btnVoltar3.addEventListener("click", () => {
            mostrarPasso(2);
        });

        /********************************************
         * MENSAGENS E LOADING
         ********************************************/
        function mostrarMensagem(mensagem, tipo) {
            mensagemDiv.textContent = mensagem;
            mensagemDiv.className = ""; // Resetar classes
            mensagemDiv.classList.add(tipo);
            mensagemDiv.style.display = 'block';
            mensagemDiv.setAttribute('role', 'alert');
        }

        function limparMensagens() {
            mensagemDiv.textContent = "";
            mensagemDiv.className = "";
            mensagemDiv.style.display = 'none';
        }

        function mostrarLoading(status) {
            if (status) {
                btnSalvar.disabled = true;
                inputBusca.disabled = true;
                comprovanteInput.disabled = true;
                loadingDiv.style.display = 'block';
            } else {
                btnSalvar.disabled = false;
                inputBusca.disabled = false;
                loadingDiv.style.display = 'none';
            }
        }

        /********************************************
         * CARREGAR TODAS AS NFs
         ********************************************/
        async function carregarTodasNFs() {
            try {
                mostrarLoading(true);
                const url = "https://n8n.bhm.tec.br/webhook/readnfs";
                const response = await fetch(url, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json"
                    }
                });

                if (!response.ok) {
                    throw new Error(`Erro na requisição: ${response.status} - ${response.statusText}`);
                }

                const textData = await response.text();
                // Verificar se a resposta já é um array ou precisa de parse adicional
                let parsedData;
                if (textData.trim().startsWith('[')) {
                    // Resposta é um array
                    parsedData = JSON.parse(textData);
                } else {
                    // Resposta contém múltiplos objetos JSON separados por vírgulas
                    parsedData = JSON.parse(`[${textData}]`);
                }

                // Processar cada objeto da resposta
                nfs = parsedData.map(item => {
                    if (typeof item.data !== 'string') {
                        throw new TypeError("Campo 'data' não é uma string.");
                    }
                    let nfData = JSON.parse(item.data);
                    return {
                        id: nfData.id,
                        cliente: nfData.cliente
                    };
                });

            } catch (error) {
                console.error("Erro ao carregar NFs:", error);
                mostrarMensagem(`Erro ao carregar NFs: ${error.message}`, "erro");
            } finally {
                mostrarLoading(false);
            }
        }

        /********************************************
         * BUSCA DE NFs
         ********************************************/
        inputBusca.addEventListener("input", () => {
            const busca = inputBusca.value.trim();
            limparMensagens();

            if (busca.length >= 3) {
                buscarNFs(busca);
            } else {
                resultadosDiv.innerHTML = "";
                inputNF.value = "";
                btnProximo1.disabled = true;
            }
        });

        function buscarNFs(digits) {
            const resultadosFiltrados = nfs.filter(nf => nf.id.startsWith(digits));
            exibirResultados(resultadosFiltrados);
        }

        function exibirResultados(nfsEncontradas) {
            resultadosDiv.innerHTML = "";

            if (nfsEncontradas.length > 0) {
                nfsEncontradas.forEach(nf => {
                    const item = document.createElement("div");
                    item.classList.add("item-resultado");
                    item.textContent = `NF: ${nf.id} - ${nf.cliente}`;
                    item.tabIndex = 0; 

                    item.addEventListener("click", () => selecionarNF(nf.id));
                    item.addEventListener("keypress", (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            selecionarNF(nf.id);
                        }
                    });

                    resultadosDiv.appendChild(item);
                });
            } else {
                resultadosDiv.textContent = "Nenhuma NF encontrada.";
            }
        }

        function selecionarNF(numero) {
            inputNF.value = numero;
            resultadosDiv.innerHTML = "";
            inputBusca.value = "";
            btnProximo1.disabled = false;
        }

        /********************************************
         * UPLOAD DO COMPROVANTE
         ********************************************/
        comprovanteInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            previewComprovante.style.display = 'none';
            previewComprovante.src = "#";
            limparMensagens();

            if (file) {
                const isValidType = ['image/png', 'image/jpeg', 'image/jpg'].includes(file.type);
                const isValidSize = file.size <= 5 * 1024 * 1024; // 5MB

                if (!isValidType) {
                    mostrarMensagem("Formato de imagem inválido. Aceitamos PNG, JPEG e JPG.", "erro");
                    comprovanteInput.value = "";
                    btnProximo2.disabled = true;
                    return;
                }

                if (!isValidSize) {
                    mostrarMensagem("O arquivo é muito grande. Máximo permitido é 5MB.", "erro");
                    comprovanteInput.value = "";
                    btnProximo2.disabled = true;
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    previewComprovante.src = e.target.result;
                    previewComprovante.style.display = 'block';
                };
                reader.readAsDataURL(file);

                // Se arquivo ok, habilita botão "Próximo" do passo 2
                btnProximo2.disabled = false;
            } else {
                btnProximo2.disabled = true;
            }
        });

        /********************************************
         * SALVAR COMPROVANTE
         ********************************************/
        async function salvarComprovante() {
            const nf = inputNF.value.trim();
            const comprovanteFile = comprovanteInput.files[0];

            limparMensagens();

            // Validações finais antes de enviar
            if (!nf) {
                mostrarMensagem("Por favor, selecione uma NF.", "erro");
                return;
            }
            if (!comprovanteFile) {
                mostrarMensagem("Por favor, faça upload de um comprovante de entrega.", "erro");
                return;
            }

            try {
                mostrarLoading(true);

                const comprovanteBase64 = await toBase64(comprovanteFile);
                const data = {
                    nf: nf,
                    comprovante: comprovanteBase64
                };

                const response = await fetch("https://n8n.bhm.tec.br/webhook/criaComprovante", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Erro na requisição: ${response.status} - ${errorText}`);
                }

                mostrarMensagem(`Comprovante salvo com sucesso para a NF ${nf}!`, "sucesso");
                limparCampos();
            } catch (error) {
                console.error("Erro ao salvar comprovante:", error);
                mostrarMensagem(`Ocorreu um erro ao salvar o comprovante: ${error.message}`, "erro");
            } finally {
                mostrarLoading(false);
            }
        }

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function limparCampos() {
            inputNF.value = "";
            comprovanteInput.value = "";
            previewComprovante.src = "#";
            previewComprovante.style.display = 'none';

            previewComprovanteFinal.src = "#";
            previewComprovanteFinal.style.display = 'none';

            // Reset passos
            btnProximo1.disabled = true;
            btnProximo2.disabled = true;

            // Volta para o primeiro passo
            mostrarPasso(1);
        }
    </script>
</body>
</html>
