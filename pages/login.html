<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Meta tags essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiDecis - </title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <!-- Estilos Internos -->
    <style>
        /* Variáveis de Cores */
        :root {
            --bg-color: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.1);
            --primary-color: #1c1d1c;
            --input-bg: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
            --placeholder-color: #c0c0c0;
            --button-hover: #1ed760; /* Cor do botao Entrar após clidado */
            --link-color: #1c1d1c;
            --border-color: rgba(255, 255, 255, 0.2);
        }

        /* Reset de Margens e Padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* Efeitos de Partículas no Fundo */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            top: 0;
            left: 0;
        }

        /* Container do Login com Glassmorphism */
        #login-container {
            position: relative;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            z-index: 1;
            max-width: 400px;
            width: 90%;
            animation: slideIn 1s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            text-align: center;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            position: relative;
        }

        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: var(--primary-color);
            margin: 0.5rem auto 0;
            border-radius: 2px;
        }

        .form-label {
            color: var(--text-color);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text-color);
            transition: border 0.3s, box-shadow 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .form-control::placeholder {
            color: var(--placeholder-color);
        }

        .form-control:focus {
            outline: none;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 8px var(--primary-color);
            background: var(--input-bg);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
            cursor: pointer;
            margin-top: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(29, 185, 84, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: none;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        /* Animação de Flutuação */
        #login-container {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Responsividade */
        @media (max-width: 576px) {
            #login-container {
                padding: 2rem;
            }

            h2 {
                font-size: 1.75rem;
            }

            .btn-primary {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de Fundo -->
    <div id="particles-js"></div>

    <!-- Tela de Login -->
    <div id="login-container" class="card">
        <h2>LexiDecis</h2>
        <form id="login-form"> <!-- Adicionei o formulário -->
            <div class="mb-3">
                <label for="tenant" class="form-label">Empresa</label>
                <input type="text" id="tenant" class="form-control" placeholder="Digite o Tenant" value="bhm" readonly required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Digite seu email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
        <div class="mt-3 text-center">
            <a href="#" id="reset-password-button">Esqueci minha senha</a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Particles.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <!-- Firebase e Scripts Personalizados -->
    <script type="module" src="../services/login.js" defer></script>
    <!-- Script para Configurar Partículas -->
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 180, //Define a quantidade de Partículas
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#ffffff"
                },
                "shape": {
                    "type": "circle",
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    },
                    "polygon": {
                        "nb_sides": 5
                    }
                },
                "opacity": {
                    "value": 0.5,
                    "random": false,
                    "anim": {
                        "enable": false
                    }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": {
                        "enable": true //faz as bolinhas entre as constelações piscarem
                    }
                },
                "line_linked": {
                    "enable": true,
                    "distance": 300,
                    "color": "#ffffff",
                    "opacity": 0.2,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 0.3,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                    "attract": {
                        "enable": true
                    }
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "repulse"
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    },
                    "resize": true
                },
                "modes": {
                    "repulse": {
                        "distance": 100,
                        "duration": 0.4
                    },
                    "push": {
                        "particles_nb": 4
                    }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
