<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Lugordinho - DataTables</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      display: none;
    }
    .table-container {
      width: 100%;
      overflow-x: auto;
    }
    h1 {
      text-align: center;
    }
    @media (max-width: 768px) {
      body {
        margin: 10px;
      }
      h1 {
        font-size: 20px;
      }
    }
    /* Botão de logout posicionado no canto superior direito */
    #logout-button {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #d9534f;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 10000;
    }
  </style>
</head>
<body>
  <button id="logout-button">Sair</button>
  <h1>Dashboard Lugordinho - DataTables</h1>
  <div id="loading" class="loading-container">Carregando dados...</div>
  <div class="table-container">
    <table id="data-table" class="display" style="width:100%">
      <thead>
        <tr>
          <th>Filial</th>
          <th>Documento</th>
          <th>Fornecedor</th>
          <th>Valor Nominal</th>
          <th>Tipo</th>
          <th>Data Prevista</th>
          <th>Vencimento</th>
          <th>Aprovador</th>
          <th>Data Inclusão</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Importação do auth.js e configuração da verificação de autenticação -->
  <script type="module">
    import { verifyAuthState, logout } from "../services/auth.js";
    
    document.addEventListener("DOMContentLoaded", () => {
      // Verifica se o usuário está autenticado
      verifyAuthState();

      // Configura o botão de logout
      const logoutButton = document.getElementById("logout-button");
      if (logoutButton) {
        logoutButton.addEventListener("click", async (event) => {
          event.preventDefault();
          try {
            await logout();
          } catch (error) {
            console.error("Erro ao realizar logout:", error);
          }
        });
      }
    });
  </script>

  <!-- jQuery e DataTables -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  
  <!-- Script para manipulação da DataTable -->
  <script>
    async function fetchData() {
      $("#loading").show();
      try {
        const response = await fetch('https://n8n.prod.bhm.tec.br/webhook/lugordinho');
        const jsonData = await response.json();
        
        if (!jsonData[0]?.data) {
          console.error("A resposta da API não contém os dados esperados.", jsonData);
          $("#loading").hide();
          return;
        }
        
        updateTable(jsonData[0].data);
      } catch (error) {
        console.error("Erro ao buscar dados:", error);
      } finally {
        $("#loading").hide();
      }
    }

    function formatDate(dateString) {
      if (!dateString) return '';
      const date = new Date(dateString);
      return date.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
    }

    function updateTable(data) {
      const tableBody = $("#data-table tbody");
      tableBody.empty();
      
      data.forEach(item => {
        const row = `
          <tr>
            <td>${item.FILIAL || ''}</td>
            <td>${item.DOC || ''}</td>
            <td>${item.FORNECEDOR || ''}</td>
            <td data-order="${item.VALORNOMINAL || 0}">
              ${item.VALORNOMINAL ? item.VALORNOMINAL.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : ''}
            </td>
            <td>${item.TIPO || ''}</td>
            <td>${formatDate(item.DATAPREVISTA)}</td>
            <td>${formatDate(item.VENCIMENTO)}</td>
            <td>${item.APELIDO_USUARIO || ''}</td>
            <td>${formatDate(item.DATAINCLUSAO)}</td>
          </tr>
        `;
        tableBody.append(row);
      });

      if ($.fn.DataTable.isDataTable("#data-table")) {
        $("#data-table").DataTable().destroy();
      }
      $("#data-table").DataTable({
        responsive: true,
        columnDefs: [
          { type: 'num', targets: 3 }
        ],
        language: {
          url: "//cdn.datatables.net/plug-ins/1.13.4/i18n/Portuguese-Brasil.json"
        }
      });
    }

    $(document).ready(function() {
      fetchData();
    });
  </script>
</body>
</html>
