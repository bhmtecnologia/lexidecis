<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aprovações</title>
  
  <!-- DataTables e jQuery UI -->
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/smoothness/jquery-ui.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.jqueryui.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .table-container {
      width: 100%;
      overflow-x: auto;
    }
    h1 {
      text-align: center;
    }
    @media (max-width: 768px) {
      body {
        margin: 10px;
      }
      h1 {
        font-size: 20px;
      }
    }
    /* Botão de logout fixo no canto superior direito */
    #logout-button {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #d9534f;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 10000;
    }
  </style>
</head>
<body>

  <button id="logout-button">Sair</button>
  <h1>Liberações de Pagamentos</h1>
  
  <div class="table-container">
    <table id="data-table" class="display" style="width:100%">
      <thead>
        <tr>
          <th>Status</th>
          <th>Ação</th>
          <th>Handle</th>
          <th>Filial</th>
          <th>Documento</th>
          <th>Fornecedor</th>
          <th>Valor Nominal</th>
          <th>Tipo</th>
          <th>Data Prevista</th>
          <th>Vencimento</th>
          <th>Aprovador</th>
          <th>Data Inclusão</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Importação do auth.js -->
  <script type="module">
    import { verifyAuthState, logout } from "../services/auth.js";
    document.addEventListener("DOMContentLoaded", () => {
      verifyAuthState();
      document.getElementById("logout-button").addEventListener("click", async (event) => {
        event.preventDefault();
        try {
          await logout();
        } catch (error) {
          console.error("Erro ao realizar logout:", error);
        }
      });
    });
  </script>

  <!-- jQuery, jQuery UI e DataTables -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/dataTables.jqueryui.min.js"></script>

  <!-- Importa o módulo do LoadingScreen -->
  <script type="module">
    import LoadingScreen from "../services/loadingScreen_report1.js"; // ajuste o caminho conforme sua estrutura

    // Cria uma instância global para utilização
    const lexidecisLoading = new LoadingScreen();

    $(document).ready(() => {
      fetchData();
    });
    
    async function fetchData() {
      // Exibe o loading com as etapas desejadas
      lexidecisLoading.show(["Buscando dados", "Processando informações"]);
      try {
        const response = await fetch('https://n8n.prod.bhm.tec.br/webhook/lugordinho');
        const jsonData = await response.json();
        
        if (!Array.isArray(jsonData) || !jsonData[0]?.data) {
          console.error("A resposta da API não contém os dados esperados.", jsonData);
          return;
        }
        
        // Atualiza a etapa "Buscando dados"
        await lexidecisLoading.loadModel("Buscando dados");
        updateTable(jsonData[0].data);
        // Atualiza a etapa "Processando informações"
        await lexidecisLoading.loadModel("Processando informações");
      } catch (error) {
        console.error("Erro ao buscar dados:", error);
      } finally {
        lexidecisLoading.hide();
      }
    }
    
    function formatCurrency(value) {
      return value ? parseFloat(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }) : 'R$ 0,00';
    }
    
    function formatDate(dateString) {
      if (!dateString) return '';
      const date = new Date(dateString);
      return date.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
    }
    
    function getStatusIcon(status) {
      switch (status) {
        case "VERDE": return "<span style='font-size: 25px;'>🟢</span>";
        case "AMARELO": return "<span style='font-size: 25px;'>🟡</span>";
        case "VERMELHO": return "<span style='font-size: 25px;'>🔴</span>";
        default: return "-";
      }
    }
    
    function sendPostRequest(id) {
      fetch(`https://n8n.prod.bhm.tec.br/webhook/LiberacaoAp/ConfirmarAcaoParcelas?id=${id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      })
      .then(response => response.json())
      .then(data => alert("Ação realizada com sucesso!"))
      .catch(error => console.error("Erro ao enviar solicitação:", error));
    }
    
    function updateTable(data) {
      const tableBody = $("#data-table tbody");
      tableBody.empty();
    
      data.forEach(item => {
        tableBody.append(`
          <tr>
            <td align="center">${getStatusIcon(item.SEMAFORO)}</td>
            <td>
              <button onclick="sendPostRequest('${item.HANDLE}')">✅ Liberar</button> 
              <button onclick="sendPostRequest('${item.HANDLE}')">🚫 Rejeitar</button>
            </td>
            <td>${item.HANDLE || '-'}</td>
            <td>${item.FILIAL || '-'}</td>
            <td>${item.DOC || '-'}</td>
            <td>${item.FORNECEDOR || '-'}</td>
            <td data-order="${item.VALORNOMINAL || 0}">
              ${formatCurrency(item.VALORNOMINAL)}
            </td>
            <td>${item.TIPO || '-'}</td>
            <td>${formatDate(item.DATAPREVISTA)}</td>
            <td>${formatDate(item.VENCIMENTO)}</td>
            <td>${item.APELIDO_USUARIO || '-'}</td>
            <td>${formatDate(item.DATAINCLUSAO)}</td>
          </tr>
        `);
      });
    
      initializeDataTable();
    }
    
    function initializeDataTable() {
      if ($.fn.DataTable.isDataTable("#data-table")) {
        $("#data-table").DataTable().clear().destroy();
      }
    
      $("#data-table").DataTable({
        responsive: true,
        autoWidth: false,
        ordering: true,
        paging: true,
        language: {
          url: "https://cdn.datatables.net/plug-ins/1.13.4/i18n/pt-BR.json"
        },
        columnDefs: [
          { type: 'num', targets: 3 }
        ]
      });
    }
  </script>
</body>
</html>
