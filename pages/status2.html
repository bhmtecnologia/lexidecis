<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de CT-e</title>
</head>
<body>
    <h1>Consulta de CT-e</h1>
    <form id="cte-form">
        <label for="chave">Chave de Acesso do CT-e:</label><br>
        <input type="text" id="chave" name="chave" maxlength="44" required placeholder="Insira a chave de acesso"><br><br>
        <label for="ambiente">Ambiente:</label><br>
        <select id="ambiente" name="ambiente" required>
            <option value="1">Produção</option>
            <option value="2">Homologação</option>
        </select><br><br>
        <button type="submit">Consultar</button>
    </form>

    <h2>Resultado:</h2>
    <pre id="resultado"></pre>

    <script>
        document.getElementById("cte-form").addEventListener("submit", async function(event) {
            event.preventDefault();

            const chave = document.getElementById("chave").value.trim();
            const ambiente = document.getElementById("ambiente").value;

            // Montar o XML da consulta
            const xmlRequest = `
                <consSitCTe xmlns="http://www.portalfiscal.inf.br/cte" versao="3.00">
                    <tpAmb>${ambiente}</tpAmb>
                    <xServ>CONSULTAR</xServ>
                    <chCTe>${chave}</chCTe>
                </consSitCTe>
            `;

            // URL do serviço (substituir pela URL correta da Sefaz para produção ou homologação)
            const url = ambiente === "1"
                ? "https://cte.fazenda.sp.gov.br/ws/cteconsulta.asmx" // Produção
                : "https://homologacao.cte.fazenda.sp.gov.br/ws/cteconsulta.asmx"; // Homologação

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/xml; charset=utf-8",
                    },
                    body: xmlRequest,
                });

                if (!response.ok) {
                    throw new Error(`Erro na consulta: ${response.status} ${response.statusText}`);
                }

                // Ler a resposta como texto
                const result = await response.text();

                // Exibir o resultado no campo de saída
                document.getElementById("resultado").textContent = result;
            } catch (error) {
                document.getElementById("resultado").textContent = `Erro: ${error.message}`;
            }
        });
    </script>
</body>
</html>
