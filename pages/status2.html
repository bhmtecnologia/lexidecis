<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Relatório de Chats - Auditoria Avançada</title>
  <!-- CSS do Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- CSS do DataTables com Bootstrap 5 -->
  <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet"/>
  <style>
    body {
      padding: 20px;
      background-color: #f7f7f7;
    }
    h1 {
      margin-bottom: 20px;
    }
    .filter-group {
      margin-bottom: 20px;
    }
    .filter-group label {
      margin-right: 10px;
    }
    .dataTables_wrapper .dataTables_filter input {
      margin-left: 0.5em;
      display: inline-block;
      width: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-center">Relatório de Chats - Auditoria Avançada</h1>
    
    <!-- Seção de filtros personalizados -->
    <div class="filter-group row g-3 align-items-end">
      <div class="col-md-3">
        <label for="filterUnit" class="form-label">Unidade</label>
        <select id="filterUnit" class="form-select">
          <option value="">Todas</option>
          <!-- Opções serão preenchidas dinamicamente -->
        </select>
      </div>
      <div class="col-md-3">
        <label for="filterUserEmail" class="form-label">Email do Usuário</label>
        <select id="filterUserEmail" class="form-select">
          <option value="">Todos</option>
          <!-- Opções serão preenchidas dinamicamente -->
        </select>
      </div>
      <div class="col-md-3">
        <label for="filterChatName" class="form-label">Nome do Chat</label>
        <select id="filterChatName" class="form-select">
          <option value="">Todos</option>
          <!-- Opções serão preenchidas dinamicamente -->
        </select>
      </div>
      <div class="col-md-3">
        <label for="filterDateStart" class="form-label">Data Início</label>
        <input type="date" id="filterDateStart" class="form-control">
      </div>
      <div class="col-md-3">
        <label for="filterDateEnd" class="form-label">Data Fim</label>
        <input type="date" id="filterDateEnd" class="form-control">
      </div>
      <div class="col-md-3">
        <button id="clearFilters" class="btn btn-secondary">Limpar Filtros</button>
      </div>
    </div>

    <div class="table-responsive">
      <table id="chatsTable" class="table table-striped table-bordered" style="width:100%">
        <thead>
          <tr>
            <th>Unidade</th>
            <th>ID Usuário</th>
            <th>Email Usuário</th>
            <th>ID Chat</th>
            <th>Nome Chat</th>
            <th>Criado Em</th>
            <th>Última Modificação</th>
            <th>Custo Total</th>
            <th>Total Mensagens</th>
          </tr>
        </thead>
        <tbody>
          <!-- Linhas serão preenchidas via JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- JS do jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- JS do Bootstrap 5 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- JS do DataTables e integração com Bootstrap 5 -->
  <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

  <script>
    $(document).ready(function() {
      let rawData = []; // Armazena os dados brutos da API

      // Inicializa a tabela DataTable com mapeamento de colunas e renderização de datas
      const table = $('#chatsTable').DataTable({
        language: {
          url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/pt-BR.json'
        },
        responsive: true,
        pageLength: 10,
        columns: [
          { data: "unit_name", title: "Unidade" },
          { data: "user_id", title: "ID Usuário" },
          { data: "user_email", title: "Email Usuário" },
          { data: "chat_id", title: "ID Chat" },
          { data: "chat_name", title: "Nome Chat" },
          {
            data: "chat_created_at",
            title: "Criado Em",
            render: {
              _: function(data) {
                return new Date(data).toLocaleString();
              },
              sort: function(data) {
                return data;
              }
            }
          },
          {
            data: "chat_last_modified",
            title: "Última Modificação",
            render: {
              _: function(data) {
                return new Date(data).toLocaleString();
              },
              sort: function(data) {
                return data;
              }
            }
          },
          { 
            data: "chat_total_cost",
            title: "Custo Total",
            render: function(data) {
              return parseFloat(data).toFixed(8);
            }
          },
          { data: "chat_total_messages", title: "Total Mensagens" }
        ]
      });

      // Função para preencher os selects com opções únicas
      function preencherSelects(data) {
        const unidades = new Set();
        const emails = new Set();
        const nomesChats = new Set();

        data.forEach(item => {
          unidades.add(item.unit_name);
          emails.add(item.user_email);
          nomesChats.add(item.chat_name);
        });

        const unitSelect = $('#filterUnit');
        unidades.forEach(unit => {
          unitSelect.append(new Option(unit, unit));
        });

        const emailSelect = $('#filterUserEmail');
        emails.forEach(email => {
          emailSelect.append(new Option(email, email));
        });

        const chatNameSelect = $('#filterChatName');
        nomesChats.forEach(nome => {
          chatNameSelect.append(new Option(nome, nome));
        });
      }

      // Função para preencher a tabela com os dados fornecidos
      function preencherTabela(data) {
        table.clear();
        table.rows.add(data);
        table.draw();
      }

      // Função para aplicar filtros customizados na tabela
      function aplicarFiltros() {
        const unitFilter = $('#filterUnit').val().toLowerCase();
        const emailFilter = $('#filterUserEmail').val().toLowerCase();
        const chatNameFilter = $('#filterChatName').val().toLowerCase();
        const dateStart = $('#filterDateStart').val();
        const dateEnd = $('#filterDateEnd').val();

        let filteredData = rawData.filter(item => {
          const createdDate = new Date(item.chat_created_at);
          const unitMatch = !unitFilter || item.unit_name.toLowerCase() === unitFilter;
          const emailMatch = !emailFilter || item.user_email.toLowerCase() === emailFilter;
          const chatNameMatch = !chatNameFilter || item.chat_name.toLowerCase() === chatNameFilter;
          
          let dateMatch = true;
          if(dateStart) {
            dateMatch = dateMatch && (createdDate >= new Date(dateStart));
          }
          if(dateEnd) {
            let endDate = new Date(dateEnd);
            endDate.setHours(23,59,59,999);
            dateMatch = dateMatch && (createdDate <= endDate);
          }
          
          return unitMatch && emailMatch && chatNameMatch && dateMatch;
        });

        preencherTabela(filteredData);
      }

      // Eventos dos filtros – ao alterar qualquer filtro, reaplicar a filtragem
      $('#filterUnit, #filterUserEmail, #filterChatName, #filterDateStart, #filterDateEnd').on('change input', function() {
        aplicarFiltros();
      });

      // Botão para limpar filtros
      $('#clearFilters').click(function() {
        $('#filterUnit').val('');
        $('#filterUserEmail').val('');
        $('#filterChatName').val('');
        $('#filterDateStart').val('');
        $('#filterDateEnd').val('');
        aplicarFiltros();
      });

      // Busca dados da API
      fetch('https://n8n.bhm.tec.br/webhook/reportChats')
        .then(response => response.json())
        .then(data => {
          rawData = data;
          preencherSelects(data);
          preencherTabela(data);
        })
        .catch(error => {
          console.error('Erro ao buscar os dados:', error);
          alert('Não foi possível carregar os dados do relatório.');
        });
    });
  </script>
</body>
</html>
