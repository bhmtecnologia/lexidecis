<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornal de Licitações - VTCLog</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fonte e cores */
        body {
            font-family: 'Georgia', serif;
            background-color: #fff;
            color: #000;
            line-height: 1.6;
            padding: 20px;
        }

        /* Container principal */
        .newspaper {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Cabeçalho do jornal */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 3em;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }

        /* Artigo */
        .article {
            margin-bottom: 40px;
            border-bottom: 1px solid #000;
            padding-bottom: 20px;
        }

        .article:last-child {
            border-bottom: none;
        }

        .article-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .article-header div {
            margin-bottom: 5px;
        }

        .article-header .portal {
            font-weight: bold;
            font-size: 1.2em;
        }

        .article-header .orgao {
            font-style: italic;
        }

        .article-header .estado {
            text-transform: uppercase;
        }

        .article-body {
            margin-bottom: 10px;
        }

        .article-body em,
        .article-body mark {
            background-color: #ddd;
            padding: 0 2px;
        }

        .article-footer {
            font-size: 0.9em;
            color: #555;
        }

        /* Mensagens de status */
        .status {
            text-align: center;
            font-size: 1.2em;
            margin-top: 50px;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .article-header {
                flex-direction: column;
            }

            .article-header div {
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="newspaper">
        <header>
            <h1>Jornal de Licitações</h1>
            <p>VTCLog - Atualizado em <span id="data-atual"></span></p>
        </header>

        <div id="articles">
            <!-- Os artigos serão inseridos aqui pelo JavaScript -->
        </div>

        <div id="status" class="status" style="display: none;">
            <!-- Mensagens de carregamento ou erro -->
        </div>
    </div>

    <script>
        /**
         * Formata a data para o formato "DD de Mês de AAAA"
         * @param {string} dataISO - Data no formato ISO
         * @returns {string} Data formatada
         */
        function formatarData(dataISO) {
            const meses = [
                "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
                "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
            ];
            const data = new Date(dataISO);
            const dia = data.getDate();
            const mes = meses[data.getMonth()];
            const ano = data.getFullYear();
            return `${dia} de ${mes} de ${ano}`;
        }

        /**
         * Cria o elemento de um artigo baseado nos dados da licitação
         * @param {Object} licitacao - Objeto com os dados da licitação
         * @returns {HTMLElement} Elemento do artigo
         */
        function criarArtigo(licitacao) {
            const article = document.createElement('div');
            article.classList.add('article');

            // Cabeçalho do artigo
            const header = document.createElement('div');
            header.classList.add('article-header');

            const portal = document.createElement('div');
            portal.classList.add('portal');
            portal.innerText = licitacao.portal;

            const orgao = document.createElement('div');
            orgao.classList.add('orgao');
            orgao.innerText = licitacao.orgao;

            const estado = document.createElement('div');
            estado.classList.add('estado');
            estado.innerText = licitacao.estado;

            header.appendChild(portal);
            header.appendChild(orgao);
            header.appendChild(estado);

            // Corpo do artigo
            const body = document.createElement('div');
            body.classList.add('article-body');
            body.innerHTML = licitacao.objeto;

            // Rodapé do artigo
            const footer = document.createElement('div');
            footer.classList.add('article-footer');
            footer.innerHTML = `
                <p><strong>Modalidade:</strong> ${licitacao.modalidade}</p>
                <p><strong>Publicação:</strong> ${formatarData(licitacao.data_publicacao)}</p>
                <p><strong>Data Final da Proposta:</strong> ${formatarData(licitacao.data_final_proposta)}</p>
                <p><strong>Empresa Responsável:</strong> ${licitacao.empresa}</p>
            `;

            // Monta o artigo
            article.appendChild(header);
            article.appendChild(body);
            article.appendChild(footer);

            return article;
        }

        /**
         * Exibe a data atual no cabeçalho
         */
        function exibirDataAtual() {
            const dataAtualSpan = document.getElementById('data-atual');
            const hoje = new Date();
            const meses = [
                "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
                "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
            ];
            const dia = hoje.getDate();
            const mes = meses[hoje.getMonth()];
            const ano = hoje.getFullYear();
            dataAtualSpan.innerText = `${dia} de ${mes} de ${ano}`;
        }

        /**
         * Exibe uma mensagem de status (carregando, erro, etc.)
         * @param {string} mensagem - Mensagem a ser exibida
         */
        function exibirStatus(mensagem) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = mensagem;
            statusDiv.style.display = 'block';
        }

        /**
         * Esconde a mensagem de status
         */
        function esconderStatus() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'none';
        }

        /**
         * Renderiza todos os artigos na página
         * @param {Array} licitacoes - Array de objetos de licitação
         */
        function renderizarArtigos(licitacoes) {
            const container = document.getElementById('articles');
            container.innerHTML = ''; // Limpa conteúdos anteriores, se houver

            if (licitacoes.length === 0) {
                exibirStatus('Nenhuma licitação encontrada.');
                return;
            }

            licitacoes.forEach(licitacao => {
                const artigo = criarArtigo(licitacao);
                container.appendChild(artigo);
            });
        }

        /**
         * Busca os dados da API e renderiza os artigos
         */
        async function buscarERenderizarLicitacoes() {
            const apiUrl = 'https://n8n.bhm.tec.br/webhook/api/voetur/comercial/avisos';
            const statusDiv = document.getElementById('status');

            try {
                exibirStatus('Carregando licitações...');
                const resposta = await fetch(apiUrl);

                if (!resposta.ok) {
                    throw new Error(`Erro na requisição: ${resposta.status} ${resposta.statusText}`);
                }

                const dados = await resposta.json();

                // Verifica se os dados são um array
                if (!Array.isArray(dados)) {
                    throw new Error('Formato de dados inválido recebido da API.');
                }

                esconderStatus();
                renderizarArtigos(dados);
            } catch (erro) {
                exibirStatus(`Falha ao carregar licitações: ${erro.message}`);
                console.error(erro);
            }
        }

        // Executa a exibição da data atual
        exibirDataAtual();

        // Executa a busca e renderização das licitações após o carregamento da página
        document.addEventListener('DOMContentLoaded', buscarERenderizarLicitacoes);
    </script>
</body>
</html>
