<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Manager</title>
  <!-- Bootstrap Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f7f9fc;
      color: #333;
    }
    .temperature-manager {
      position: fixed;
      bottom: 5%; /* Ajuste a posição vertical */
      right: 5px; /* Ajuste a posição horizontal */
      background: transparent;
      padding: 2px;
      text-align: center;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 50px; /* Compacta */
      height: 150px; /* Compacta */
    }
    .temperature-container {
      display: flex;
      flex-direction: column; /* Alinha verticalmente */
      align-items: center;
      justify-content: space-between;
      height: 100%; /* Usa toda a altura */
    }
    .temperature-container input[type="range"] {
      writing-mode: bt-lr;
      transform: rotate(-90deg);
      width: 100px; /* Altura do slider */
      height: 6px; /* Espessura */
      margin: 0;
    }
    .icon {
      font-size: 14px; /* Tamanho do ícone */
      color: #555; /* Cor padrão */
    }
  </style>
  <script defer src="temperatureManager.js"></script> <!-- Importa a lógica -->
</head>
<body>
  <div id="temperature-component"></div> <!-- Contêiner para o componente -->
</body>
</html>
