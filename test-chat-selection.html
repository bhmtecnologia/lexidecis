<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Seleção de Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/sidebar.css">
    <style>
        body {
            background-color: #363839;
            color: white;
        }
        .test-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        .chat-item {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .chat-item:hover {
            background-color: #343a40 !important;
        }
        
        /* Regra específica para o estado active */
        #chat-list .list-group-item.active {
            background-color: #343a40 !important;
            color: white !important;
            border-color: #495057 !important;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h3>Teste de Seleção de Chat</h3>
        <p>Clique nos chats abaixo para testar o efeito de seleção:</p>
        
        <ul id="chat-list" class="list-group lexi-chat-list" style="background-color: #363839; border: none;">
            <li class="list-group-item chat-item d-flex justify-content-between align-items-center" data-chat-id="1">
                <span class="chat-name">Chat de Teste 1</span>
                <button class="btn btn-sm btn-outline-secondary">⚙️</button>
            </li>
            <li class="list-group-item chat-item d-flex justify-content-between align-items-center" data-chat-id="2">
                <span class="chat-name">Chat de Teste 2</span>
                <button class="btn btn-sm btn-outline-secondary">⚙️</button>
            </li>
            <li class="list-group-item chat-item d-flex justify-content-between align-items-center" data-chat-id="3">
                <span class="chat-name">Chat de Teste 3</span>
                <button class="btn btn-sm btn-outline-secondary">⚙️</button>
            </li>
        </ul>
        
        <div class="mt-3">
            <button id="select-chat-1" class="btn btn-primary me-2">Selecionar Chat 1</button>
            <button id="select-chat-2" class="btn btn-primary me-2">Selecionar Chat 2</button>
            <button id="select-chat-3" class="btn btn-primary">Selecionar Chat 3</button>
        </div>
        
        <div class="mt-3">
            <button id="clear-selection" class="btn btn-secondary">Limpar Seleção</button>
        </div>
    </div>

    <script>
        // Função para selecionar um chat
        function selectChatItem(chatId) {
            const chatItems = Array.from(document.querySelectorAll('#chat-list .list-group-item.chat-item'));
            
            chatItems.forEach(item => {
                const itemChatId = item.dataset.chatId;
                if (itemChatId === chatId) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // Event listeners para os botões
        document.getElementById('select-chat-1').addEventListener('click', () => selectChatItem('1'));
        document.getElementById('select-chat-2').addEventListener('click', () => selectChatItem('2'));
        document.getElementById('select-chat-3').addEventListener('click', () => selectChatItem('3'));
        
        document.getElementById('clear-selection').addEventListener('click', () => {
            document.querySelectorAll('#chat-list .list-group-item.chat-item').forEach(item => {
                item.classList.remove('active');
            });
        });

        // Event listeners para cliques nos chats
        document.querySelectorAll('#chat-list .list-group-item.chat-item').forEach(item => {
            item.addEventListener('click', (event) => {
                // Evitar seleção quando clicar no botão
                if (event.target.tagName === 'BUTTON') {
                    return;
                }
                const chatId = item.dataset.chatId;
                selectChatItem(chatId);
            });
        });
    </script>
</body>
</html>
