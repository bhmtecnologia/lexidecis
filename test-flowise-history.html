<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Flowise History</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .controls {
            flex: 1;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        .chatbot-area {
            flex: 2;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-height: 500px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px 0;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #0056b3;
        }
        .log {
            background: #000;
            color: #00ff00;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        textarea {
            height: 100px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🧪 Teste Flowise History - localStorage _EXTERNAL</h1>
    
    <div class="container">
        <div class="controls">
            <h3>Controles</h3>
            
            <h4>1. Configurações</h4>
            <input type="text" id="chatflowId" placeholder="chatflowId" value="efe59701-afe2-4f4c-8448-bb8e3a32161a">
            <input type="text" id="sessionId" placeholder="sessionId" value="ed57ea27-0c16-4562-a482-54f494ef598e">
            <input type="text" id="apiHost" placeholder="apiHost" value="https://flowise.power.tec.br">
            <input type="text" id="token" placeholder="token" value="0d1S97hx7o2pLVe5grVpkvUNW-RR_TTWYeGuKGK2ALs">
            
            <h4>2. Ações</h4>
            <button onclick="fetchHistory()">🔄 Buscar Histórico da API</button>
            <button onclick="injectHistory()">💉 Injetar no localStorage</button>
            <button onclick="checkStorage()">📋 Verificar localStorage</button>
            <button onclick="clearStorage()">🗑️ Limpar localStorage</button>
            <button onclick="initChatbot()">🚀 Inicializar Chatbot</button>
            
            <h4>3. Histórico Manual (JSON)</h4>
            <textarea id="manualHistory" placeholder="Cole aqui o JSON do histórico para teste..."></textarea>
            <button onclick="injectManualHistory()">💉 Injetar Histórico Manual</button>
            
            <div class="log" id="log"></div>
        </div>
        
        <div class="chatbot-area">
            <div id="chatbot-container"></div>
        </div>
    </div>

    <script type="module">
        let chatHistory = null;
        
        window.log = function(message) {
            const logEl = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logEl.innerHTML += `[${timestamp}] ${message}<br>`;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(message);
        }
        
        window.fetchHistory = async function() {
            const chatflowId = document.getElementById('chatflowId').value;
            const sessionId = document.getElementById('sessionId').value;
            const apiHost = document.getElementById('apiHost').value;
            const token = document.getElementById('token').value;
            
            log('🔄 Buscando histórico da API...');
            log(`URL: ${apiHost}/api/v1/chatmessage/${chatflowId}?sessionId=${sessionId}`);
            
            try {
                const response = await fetch(`${apiHost}/api/v1/chatmessage/${chatflowId}?sessionId=${sessionId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                log(`Status: ${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const apiData = await response.json();
                log(`✅ Histórico recebido: ${apiData.length} mensagens`);
                
                // Formatar histórico como o Flowise espera
                chatHistory = apiData.map(msg => ({
                    message: msg.content,
                    type: msg.role === 'userMessage' ? 'userMessage' : 'apiMessage',
                    dateTime: msg.createdDate || new Date().toISOString(),
                    messageId: msg.id || Math.random().toString(36).substr(2, 9),
                    fileUploads: msg.fileUploads || []
                }));
                
                log(`✅ Histórico formatado: ${chatHistory.length} mensagens`);
                log(`Primeira mensagem: "${chatHistory[0]?.message?.substring(0, 50)}..."`);
                
            } catch (error) {
                log(`❌ Erro: ${error.message}`);
            }
        }
        
        window.injectHistory = function() {
            if (!chatHistory) {
                log('❌ Nenhum histórico carregado. Execute "Buscar Histórico" primeiro.');
                return;
            }
            
            const chatflowId = document.getElementById('chatflowId').value;
            const sessionId = document.getElementById('sessionId').value;
            
            // Chaves como o arquivo que funciona
            const sessionExtKey = `${chatflowId}__${sessionId}_EXTERNAL`;
            const baseExtKey = `${chatflowId}_EXTERNAL`;
            
            const historyData = {
                chatHistory: chatHistory,
                chatId: sessionId,
                chatflowId: chatflowId,
                chatType: 'EXTERNAL'
            };
            
            // 1. Salvar na chave específica da sessão
            localStorage.setItem(sessionExtKey, JSON.stringify(historyData));
            log(`✅ Salvo na chave da sessão: ${sessionExtKey}`);
            
            // 2. COPIAR para a chave base (CRUCIAL!)
            localStorage.setItem(baseExtKey, JSON.stringify(historyData));
            log(`✅ COPIADO para a chave base: ${baseExtKey}`);
            
            log(`📋 Dados salvos: ${JSON.stringify(historyData).length} caracteres`);
        }
        
        window.injectManualHistory = function() {
            const manualData = document.getElementById('manualHistory').value;
            if (!manualData.trim()) {
                log('❌ Nenhum histórico manual fornecido');
                return;
            }
            
            try {
                chatHistory = JSON.parse(manualData);
                log(`✅ Histórico manual carregado: ${chatHistory.length} mensagens`);
                injectHistory();
            } catch (error) {
                log(`❌ Erro ao parsear JSON: ${error.message}`);
            }
        }
        
        window.checkStorage = function() {
            const chatflowId = document.getElementById('chatflowId').value;
            const sessionId = document.getElementById('sessionId').value;
            
            const sessionExtKey = `${chatflowId}__${sessionId}_EXTERNAL`;
            const baseExtKey = `${chatflowId}_EXTERNAL`;
            
            const sessionData = localStorage.getItem(sessionExtKey);
            const baseData = localStorage.getItem(baseExtKey);
            
            log('📋 Verificando localStorage:');
            log(`Chave sessão (${sessionExtKey}): ${sessionData ? 'EXISTS' : 'NOT FOUND'}`);
            log(`Chave base (${baseExtKey}): ${baseData ? 'EXISTS' : 'NOT FOUND'}`);
            
            if (baseData) {
                try {
                    const parsed = JSON.parse(baseData);
                    log(`📊 Dados na chave base: ${parsed.chatHistory?.length || 0} mensagens`);
                    log(`📄 Primeira mensagem: "${parsed.chatHistory?.[0]?.message?.substring(0, 50)}..."`);
                } catch (error) {
                    log(`❌ Erro ao parsear dados: ${error.message}`);
                }
            }
        }
        
        window.clearStorage = function() {
            const chatflowId = document.getElementById('chatflowId').value;
            const sessionId = document.getElementById('sessionId').value;
            
            const sessionExtKey = `${chatflowId}__${sessionId}_EXTERNAL`;
            const baseExtKey = `${chatflowId}_EXTERNAL`;
            
            localStorage.removeItem(sessionExtKey);
            localStorage.removeItem(baseExtKey);
            localStorage.removeItem(`${chatflowId}_historyInjected`);
            localStorage.removeItem(`${chatflowId}__${sessionId}_historyInjected`);
            
            log('🗑️ localStorage limpo');
        }
        
        window.initChatbot = async function() {
            const chatflowId = document.getElementById('chatflowId').value;
            const apiHost = document.getElementById('apiHost').value;
            const token = document.getElementById('token').value;
            
            const container = document.getElementById('chatbot-container');
            container.innerHTML = '<flowise-fullchatbot></flowise-fullchatbot>';
            
            // Verificar se existe histórico ANTES de inicializar
            const baseExtKey = `${chatflowId}_EXTERNAL`;
            const existingHistory = localStorage.getItem(baseExtKey);
            
            log(`🔍 Verificando histórico antes de inicializar:`);
            log(`Chave: ${baseExtKey}`);
            log(`Existe: ${!!existingHistory}`);
            
            if (existingHistory) {
                try {
                    const parsed = JSON.parse(existingHistory);
                    log(`📊 Histórico encontrado: ${parsed.chatHistory?.length || 0} mensagens`);
                } catch (error) {
                    log(`❌ Erro ao parsear histórico: ${error.message}`);
                }
            }
            
            try {
                // Importar e inicializar como o arquivo que funciona
                const webModule = await import('./services/web.js');
                
                const config = {
                    chatflowid: chatflowId,
                    apiHost: apiHost,
                    token: token,
                    theme: {
                        chatWindow: {
                            title: 'Teste Flowise',
                            welcomeMessage: 'Testando carregamento de histórico...',
                            height: 400,
                            width: 350
                        }
                    }
                };
                
                log('🚀 Inicializando chatbot...');
                log(`Config: ${JSON.stringify(config, null, 2)}`);
                
                await webModule.default.initFull(config);
                log('✅ Chatbot inicializado!');
                
            } catch (error) {
                log(`❌ Erro ao inicializar chatbot: ${error.message}`);
                console.error('Erro completo:', error);
            }
        }
        
        // Log inicial
        log('🧪 Página de teste carregada');
        log('📋 Use os controles para testar o carregamento de histórico');
    </script>
    
    <!-- Caregar o web component do Flowise -->
    <script type="module" src="./services/web.js"></script>
</body>
</html>
