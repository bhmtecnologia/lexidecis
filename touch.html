<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Swipe com TouchSwipe</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- jQuery (necessário para TouchSwipe) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* Estilos básicos para o exemplo */
        body {
            overflow-x: hidden;
        }
        #sidebarMenu {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background: #343a40;
            color: #fff;
            transition: left 0.3s ease;
        }
        #sidebarMenu.active {
            left: 0;
        }
        .content {
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }
        .content.active {
            margin-left: 250px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebarMenu">
        <h2 class="p-3">Sidebar</h2>
        <p class="p-3">Conteúdo da sidebar...</p>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="content">
        <button class="btn btn-primary m-3" id="toggleSidebar">Toggle Sidebar</button>
        <h1 class="m-3">Conteúdo Principal</h1>
        <p class="m-3">Deslize para a direita para abrir a sidebar e para a esquerda para fechá-la.</p>
    </div>

    <!-- TouchSwipe -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.touchswipe/1.6.19/jquery.touchSwipe.min.js"></script>
    <script>
        const sidebar = $('#sidebarMenu');
        const content = $('.content');
        const toggleButton = $('#toggleSidebar');

        toggleButton.on('click', () => {
            sidebar.toggleClass('active');
            content.toggleClass('active');
        });

        // Configura o TouchSwipe
        $('body').swipe({
            swipeLeft: function(event, direction, distance, duration, fingerCount) {
                // Swipe para a esquerda - fechar sidebar
                sidebar.removeClass('active');
                content.removeClass('active');
            },
            swipeRight: function(event, direction, distance, duration, fingerCount) {
                // Swipe para a direita - abrir sidebar
                sidebar.addClass('active');
                content.addClass('active');
            },
            threshold: 75
        });
    </script>
</body>
</html>
